<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CA Do Now — Mr. Halverson</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
  <style>
    :root {
      --bg: #0f1117;
      --card: #1a1d27;
      --accent: #4f8ef7;
      --accent-green: #34c77b;
      --accent-red: #f74f4f;
      --text: #e8eaf0;
      --muted: #7a7f96;
      --border: #2a2d3d;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem 3rem;
    }
    .page-header {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    .page-header .date-label {
      font-size: .82rem;
      color: var(--muted);
      letter-spacing: .1em;
      text-transform: uppercase;
      margin-bottom: .35rem;
    }
    .page-header h1 { font-size: 2rem; font-weight: 700; }
    .page-header h1 span { color: var(--accent); }
    .page-header .subtitle {
      font-size: .9rem;
      color: var(--muted);
      margin-top: .4rem;
    }

    /* Two-column problem layout */
    .problems-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      max-width: 980px;
      margin: 0 auto;
    }
    @media (max-width: 680px) { .problems-grid { grid-template-columns: 1fr; } }

    /* Problem card */
    .prob-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.7rem;
      display: flex;
      flex-direction: column;
      gap: .9rem;
    }
    .prob-num {
      font-size: .7rem;
      font-weight: 700;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .prob-tag {
      display: inline-block;
      font-size: .68rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      background: rgba(42,122,74,.2);
      color: #5ccb87;
      padding: .22rem .65rem;
      border-radius: 999px;
    }
    .prob-statement {
      font-size: 1rem;
      line-height: 1.7;
    }
    .prob-statement .katex-display { margin: .6rem 0; }

    /* Inputs */
    .answer-area { display: flex; flex-direction: column; gap: .55rem; }
    .input-row { display: flex; align-items: center; gap: .5rem; }
    .input-label { font-size: .82rem; color: var(--muted); white-space: nowrap; }
    .ans-input {
      flex: 1;
      background: rgba(255,255,255,.06);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-size: 1rem;
      padding: .48rem .75rem;
      outline: none;
      transition: border-color .2s;
    }
    .ans-input:focus { border-color: var(--accent); }
    .ans-input:disabled { opacity: .45; }
    .ans-hint { font-size: .75rem; color: var(--muted); }

    /* MCQ */
    .mcq-opts { display: flex; flex-direction: column; gap: .45rem; }
    .mcq-btn {
      background: rgba(255,255,255,.04);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: .93rem;
      padding: .55rem 1rem;
      cursor: pointer;
      text-align: left;
      transition: border-color .2s, background .2s;
    }
    .mcq-btn:hover:not([disabled]) { border-color: var(--accent); background: rgba(79,142,247,.1); }
    .mcq-btn[disabled] { cursor: default; }
    .mcq-btn.correct { border-color: var(--accent-green) !important; background: rgba(52,199,123,.12) !important; color: var(--accent-green); }
    .mcq-btn.wrong   { border-color: var(--accent-red)   !important; background: rgba(247,79,79,.1)  !important; color: var(--accent-red); opacity: .65; }
    .mcq-btn.reveal  { border-color: var(--accent-green) !important; background: rgba(52,199,123,.08) !important; color: var(--accent-green); }

    /* Check button */
    .check-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: .93rem;
      font-weight: 600;
      padding: .6rem 1.15rem;
      cursor: pointer;
      align-self: flex-start;
      transition: background .2s, opacity .2s;
    }
    .check-btn:hover:not([disabled]) { background: #3a7ae0; }
    .check-btn[disabled] { opacity: .4; cursor: default; }

    /* Feedback */
    .feedback {
      border-radius: 8px;
      padding: .7rem .95rem;
      font-size: .88rem;
      line-height: 1.55;
      display: none;
    }
    .feedback.show { display: block; }
    .feedback.correct-fb { background: rgba(52,199,123,.1);  border: 1px solid rgba(52,199,123,.28); }
    .feedback.wrong-fb   { background: rgba(247,79,79,.08); border: 1px solid rgba(247,79,79,.22); }
    .fb-icon { font-size: 1rem; margin-right: .25rem; }
    .solution-label {
      font-size: .7rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: .55rem;
      margin-bottom: .2rem;
      display: block;
    }
    .solution-body { line-height: 1.6; }
    .solution-body .katex-display { margin: .4rem 0; }

    /* Practice-only fallback */
    .practice-fallback {
      display: flex;
      flex-direction: column;
      gap: .7rem;
      padding: .5rem 0;
    }
    .practice-fallback p { font-size: .9rem; color: var(--muted); line-height: 1.5; }
    .prac-btn {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      background: rgba(79,142,247,.14);
      border: 1px solid rgba(79,142,247,.3);
      border-radius: 8px;
      color: var(--accent);
      font-size: .9rem;
      font-weight: 600;
      padding: .6rem 1rem;
      text-decoration: none;
      transition: background .2s;
      align-self: flex-start;
    }
    .prac-btn:hover { background: rgba(79,142,247,.24); }

    /* Footer */
    .page-footer {
      text-align: center;
      margin-top: 2.5rem;
      color: var(--muted);
      font-size: .78rem;
    }
    .page-footer a { color: var(--muted); text-decoration: underline; }

    /* Loading/empty */
    .loading-msg { text-align: center; padding: 4rem 1rem; color: var(--muted); font-size: 1.05rem; }
    .empty-state { text-align: center; padding: 3rem 1rem; max-width: 500px; margin: 0 auto; }
    .empty-state .icon { font-size: 2.2rem; margin-bottom: .7rem; }
    .empty-state h2 { font-size: 1.2rem; margin-bottom: .5rem; }
    .empty-state p { color: var(--muted); font-size: .9rem; line-height: 1.55; }

    .refresh-note {
      font-size: .75rem;
      color: var(--muted);
      margin-top: .15rem;
    }
  </style>
</head>
<body>

<div class="page-header">
  <div class="date-label" id="dateLabel"></div>
  <h1>College Algebra <span id="doNowLabel">Do Now</span></h1>
  <div class="subtitle" id="subtitle">Two problems — same topic for everyone, your own numbers.</div>
</div>

<div id="mainArea"><div class="loading-msg">Loading problems…</div></div>

<div class="page-footer">
  <a href="warmup.html">← Daily Warm-Up</a> &nbsp;·&nbsp;
  <a href="index.html">Dashboard</a>
</div>

<script>
/* ─────────────────────────────────────────────
   UTILITIES
───────────────────────────────────────────── */
const BASE = 'https://crteacher.github.io/Curriculum-Dashboard/';

function todayStr() { return new Date().toISOString().slice(0,10); }
function fmtDate(s) {
  return new Date(s + 'T12:00:00').toLocaleDateString('en-US',
    { weekday:'long', month:'long', day:'numeric', year:'numeric' });
}

// Seeded integer hash (FNV-1a) — for deterministic section selection
function hashStr(s) {
  let h = 2166136261;
  for (let i = 0; i < s.length; i++) {
    h ^= s.charCodeAt(i);
    h = Math.imul(h, 16777619) >>> 0;
  }
  return h;
}

// Per-student random helpers (NOT seeded)
function ri(a, b) { return Math.floor(Math.random() * (b - a + 1)) + a; }
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

// Math helpers
function gcd(a, b) { a = Math.abs(a); b = Math.abs(b); while (b) { [a, b] = [b, a % b]; } return a; }

function reduceFrac(n, d) {
  if (d === 0) return [n, d];
  const g = gcd(Math.abs(n), Math.abs(d));
  n /= g; d /= g;
  if (d < 0) { n = -n; d = -d; }
  return [n, d];
}

// Build LaTeX fraction string (returns integer if denominator is 1)
function fracTex(n, d) {
  [n, d] = reduceFrac(n, d);
  if (d === 1) return `${n}`;
  return `\\dfrac{${n}}{${d}}`;
}

// Build polynomial term string for LaTeX
function termTex(coeff, varStr, power) {
  // power 0 → constant, power 1 → varStr, power 2 → varStr^2
  if (coeff === 0) return '';
  let base = '';
  if (power === 0) base = '';
  else if (power === 1) base = varStr;
  else base = `${varStr}^${power}`;
  const absC = Math.abs(coeff);
  if (base === '') return `${coeff}`;
  if (absC === 1) return coeff > 0 ? base : `-${base}`;
  return `${coeff}${base}`;
}

// Build linear "ax + b" expression for LaTeX
function linearTex(a, b, v = 'x') {
  if (a === 0 && b === 0) return '0';
  const aStr = termTex(a, v, 1);
  if (b === 0) return aStr || '0';
  if (a === 0) return `${b}`;
  return b > 0 ? `${aStr} + ${b}` : `${aStr} - ${Math.abs(b)}`;
}

// Build quadratic "ax² + bx + c" for LaTeX
function quadTex(a, b, c, v = 'x') {
  let parts = [];
  if (a !== 0) parts.push(termTex(a, v, 2));
  if (b !== 0) {
    const bStr = termTex(Math.abs(b), v, 1);
    if (parts.length) parts.push(b > 0 ? `+ ${bStr}` : `- ${bStr}`);
    else parts.push(termTex(b, v, 1));
  }
  if (c !== 0) {
    if (parts.length) parts.push(c > 0 ? `+ ${c}` : `- ${Math.abs(c)}`);
    else parts.push(`${c}`);
  }
  return parts.join(' ') || '0';
}

// KaTeX render helpers
function kD(tex) { // display mode
  try { return katex.renderToString(tex, { displayMode: true, throwOnError: false }); }
  catch(e) { return tex; }
}
function kI(tex) { // inline mode
  try { return katex.renderToString(tex, { displayMode: false, throwOnError: false }); }
  catch(e) { return tex; }
}

// Parse student numeric input (handles fractions "3/4", decimals, integers)
function parseNum(s) {
  if (!s || !s.trim()) return NaN;
  s = s.trim().replace(/\s+/g, '');
  const m = s.match(/^(-?\d+)\/(-?\d+)$/);
  if (m) return parseInt(m[1]) / parseInt(m[2]);
  return parseFloat(s);
}
function approxEq(a, b, tol = 1e-6) { return Math.abs(a - b) < tol; }


/* ─────────────────────────────────────────────
   PROBLEM GENERATORS
   Each returns a problem descriptor object.
   Types: 'numeric' | 'numeric2' | 'mcq' | 'complex2'
───────────────────────────────────────────── */
const GEN = {};

// --- 1.1  Solving Linear Equations  ax + b = c ---
GEN['CA_1_1'] = function() {
  const a = ri(2, 8);
  const x = ri(-7, 7);
  const b = ri(-12, 12);
  const c = a * x + b;
  const bSign = b > 0 ? `+ ${b}` : b < 0 ? `- ${Math.abs(b)}` : '';
  const eq = b === 0 ? `${a}x = ${c}` : `${a}x ${bSign} = ${c}`;
  const step = c - b;
  return {
    html: `Solve for ${kI('x')}: ${kD(eq)}`,
    type: 'numeric',
    answer: x,
    solutionHtml:
      kD(`${a}x = ${c} ${b >= 0 ? '-' : '+'} ${Math.abs(b)} = ${step}`) +
      kD(`x = ${fracTex(step, a)} = ${x}`)
  };
};

// --- 1.2  Solutions of Linear Equations (one / none / infinite)  MCQ ---
GEN['CA_1_2'] = function() {
  const a = ri(2, 7);
  const b = ri(-8, 8);
  const caseType = ri(0, 2);
  let eq, answer, explanation;
  if (caseType === 0) {
    // Different coefficients → one solution
    const a2 = a === 2 ? 3 : 2;
    const d = ri(-8, 8);
    eq = `${linearTex(a, b)} = ${linearTex(a2, d)}`;
    answer = 0;
    explanation = `The coefficients of ${kI('x')} are different (${a} vs ${a2}), so there is exactly one solution.`;
  } else if (caseType === 1) {
    // Same coefficient, different constant → no solution
    const d = b + (b === 0 ? ri(1,5) : (Math.random() < .5 ? ri(1,5) : -ri(1,5)));
    eq = `${linearTex(a, b)} = ${linearTex(a, d)}`;
    answer = 1;
    explanation = `After subtracting ${kI(`${a}x`)} from both sides: ${kI(`${b} = ${d}`)}, which is false — no solution.`;
  } else {
    // Identical → infinitely many
    eq = `${linearTex(a, b)} = ${linearTex(a, b)}`;
    answer = 2;
    explanation = `Both sides are identical — every value of ${kI('x')} is a solution.`;
  }
  return {
    html: `How many solutions does this equation have?${kD(eq)}`,
    type: 'mcq',
    choices: ['One solution', 'No solution', 'Infinitely many solutions'],
    correctIdx: answer,
    solutionHtml: explanation
  };
};

// --- 1.3  Interval Notation / Inequalities  ax + b < c  (ask for boundary) ---
GEN['CA_1_3'] = function() {
  const a = ri(2, 6);
  const b = ri(-10, 10);
  const c = ri(-10, 10);
  // a*x + b < c  →  x < (c-b)/a
  const [num, den] = reduceFrac(c - b, a);
  const bound = num / den;
  const sym = pick(['<', '\\le', '>', '\\ge']);
  // Flip direction if a < 0 (but we keep a > 0 here for simplicity)
  const dirLabel = (sym === '<' || sym === '\\le') ? 'less than' : 'greater than';
  return {
    html: `Solve: ${kD(`${a}x ${b >= 0 ? '+ ' + b : '- ' + Math.abs(b)} ${sym} ${c}`)}
           Enter the boundary value (exact, as a fraction or integer):`,
    type: 'numeric',
    answer: bound,
    solutionHtml:
      kD(`${a}x ${sym} ${c} ${b >= 0 ? '-' : '+'} ${Math.abs(b)} = ${c - b}`) +
      kD(`x ${sym} ${fracTex(c - b, a)}`)
  };
};

// --- 1.6  Absolute Value Equations  |x + b| = c ---
GEN['CA_1_6'] = function() {
  // Keep it: a = 1 for clean algebra
  const b = ri(-6, 6);
  const c = ri(1, 9);
  const x1 = c - b;   // from  x + b = c
  const x2 = -c - b;  // from  x + b = -c
  const bSign = b > 0 ? `+ ${b}` : b < 0 ? `- ${Math.abs(b)}` : '';
  const inner = b === 0 ? 'x' : `x ${bSign}`;
  return {
    html: `Solve: ${kD(`|${inner}| = ${c}`)} Enter both solutions (smaller, then larger):`,
    type: 'numeric2',
    answers: [Math.min(x1, x2), Math.max(x1, x2)],
    labels: ['smaller', 'larger'],
    solutionHtml:
      `Set up two equations:` +
      kD(`${inner} = ${c}  \\implies  x = ${c - b}`) +
      kD(`${inner} = -${c} \\implies  x = ${-c - b}`)
  };
};

// --- 2.1  Slope from two points ---
GEN['CA_2_1'] = function() {
  // Pick rise and run, build two points
  const rise = ri(-7, 7);
  const run = ri(1, 6) * (Math.random() < .5 ? 1 : -1);
  const x1 = ri(-4, 4);
  const y1 = ri(-5, 5);
  const x2 = x1 + run;
  const y2 = y1 + rise;
  const [rN, rD] = reduceFrac(rise, run);
  const slopeVal = rN / rD;
  return {
    html: `Find the slope of the line through ${kI(`(${x1},\\ ${y1})`)} and ${kI(`(${x2},\\ ${y2})`)}.<br>
           <span class="ans-hint">Enter as a fraction (e.g. <code>-3/2</code>) or integer.</span>`,
    type: 'numeric',
    answer: slopeVal,
    solutionHtml:
      kD(`m = \\frac{y_2 - y_1}{x_2 - x_1} = \\frac{${y2} - (${y1})}{${x2} - (${x1})} = \\frac{${rise}}{${run}} = ${rD === 1 ? rN : fracTex(rN, rD)}`)
  };
};

// --- 2.2  Slope-intercept form: given m and a point, find y-intercept ---
GEN['CA_2_2'] = function() {
  const m = ri(-5, 5) || 1; // avoid 0
  const x0 = ri(-4, 4);
  const y0 = ri(-8, 8);
  const b = y0 - m * x0;
  const mStr = m === 1 ? '' : m === -1 ? '-' : `${m}`;
  return {
    html: `A line has slope ${kI(`m = ${m}`)} and passes through ${kI(`(${x0},\\ ${y0})`)}.
           What is the ${kI('y')}-intercept?`,
    type: 'numeric',
    answer: b,
    solutionHtml:
      `Use ${kI('y = mx + b')}: substitute the point and slope.` +
      kD(`${y0} = ${m}(${x0}) + b`) +
      kD(`b = ${y0} - ${m >=0 ? m+'(' : '('+m+'('}${x0}) = ${y0} - (${m * x0}) = ${b}`)
  };
};

// --- 3.1  Function evaluation ---
GEN['CA_3_1'] = function() {
  const type = pick([0, 1]); // 0 = linear, 1 = quadratic
  if (type === 0) {
    const a = ri(-5, 5) || 2;
    const b = ri(-8, 8);
    const x = ri(-4, 4);
    const ans = a * x + b;
    return {
      html: `Let ${kI(`f(x) = ${linearTex(a, b)}`)}.  Find ${kI(`f(${x})`)}:`,
      type: 'numeric',
      answer: ans,
      solutionHtml: kD(`f(${x}) = ${a}(${x}) + ${b} = ${a*x} + ${b} = ${ans}`)
    };
  } else {
    const a = ri(1, 3);
    const b = ri(-4, 4);
    const c = ri(-6, 6);
    const x = ri(-3, 3);
    const ans = a * x * x + b * x + c;
    return {
      html: `Let ${kI(`f(x) = ${quadTex(a, b, c)}`)}.  Find ${kI(`f(${x})`)}:`,
      type: 'numeric',
      answer: ans,
      solutionHtml: kD(`f(${x}) = ${a}(${x})^2 + ${b}(${x}) + ${c} = ${a*x*x} ${b*x >= 0 ? '+' : ''} ${b*x} + ${c} = ${ans}`)
    };
  }
};

// --- 3.3  Function composition f(g(x)) at a point ---
GEN['CA_3_3'] = function() {
  const a = ri(-4, 4) || 1;
  const b = ri(-5, 5);
  const c = ri(-4, 4) || 2;
  const d = ri(-5, 5);
  const x = ri(-3, 3);
  // f(x) = ax + b, g(x) = cx + d
  // f(g(x)) = a(cx+d)+b = acx + ad + b
  const gx = c * x + d;
  const fgx = a * gx + b;
  const opType = pick(['composition', 'sum']);
  if (opType === 'composition') {
    return {
      html: `Let ${kI(`f(x) = ${linearTex(a, b)}`)} and ${kI(`g(x) = ${linearTex(c, d)}`)}.
             Find ${kI(`f(g(${x}))`)}:`,
      type: 'numeric',
      answer: fgx,
      solutionHtml:
        kD(`g(${x}) = ${c}(${x}) + ${d} = ${gx}`) +
        kD(`f(g(${x})) = f(${gx}) = ${a}(${gx}) + ${b} = ${fgx}`)
    };
  } else {
    const sumAns = (a + c) * x + (b + d);
    return {
      html: `Let ${kI(`f(x) = ${linearTex(a, b)}`)} and ${kI(`g(x) = ${linearTex(c, d)}`)}.
             Find ${kI(`(f + g)(${x})`)}:`,
      type: 'numeric',
      answer: sumAns,
      solutionHtml:
        kD(`(f+g)(${x}) = f(${x}) + g(${x}) = (${a*x + b}) + (${c*x + d}) = ${sumAns}`)
    };
  }
};

// --- 3.5  Inverse functions: find f⁻¹(c) where f is linear ---
GEN['CA_3_5'] = function() {
  const a = ri(2, 7);
  const b = ri(-8, 8);
  const yVal = ri(-6, 6) * a + b; // ensures x = (yVal - b)/a is integer
  const xAns = (yVal - b) / a;
  return {
    html: `Let ${kI(`f(x) = ${linearTex(a, b)}`)}.  Find ${kI(`f^{-1}(${yVal})`)}:`,
    type: 'numeric',
    answer: xAns,
    solutionHtml:
      `Set ${kI(`y = ${linearTex(a, b)}`)} and solve for ${kI('x')}:` +
      kD(`${yVal} = ${a}x + ${b} \\implies x = ${fracTex(yVal - b, a)} = ${xAns}`)
  };
};

// --- 4.1  Solving by Factoring  x² + bx + c = 0 ---
GEN['CA_4_1'] = function() {
  // r1, r2 are the ROOTS: (x - r1)(x - r2) = x² - (r1+r2)x + r1*r2
  const r1 = ri(-7, 7);
  let r2 = ri(-7, 7);
  if (r2 === r1) r2 = r1 + pick([-2, -1, 1, 2]);
  const b = -(r1 + r2); // coefficient of x
  const c = r1 * r2;
  const f1 = r1 <= 0 ? `+ ${Math.abs(r1)}` : `- ${r1}`;
  const f2 = r2 <= 0 ? `+ ${Math.abs(r2)}` : `- ${r2}`;
  return {
    html: `Solve by factoring: ${kD(quadTex(1, b, c) + ' = 0')} Enter both solutions:`,
    type: 'numeric2',
    answers: [Math.min(r1, r2), Math.max(r1, r2)],
    labels: ['smaller x', 'larger x'],
    solutionHtml:
      kD(`(x ${f1})(x ${f2}) = 0`) +
      kD(`x = ${r1} \\text{ or } x = ${r2}`)
  };
};

// --- 4.3  Completing the Square — find vertex ---
GEN['CA_4_3'] = function() {
  const h = ri(-5, 5);
  const k = ri(-8, 8);
  // f(x) = (x-h)² + k = x² - 2hx + h² + k
  const b = -2 * h;
  const c = h * h + k;
  return {

      type: 'numeric', answer: m + n,

// --- S.8  Permutations and Combinations ---
GEN['CA_S_8'] = function() {

  function fact(x) { let f = 1; for (let i = 2; i <= x; i++) f *= i; return f; }
  function P(nn, rr) { return fact(nn) / fact(nn - rr); }
  function C(nn, rr) { return fact(nn) / (fact(rr) * fact(nn - rr)); }

  if (usePerm) {
    const ans = P(n, r);
    return {
      html: `In how many ways can ${r} students be chosen <strong>and arranged</strong> from a group of ${n}?
             (Order matters.)`,
      type: 'numeric',
      answer: ans,
      solutionHtml:
        kD(`P(${n},${r}) = \\frac{${n}!}{(${n}-${r})!} = \\frac{${n}!}{${n-r}!} = ${ans}`)
    };
  } else {
    const ans = C(n, r);
    return {
      html: `In how many ways can ${r} students be chosen from a group of ${n}?
             (Order does not matter.)`,
      type: 'numeric',
      answer: ans,
      solutionHtml:
        kD(`C(${n},${r}) = \\binom{${n}}{${r}} = \\frac{${n}!}{${r}!\\cdot${n-r}!} = ${ans}`)
    };
  }
};

  function C(nn, rr) { return fact(nn) / (fact(rr) * fact(nn - rr)); }
  const favColor = pick(['red', 'blue', 'green']);
  const nFav = ri(r, Math.min(n - 1, r + 2));
  const fav = C(nFav, r);
  const total = C(n, r);
  const [pN, pD] = reduceFrac(fav, total);
  return {
    html: `A bag has ${n} marbles: ${nFav} ${favColor} and ${n - nFav} other colors.
           If ${r} marbles are drawn at random (without replacement), what is the probability all are ${favColor}?
           <span class="ans-hint">Enter as a fraction.</span>`,
    type: 'numeric',
    answer: pN / pD,
    solutionHtml:
      kD(`P = \\frac{C(${nFav},${r})}{C(${n},${r})} = \\frac{${fav}}{${total}} = ${pD === 1 ? pN : fracTex(pN, pD)}`)
  };
};


/* ─────────────────────────────────────────────
   RENDERING
───────────────────────────────────────────── */
function buildNumericCard(num, section, prob, idx) {
  const id = `p${idx}`;
  return `
    <div class="prob-card" id="card-${idx}">
      <div class="prob-num">Problem ${num}</div>
      <div class="prob-tag">§${section.section} — ${section.title}</div>
      <div class="prob-statement">${prob.html}</div>
      <div class="answer-area">
        <div class="input-row">
          <label class="input-label" for="${id}">Answer:</label>
          <input class="ans-input" id="${id}" type="text" autocomplete="off" placeholder="e.g. 5 or -3/2">
        </div>
        <button class="check-btn" onclick="checkNumeric(${idx}, ${prob.answer})">Check Answer</button>
        <div class="feedback" id="fb-${idx}"></div>
        <div class="solution-body" id="sol-${idx}" style="display:none"></div>
      </div>
    </div>`;
}

function buildNumeric2Card(num, section, prob, idx) {
  const id1 = `p${idx}a`, id2 = `p${idx}b`;
  const [ans1, ans2] = prob.answers;
  const [lbl1, lbl2] = prob.labels || ['first', 'second'];
  return `
    <div class="prob-card" id="card-${idx}">
      <div class="prob-num">Problem ${num}</div>
      <div class="prob-tag">§${section.section} — ${section.title}</div>
      <div class="prob-statement">${prob.html}</div>
      <div class="answer-area">
        <div class="input-row">
          <label class="input-label" for="${id1}">${lbl1}:</label>
          <input class="ans-input" id="${id1}" type="text" autocomplete="off" placeholder="e.g. -3">
        </div>
        <div class="input-row">
          <label class="input-label" for="${id2}">${lbl2}:</label>
          <input class="ans-input" id="${id2}" type="text" autocomplete="off" placeholder="e.g. 5">
        </div>
        <button class="check-btn" onclick="checkNumeric2(${idx}, ${ans1}, ${ans2})">Check Answer</button>
        <div class="feedback" id="fb-${idx}"></div>
        <div class="solution-body" id="sol-${idx}" style="display:none"></div>
      </div>
    </div>`;
}

function buildMCQCard(num, section, prob, idx) {
  const btnHtml = prob.choices.map((c, i) =>
    `<button class="mcq-btn" id="mc-${idx}-${i}" onclick="checkMCQ(${idx}, ${i}, ${prob.correctIdx})">${c}</button>`
  ).join('');
  return `
    <div class="prob-card" id="card-${idx}">
      <div class="prob-num">Problem ${num}</div>
      <div class="prob-tag">§${section.section} — ${section.title}</div>
      <div class="prob-statement">${prob.html}</div>
      <div class="answer-area">
        <div class="mcq-opts">${btnHtml}</div>
        <div class="feedback" id="fb-${idx}"></div>
        <div class="solution-body" id="sol-${idx}" style="display:none"></div>
      </div>
    </div>`;
}

function buildComplex2Card(num, section, prob, idx) {
  const idR = `p${idx}r`, idI = `p${idx}i`;
  return `
    <div class="prob-card" id="card-${idx}">
      <div class="prob-num">Problem ${num}</div>
      <div class="prob-tag">§${section.section} — ${section.title}</div>
      <div class="prob-statement">${prob.html}</div>
      <div class="answer-area">
        <div class="input-row">
          <label class="input-label" for="${idR}">Real part:</label>
          <input class="ans-input" id="${idR}" type="text" autocomplete="off" placeholder="e.g. 3">
        </div>
        <div class="input-row">
          <label class="input-label" for="${idI}">Imaginary part:</label>
          <input class="ans-input" id="${idI}" type="text" autocomplete="off" placeholder="e.g. -2  (for −2i)">
        </div>
        <button class="check-btn" onclick="checkComplex(${idx}, ${prob.realPart}, ${prob.imagPart})">Check Answer</button>
        <div class="feedback" id="fb-${idx}"></div>
        <div class="solution-body" id="sol-${idx}" style="display:none"></div>
      </div>
    </div>`;
}

function buildFallbackCard(num, section, idx) {
  const folder = encodeURIComponent('College Algebra');
  const base = section.practiceFile.replace(/\.(html|docx|pdf)$/i, '');
  const url = BASE + folder + '/' + encodeURIComponent(base) + '.html';
  return `
    <div class="prob-card" id="card-${idx}">
      <div class="prob-num">Problem ${num}</div>
      <div class="prob-tag">§${section.section} — ${section.title}</div>
      <div class="prob-statement">
        <strong>${section.title}</strong><br>
        <span style="color:var(--muted);font-size:.9rem">${section.swbat}.</span>
      </div>
      <div class="practice-fallback">
        <p>Auto-graded problems for this topic are coming soon. Open the practice page to work on problems:</p>
        <a class="prac-btn" href="${url}" target="_blank">
          Open Practice Problems ↗
        </a>
      </div>
    </div>`;
}


/* ─────────────────────────────────────────────
   GRADING FUNCTIONS
───────────────────────────────────────────── */
function lockCard(idx) {
  document.querySelectorAll(`#card-${idx} .ans-input`).forEach(el => el.disabled = true);
  document.querySelectorAll(`#card-${idx} .check-btn`).forEach(el => el.disabled = true);
  document.querySelectorAll(`#card-${idx} .mcq-btn`).forEach(el => el.disabled = true);
}
function showSolution(idx, solHtml) {
  const sol = document.getElementById(`sol-${idx}`);
  if (sol) { sol.innerHTML = `<span class="solution-label">Solution</span>${solHtml}`; sol.style.display = 'block'; }
}
function showFeedback(idx, correct, solutionHtml) {
  const fb = document.getElementById(`fb-${idx}`);
  if (!fb) return;
  fb.className = `feedback show ${correct ? 'correct-fb' : 'wrong-fb'}`;
  fb.innerHTML = `<span class="fb-icon">${correct ? '✓' : '✗'}</span> ${correct ? 'Correct!' : 'Not quite.'}`;
  lockCard(idx);
  showSolution(idx, solutionHtml);
}

// Stored solution HTML per card (set during render)
const _solutions = {};

function checkNumeric(idx, answer) {
  const val = parseNum(document.getElementById(`p${idx}`)?.value || '');
  if (isNaN(val)) return;
  showFeedback(idx, approxEq(val, answer), _solutions[idx]);
}
function checkNumeric2(idx, ans1, ans2) {
  const v1 = parseNum(document.getElementById(`p${idx}a`)?.value || '');
  const v2 = parseNum(document.getElementById(`p${idx}b`)?.value || '');
  if (isNaN(v1) || isNaN(v2)) return;
  // Accept either order
  const correct = (approxEq(v1, ans1) && approxEq(v2, ans2)) ||
                  (approxEq(v1, ans2) && approxEq(v2, ans1));
  showFeedback(idx, correct, _solutions[idx]);
}
function checkMCQ(idx, chosen, correct) {
  const btns = document.querySelectorAll(`#card-${idx} .mcq-btn`);
  btns.forEach((b, i) => {
    if (i === correct) b.className = 'mcq-btn ' + (i === chosen ? 'correct' : 'reveal');
    else if (i === chosen) b.className = 'mcq-btn wrong';
    else b.disabled = true;
  });
  const fb = document.getElementById(`fb-${idx}`);
  if (fb) {
    fb.className = `feedback show ${chosen === correct ? 'correct-fb' : 'wrong-fb'}`;
    fb.innerHTML = `<span class="fb-icon">${chosen === correct ? '✓' : '✗'}</span> ${chosen === correct ? 'Correct!' : 'Not quite — the correct answer is highlighted.'}`;
  }
  lockCard(idx);
  showSolution(idx, _solutions[idx]);
}
function checkComplex(idx, realAns, imagAns) {
  const r = parseNum(document.getElementById(`p${idx}r`)?.value || '');
  const im = parseNum(document.getElementById(`p${idx}i`)?.value || '');
  if (isNaN(r) || isNaN(im)) return;
  showFeedback(idx, approxEq(r, realAns) && approxEq(im, imagAns), _solutions[idx]);
}


/* ─────────────────────────────────────────────
   MAIN
───────────────────────────────────────────── */
async function init() {
  const today = todayStr();
  document.getElementById('dateLabel').textContent = fmtDate(today);

  let state, sections, calendar;
  try {
    [state, sections, calendar] = await Promise.all([
      fetch(BASE + 'state.json?_=' + Date.now()).then(r => r.json()),
      fetch(BASE + 'sections.json?_=' + Date.now()).then(r => r.json()),
      fetch(BASE + 'calendar.json?_=' + Date.now()).then(r => r.json()),
    ]);
  } catch(e) {
    document.getElementById('mainArea').innerHTML =
      `<div class="empty-state"><div class="icon">⚠️</div><h2>Couldn't load data</h2><p>Check your connection and refresh.</p></div>`;
    return;
  }

  const isSchoolDay = calendar.aDays.includes(today) || calendar.bDays.includes(today);
  const label = isSchoolDay ? 'Do Now' : 'Review';
  document.getElementById('doNowLabel').textContent = label;
  if (!isSchoolDay) {
    document.getElementById('subtitle').textContent = 'No class today — here\'s some review practice.';
  }

  const caState = state.courses?.collegeAlgebra;
  const allSections = sections.collegeAlgebra || [];
  const completed = caState?.completedSections || [];
  // Only pick sections that have a generator (skip fallback-only sections)
  const doneSections = allSections.filter(s => completed.includes(s.id) && GEN[s.id]);

  if (doneSections.length === 0) {
    document.getElementById('mainArea').innerHTML = `
      <div class="empty-state">
        <div class="icon">📚</div>
        <h2>Nothing here yet</h2>
        <p>Do Now problems will appear once the first CA section is completed.<br>Check back after class!</p>
      </div>`;
    return;
  }

  // Pick 2 sections — date-seeded, recency-biased (recent sections ~3x more likely)
  function seededWeightedPick(pool, dateStr, salt) {
    const weights = pool.map((_, i) => Math.pow(1.06, i)); // exponential: later = more recent = higher weight
    const total = weights.reduce((a, b) => a + b, 0);
    const h = hashStr(dateStr + salt);
    let target = (h / 0xffffffff) * total;
    for (let i = 0; i < pool.length; i++) {
      target -= weights[i];
      if (target <= 0) return i;
    }
    return pool.length - 1;
  }

  const n = doneSections.length;
  let i1 = seededWeightedPick(doneSections, today, 'prob1');
  let i2 = seededWeightedPick(doneSections, today, 'prob2');
  if (n > 1 && i2 === i1) i2 = (i1 + 1) % n;

  const secs = n === 1 ? [doneSections[0], doneSections[0]] : [doneSections[i1], doneSections[i2]];

  let html = '<div class="problems-grid">';
  secs.forEach((sec, idx) => {
    const gen = GEN[sec.id];
    if (gen) {
      const prob = gen();
      _solutions[idx] = prob.solutionHtml;
      if (prob.type === 'numeric') html += buildNumericCard(idx + 1, sec, prob, idx);
      else if (prob.type === 'numeric2') html += buildNumeric2Card(idx + 1, sec, prob, idx);
      else if (prob.type === 'mcq')     html += buildMCQCard(idx + 1, sec, prob, idx);
      else if (prob.type === 'complex2') html += buildComplex2Card(idx + 1, sec, prob, idx);
      else html += buildFallbackCard(idx + 1, sec, idx);
    } else {
      html += buildFallbackCard(idx + 1, sec, idx);
    }
  });
  html += '</div>';
  html += `<p style="text-align:center;color:var(--muted);font-size:.78rem;margin-top:1.2rem">
    Refresh the page for new numbers (same topics). Answers lock after first submission.
  </p>`;
  document.getElementById('mainArea').innerHTML = html;
}

init();
</script>
