<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Review — Cardinal Ritter Prep Math</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d1117;color:#e6edf3;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}
header{background:#161b22;border-bottom:1px solid #30363d;padding:1.1rem 1.5rem;display:flex;align-items:center;gap:1rem;flex-wrap:wrap}
.back{color:#8b949e;text-decoration:none;font-size:.85rem}.back:hover{color:#e6edf3}
header h1{font-size:1.2rem;font-weight:700;flex:1}

/* Course toggle */
.course-toggle{display:flex;gap:.5rem;padding:1rem 1.5rem .5rem;max-width:900px;margin:0 auto}
.course-btn{padding:.4rem 1.1rem;border-radius:20px;font-size:.82rem;font-weight:600;cursor:pointer;border:1px solid #30363d;background:#161b22;color:#8b949e;transition:all .15s}
.course-btn.active.ca{background:#5bc8d41a;border-color:#5bc8d4;color:#5bc8d4}
.course-btn.active.c2{background:#a78bfa1a;border-color:#a78bfa;color:#a78bfa}

/* Section picker */
.section-row{padding:.25rem 1.5rem .75rem;max-width:900px;margin:0 auto;display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.section-row label{font-size:.78rem;color:#8b949e;font-weight:600;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap}
select#sectionPicker{background:#161b22;border:1px solid #30363d;color:#e6edf3;padding:.4rem .8rem;border-radius:8px;font-size:.85rem;cursor:pointer;flex:1;max-width:420px}
select#sectionPicker:focus{outline:none;border-color:#555}
.prob-count{font-size:.75rem;color:#8b949e;white-space:nowrap}

/* Problem cards */
.problems-wrap{max-width:900px;margin:0 auto;padding:0 1.5rem 3rem}
.prob-card{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:1.25rem 1.4rem;margin-bottom:.85rem}
.prob-card.ca-card{border-left:3px solid #5bc8d466}
.prob-card.c2-card{border-left:3px solid #a78bfa66}
.prob-num{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#8b949e;margin-bottom:.5rem}
.prob-text{font-size:.975rem;line-height:1.75}
.prob-text .katex-display{margin:.5rem 0}

/* Controls */
.controls{display:flex;gap:.75rem;align-items:center;padding:.5rem 1.5rem 1rem;max-width:900px;margin:0 auto;flex-wrap:wrap}
.new-set-btn{padding:.5rem 1.3rem;border-radius:20px;font-size:.85rem;font-weight:600;cursor:pointer;border:1px solid;transition:all .15s;background:transparent}
.new-set-btn.ca{color:#5bc8d4;border-color:#5bc8d4}.new-set-btn.ca:hover{background:#5bc8d41a}
.new-set-btn.c2{color:#a78bfa;border-color:#a78bfa}.new-set-btn.c2:hover{background:#a78bfa1a}
.set-note{font-size:.75rem;color:#8b949e}

/* Empty / loading states */
.state-msg{text-align:center;padding:3rem 1rem;color:#8b949e;font-size:.9rem;font-style:italic}

/* No problems notice */
.no-probs{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:1.5rem;text-align:center;color:#8b949e;font-size:.88rem}
</style>
</head>
<body>
<header>
  <a href="./index.html" class="back">← Portal</a>
  <h1>📚 Review</h1>
</header>

<div class="course-toggle">
  <button class="course-btn active ca" id="btnCA" onclick="setCourse('ca')">College Algebra</button>
  <button class="course-btn c2" id="btnC2" onclick="setCourse('c2')">Calculus 2</button>
</div>

<div class="section-row">
  <label>Section</label>
  <select id="sectionPicker" onchange="loadSection()">
    <option value="">Loading…</option>
  </select>
  <span class="prob-count" id="probCount"></span>
</div>

<div class="controls">
  <button class="new-set-btn ca" id="newSetBtn" onclick="newSet()">↺ New Set</button>
  <span class="set-note" id="setNote"></span>
</div>

<div class="problems-wrap" id="problemsWrap">
  <div class="state-msg" id="stateMsg">Loading…</div>
</div>

<script>
// ── Math rendering ──────────────────────────────────────────────────────────
function renderMath(text) {
  if (!text) return '';
  // Unescape HTML entities
  text = text.replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>')
             .replace(/&ldquo;/g,'"').replace(/&rdquo;/g,'"').replace(/&mdash;/g,'—');
  // Split on math delimiters: $$, $, \[...\], \(...\)
  const parts = text.split(/(\$\$[\s\S]*?\$\$|\$[^$\n]*?\$|\\\[[\s\S]*?\\\]|\\\([\s\S]*?\\\))/g);
  return parts.map(p => {
    let display = false, tex = null;
    if (p.startsWith('$$') && p.endsWith('$$'))       { display=true;  tex=p.slice(2,-2); }
    else if (p.startsWith('$') && p.endsWith('$'))    { display=false; tex=p.slice(1,-1); }
    else if (p.startsWith('\\[') && p.endsWith('\\]')){ display=true;  tex=p.slice(2,-2); }
    else if (p.startsWith('\\(') && p.endsWith('\\)')){ display=false; tex=p.slice(2,-2); }
    if (tex !== null) {
      tex = tex.replace(/\\displaystyle\b/g,'').trim();
      try { return katex.renderToString(tex, {displayMode:display, throwOnError:false}); }
      catch(e) { return p; }
    }
    return p;
  }).join('');
}

// ── State ───────────────────────────────────────────────────────────────────
let sectionsData = null;
let stateData = null;
let currentCourse = 'ca';
let currentSectionId = null;
let currentProblems = [];
const PROBS_PER_SET = 5;

// ── Boot ────────────────────────────────────────────────────────────────────
// Parse ?section= URL param
const urlSection = new URLSearchParams(window.location.search).get('section');

Promise.all([
  fetch('./state.json').then(r=>r.json()),
  fetch('./sections.json').then(r=>r.json())
]).then(([state, sections]) => {
  stateData = state;
  sectionsData = sections;
  // Auto-detect course from URL param
  const initCourse = urlSection && urlSection.startsWith('C2_') ? 'c2' : 'ca';
  setCourse(initCourse);
}).catch(() => {
  document.getElementById('stateMsg').textContent = 'Could not load data.';
});

// ── Course toggle ───────────────────────────────────────────────────────────
function setCourse(course) {
  currentCourse = course;
  document.getElementById('btnCA').className = 'course-btn' + (course==='ca' ? ' active ca' : '');
  document.getElementById('btnC2').className = 'course-btn' + (course==='c2' ? ' active c2' : '');
  document.getElementById('newSetBtn').className = 'new-set-btn ' + course;
  populatePicker();
}

// ── Build section picker from completed sections ─────────────────────────────
function populatePicker() {
  const picker = document.getElementById('sectionPicker');
  const courseKey = currentCourse === 'ca' ? 'collegeAlgebra' : 'calc2';
  const completedIds = stateData?.courses?.[courseKey]?.completedSections || [];
  const currentId   = stateData?.courses?.[courseKey]?.currentSection;
  const allIds = currentId ? [...completedIds, currentId] : completedIds;

  // Build lookup from sections.json
  const courseArr = sectionsData?.[courseKey] || [];
  const secMap = {};
  courseArr.forEach(s => secMap[s.id] = s);

  // Filter to sections that have review problems
  const available = allIds.filter(id => {
    const s = secMap[id];
    return s && s.reviewProblems && s.reviewProblems.length > 0;
  });

  picker.innerHTML = '';
  if (available.length === 0) {
    picker.innerHTML = '<option value="">No review problems yet</option>';
    document.getElementById('problemsWrap').innerHTML = '<div class="no-probs">No review problems available for completed sections yet.</div>';
    document.getElementById('probCount').textContent = '';
    return;
  }

  available.forEach(id => {
    const s = secMap[id];
    const opt = document.createElement('option');
    opt.value = id;
    opt.textContent = '§' + s.section + ' — ' + s.title + ' (' + s.reviewProblems.length + ')';
    picker.appendChild(opt);
  });

  // Default to URL param section if present and available, else last completed
  if (urlSection && available.includes(urlSection)) {
    picker.value = urlSection;
  } else {
    picker.value = available[available.length - 1];
  }
  loadSection();
}

// ── Load problems for selected section ──────────────────────────────────────
function loadSection() {
  const picker = document.getElementById('sectionPicker');
  currentSectionId = picker.value;
  if (!currentSectionId) return;

  const courseKey = currentCourse === 'ca' ? 'collegeAlgebra' : 'calc2';
  const courseArr = sectionsData?.[courseKey] || [];
  const sec = courseArr.find(s => s.id === currentSectionId);
  if (!sec || !sec.reviewProblems) {
    document.getElementById('problemsWrap').innerHTML = '<div class="no-probs">No review problems for this section.</div>';
    document.getElementById('probCount').textContent = '';
    return;
  }

  currentProblems = [...sec.reviewProblems];
  document.getElementById('probCount').textContent = currentProblems.length + ' problems in pool';
  newSet();
}

// ── Display a random set of PROBS_PER_SET problems ───────────────────────────
function newSet() {
  if (!currentProblems.length) return;

  // Shuffle and pick
  const shuffled = [...currentProblems].sort(() => Math.random() - 0.5);
  const set = shuffled.slice(0, PROBS_PER_SET);
  const cardClass = currentCourse === 'ca' ? 'ca-card' : 'c2-card';

  const html = set.map((prob, i) =>
    '<div class="prob-card ' + cardClass + '">' +
    '<div class="prob-num">Problem ' + (i+1) + '</div>' +
    '<div class="prob-text">' + renderMath(prob) + '</div>' +
    '</div>'
  ).join('');

  document.getElementById('problemsWrap').innerHTML = html;
  document.getElementById('stateMsg') && (document.getElementById('stateMsg').style.display='none');

  const remaining = currentProblems.length;
  document.getElementById('setNote').textContent =
    'Showing ' + set.length + ' of ' + remaining + ' problems · shuffled each time';
}
</script>
</body>
</html>
