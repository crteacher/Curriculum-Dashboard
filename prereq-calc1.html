<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PreCalc Highlights — Cardinal Ritter Prep</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
  <style>
    :root {
      --bg: #f4f4f4; --card: #ffffff; --accent: #1e3a5c;
      --accent-green: #1a7a3a; --accent-red: #b91c1c;
      --text: #111111; --muted: #555555; --border: #e0e0e0;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family:'Segoe UI',system-ui,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; padding:2rem 1rem 3rem; }
    .page-header { text-align:center; margin-bottom:2rem; }
    .page-header .date-label { font-size:.82rem; color:var(--muted); letter-spacing:.1em; text-transform:uppercase; margin-bottom:.35rem; }
    .page-header h1 { font-size:1.9rem; font-weight:700; }
    .page-header h1 span { color:var(--accent); }
    .page-header .subtitle { font-size:.9rem; color:var(--muted); margin-top:.4rem; max-width:620px; margin-left:auto; margin-right:auto; }
    .refresh-bar { text-align:center; margin-bottom:1.6rem; }
    .refresh-btn { background:var(--accent); color:#fff; border:none; border-radius:8px; font-size:.9rem; font-weight:600; padding:.55rem 1.2rem; cursor:pointer; }
    .refresh-btn:hover { opacity:.9; }
    .problems-grid { display:grid; grid-template-columns:1fr 1fr; gap:1.5rem; max-width:980px; margin:0 auto; }
    @media (max-width:680px) { .problems-grid { grid-template-columns:1fr; } }
    .prob-card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:1.7rem; display:flex; flex-direction:column; gap:.9rem; }
    .prob-num { font-size:.7rem; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); }
    .prob-tag { display:inline-block; font-size:.68rem; font-weight:700; letter-spacing:.08em; text-transform:uppercase; background:#eaf0f7; color:#1e3a5c; padding:.22rem .65rem; border-radius:999px; }
    .prob-statement { font-size:1rem; line-height:1.7; }
    .prob-statement .katex-display { margin:.6rem 0; }
    .answer-area { display:flex; flex-direction:column; gap:.55rem; }
    .input-row { display:flex; align-items:center; gap:.5rem; }
    .input-label { font-size:.82rem; color:var(--muted); white-space:nowrap; }
    .ans-input { flex:1; background:#f0ece6; border:1px solid var(--border); border-radius:7px; color:var(--text); font-size:1rem; padding:.48rem .75rem; outline:none; transition:border-color .2s; }
    .ans-input:focus { border-color:var(--accent); }
    .ans-input:disabled { opacity:.45; }
    .ans-hint { font-size:.75rem; color:var(--muted); }
    .mcq-opts { display:flex; flex-direction:column; gap:.45rem; }
    .mcq-btn { background:#f0ece6; border:1px solid var(--border); border-radius:8px; color:var(--text); font-size:.93rem; padding:.55rem 1rem; cursor:pointer; text-align:left; transition:border-color .2s, background .2s; }
    .mcq-btn:hover:not([disabled]) { border-color:var(--accent); background:rgba(30,58,92,.08); }
    .mcq-btn[disabled] { cursor:default; }
    .mcq-btn.correct { border-color:var(--accent-green) !important; background:rgba(26,122,58,.12) !important; color:var(--accent-green); }
    .mcq-btn.wrong { border-color:var(--accent-red) !important; background:rgba(247,79,79,.1) !important; color:var(--accent-red); opacity:.65; }
    .mcq-btn.reveal { border-color:var(--accent-green) !important; background:rgba(26,122,58,.08) !important; color:var(--accent-green); }
    .check-btn { background:var(--accent); color:#fff; border:none; border-radius:8px; font-size:.93rem; font-weight:600; padding:.6rem 1.15rem; cursor:pointer; align-self:flex-start; transition:opacity .2s; }
    .check-btn:hover:not([disabled]) { opacity:.88; }
    .check-btn[disabled] { opacity:.4; cursor:default; }
    .feedback { border-radius:8px; padding:.7rem .95rem; font-size:.88rem; line-height:1.55; display:none; }
    .feedback.show { display:block; }
    .feedback.correct-fb { background:rgba(26,122,58,.1); border:1px solid rgba(26,122,58,.28); }
    .feedback.wrong-fb { background:rgba(247,79,79,.08); border:1px solid rgba(247,79,79,.22); }
    .fb-icon { font-size:1rem; margin-right:.25rem; }
    .solution-label { font-size:.7rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin-top:.55rem; margin-bottom:.2rem; display:block; }
    .solution-body { line-height:1.6; }
    .solution-body .katex-display { margin:.4rem 0; }
    .page-footer { text-align:center; margin-top:2.5rem; color:var(--muted); font-size:.78rem; }
    .page-footer a { color:var(--muted); text-decoration:underline; }
    .site-nav{background:#6b1a26;padding:.65rem 1.5rem;}
    .site-nav a{color:rgba(255,255,255,.9);text-decoration:none;font-size:.85rem;font-family:Georgia,serif;}
    .site-nav a:hover{color:#fff;}
  </style>
</head>
<body>

<nav class="site-nav"><a href="./index.html">← Portal</a></nav>
<div class="page-header">
  <div class="date-label">Always Available</div>
  <h1>Calculus I <span>Prerequisite Refresher</span></h1>
  <div class="subtitle">PreCalc highlights you'll need: evaluating polynomial, rational, radical, exponential, log, and trig functions, plus factoring and composition.</div>
</div>

<div class="refresh-bar"><button class="refresh-btn" onclick="location.reload()">🔄 New Numbers</button></div>

<div id="mainArea"><div class="problems-grid" id="problemsWrap"></div></div>

<div class="page-footer"><a href="index.html">Dashboard</a></div>

<script>
/* ── Utilities ───────────────────────────────────────────── */
function ri(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function gcd(a,b){ a=Math.abs(a); b=Math.abs(b); while(b){ [a,b]=[b,a%b]; } return a; }
function reduceFrac(n,d){ if(d===0) return [n,d]; const g=gcd(Math.abs(n),Math.abs(d)); n/=g; d/=g; if(d<0){n=-n;d=-d;} return [n,d]; }
function fracTex(n,d){ [n,d]=reduceFrac(n,d); if(d===1) return `${n}`; return `\\dfrac{${n}}{${d}}`; }
function termTex(coeff,varStr,power){ if(coeff===0) return ''; let base=''; if(power===0) base=''; else if(power===1) base=varStr; else base=`${varStr}^${power}`; const absC=Math.abs(coeff); if(base==='') return `${coeff}`; if(absC===1) return coeff>0?base:`-${base}`; return `${coeff}${base}`; }
function linearTex(a,b,v='x'){ if(a===0&&b===0) return '0'; const aStr=termTex(a,v,1); if(b===0) return aStr||'0'; if(a===0) return `${b}`; return b>0?`${aStr} + ${b}`:`${aStr} - ${Math.abs(b)}`; }
function quadTex(a,b,c,v='x'){ let parts=[]; if(a!==0) parts.push(termTex(a,v,2)); if(b!==0){ const bStr=termTex(Math.abs(b),v,1); if(parts.length) parts.push(b>0?`+ ${bStr}`:`- ${bStr}`); else parts.push(termTex(b,v,1)); } if(c!==0){ if(parts.length) parts.push(c>0?`+ ${c}`:`- ${Math.abs(c)}`); else parts.push(`${c}`); } return parts.join(' ')||'0'; }
function kD(tex){ try{ return katex.renderToString(tex,{displayMode:true,throwOnError:false}); } catch(e){ return tex; } }
function kI(tex){ try{ return katex.renderToString(tex,{displayMode:false,throwOnError:false}); } catch(e){ return tex; } }
function parseNum(s){ if(!s||!s.trim()) return NaN; s=s.trim().replace(/\s+/g,''); const m=s.match(/^(-?\d+)\/(-?\d+)$/); if(m) return parseInt(m[1])/parseInt(m[2]); return parseFloat(s); }
function approxEq(a,b,tol=1e-6){ return Math.abs(a-b)<tol; }

/* ── Trig exact-value tables ─────────────────────────────── */
const VALTEX = {
  '0':'0','1':'1','-1':'-1','1/2':'\\tfrac{1}{2}','-1/2':'-\\tfrac{1}{2}',
  'sqrt2/2':'\\tfrac{\\sqrt{2}}{2}','-sqrt2/2':'-\\tfrac{\\sqrt{2}}{2}',
  'sqrt3/2':'\\tfrac{\\sqrt{3}}{2}','-sqrt3/2':'-\\tfrac{\\sqrt{3}}{2}',
  'sqrt3':'\\sqrt{3}','-sqrt3':'-\\sqrt{3}',
  'sqrt3/3':'\\tfrac{\\sqrt{3}}{3}','-sqrt3/3':'-\\tfrac{\\sqrt{3}}{3}'
};
const SIN_T = {0:'0',30:'1/2',45:'sqrt2/2',60:'sqrt3/2',90:'1',120:'sqrt3/2',135:'sqrt2/2',150:'1/2',180:'0',210:'-1/2',225:'-sqrt2/2',240:'-sqrt3/2',270:'-1',300:'-sqrt3/2',315:'-sqrt2/2',330:'-1/2'};
const COS_T = {0:'1',30:'sqrt3/2',45:'sqrt2/2',60:'1/2',90:'0',120:'-1/2',135:'-sqrt2/2',150:'-sqrt3/2',180:'-1',210:'-sqrt3/2',225:'-sqrt2/2',240:'-1/2',270:'0',300:'1/2',315:'sqrt2/2',330:'sqrt3/2'};
const TAN_T = {0:'0',30:'sqrt3/3',45:'1',60:'sqrt3',120:'-sqrt3',135:'-1',150:'-sqrt3/3',180:'0',210:'sqrt3/3',225:'1',240:'sqrt3',300:'-sqrt3',315:'-1',330:'-sqrt3/3'};

/* ── Generators ──────────────────────────────────────────── */
const TOPICS = [
  {key:'polyEval', label:'Evaluate Polynomial Functions'},
  {key:'rationalEval', label:'Evaluate Rational Functions'},
  {key:'radicalEval', label:'Evaluate Radical Functions'},
  {key:'expEval', label:'Evaluate Exponential Functions'},
  {key:'logEval', label:'Evaluate Logarithms'},
  {key:'trigEval', label:'Evaluate Trig Functions'},
  {key:'factoring', label:'Factoring'},
  {key:'composition', label:'Function Composition'}
];
const GEN = {};

GEN.polyEval = function() {
  const a = ri(1,3), b = ri(-4,4), c = ri(-6,6), x = ri(-3,3);
  const ans = a*x*x + b*x + c;
  return { html:`Let ${kI(`f(x) = ${quadTex(a,b,c)}`)}. Find ${kI(`f(${x})`)}:`, type:'numeric', answer:ans,
    solutionHtml: kD(`f(${x}) = ${a}(${x})^2 + ${b}(${x}) + ${c} = ${a*x*x} ${b*x>=0?'+':''} ${b*x} + ${c} = ${ans}`) };
};

GEN.rationalEval = function() {
  // f(x) = (a x + b) / (c x + d), choose x so denom and result are clean
  const c = ri(1,3), d = ri(-4,4);
  let x;
  do { x = ri(-4,4); } while (c*x + d === 0);
  const denom = c*x + d;
  const a = ri(1,4) * (Math.random()<.5?1:-1);
  const b = ri(-6,6);
  const numer = a*x + b;
  const [rn, rd] = reduceFrac(numer, denom);
  return { html:`Let ${kI(`f(x) = \\dfrac{${linearTex(a,b)}}{${linearTex(c,d)}}`)}. Find ${kI(`f(${x})`)}. <span class="ans-hint">Enter as a reduced fraction or integer.</span>`,
    type:'numeric', answer: rn/rd,
    solutionHtml: kD(`f(${x}) = \\dfrac{${a}(${x}) + ${b}}{${c}(${x}) + ${d}} = \\dfrac{${numer}}{${denom}} = ${rd===1?rn:fracTex(rn,rd)}`) };
};

GEN.radicalEval = function() {
  // f(x) = sqrt(ax+b), pick x so ax+b is a perfect square
  const a = ri(1,4), root = ri(0,6);
  const target = root*root;
  // x such that a*x + b = target; choose b then back out x, or pick x directly
  const x = ri(-4,4);
  const b = target - a*x;
  return { html:`Let ${kI(`f(x) = \\sqrt{${linearTex(a,b)}}`)}. Find ${kI(`f(${x})`)}:`, type:'numeric', answer:root,
    solutionHtml: kD(`f(${x}) = \\sqrt{${a}(${x}) + ${b}} = \\sqrt{${target}} = ${root}`) };
};

GEN.expEval = function() {
  const base = pick([2,3,5,10]);
  const exp = ri(-2,4);
  let ans;
  if (exp >= 0) ans = Math.pow(base, exp);
  else ans = 1/Math.pow(base, -exp);
  return { html:`Evaluate: ${kD(`${base}^{${exp}}`)} <span class="ans-hint">Enter as an integer or fraction (e.g. <code>1/8</code>).</span>`,
    type:'numeric', answer:ans,
    solutionHtml: exp>=0 ? kD(`${base}^{${exp}} = ${ans}`) : kD(`${base}^{${exp}} = \\frac{1}{${base}^{${-exp}}} = \\frac{1}{${Math.pow(base,-exp)}}`) };
};

GEN.logEval = function() {
  const base = pick([2,3,5,10]);
  const exp = ri(1,4);
  const x = Math.pow(base, exp);
  return { html:`Evaluate: ${kD(`\\log_{${base}} ${x}`)}`, type:'numeric', answer:exp,
    solutionHtml: kD(`\\log_{${base}} ${x} = y \\iff ${base}^y = ${x} \\implies y = ${exp}`) };
};

GEN.trigEval = function() {
  const fn = pick(['sin','cos','tan']);
  const table = fn==='sin'?SIN_T : fn==='cos'?COS_T : TAN_T;
  const angles = Object.keys(table).map(Number);
  const angle = pick(angles);
  const correctKey = table[angle];
  const allKeys = Object.keys(VALTEX);
  let distractors = allKeys.filter(k => k !== correctKey);
  distractors = distractors.sort(() => Math.random()-.5).slice(0,3);
  const choiceKeys = [correctKey, ...distractors].sort(() => Math.random()-.5);
  const choices = choiceKeys.map(k => kI(VALTEX[k]));
  const correctIdx = choiceKeys.indexOf(correctKey);
  return { html:`Evaluate: ${kD(`\\${fn}(${angle}^\\circ)`)}`, type:'mcq', choices, correctIdx,
    solutionHtml: `Using the unit circle, ${kI(`\\${fn}(${angle}^\\circ) = ${VALTEX[correctKey]}`)}.` };
};

GEN.factoring = function() {
  const r1 = ri(-7,7);
  let r2 = ri(-7,7);
  if (r2 === r1) r2 = r1 + pick([-2,-1,1,2]);
  const b = -(r1+r2), c = r1*r2;
  return { html:`Solve by factoring: ${kD(quadTex(1,b,c)+' = 0')} Enter both solutions:`,
    type:'numeric2', answers:[Math.min(r1,r2), Math.max(r1,r2)], labels:['smaller x','larger x'],
    solutionHtml: kD(`(x ${r1<=0?'+ '+Math.abs(r1):'- '+r1})(x ${r2<=0?'+ '+Math.abs(r2):'- '+r2}) = 0`) + kD(`x = ${r1} \\text{ or } x = ${r2}`) };
};

GEN.composition = function() {
  const a = ri(-4,4)||1, b = ri(-5,5), c = ri(-4,4)||2, d = ri(-5,5), x = ri(-3,3);
  const gx = c*x+d;
  const fgx = a*gx+b;
  return { html:`Let ${kI(`f(x) = ${linearTex(a,b)}`)} and ${kI(`g(x) = ${linearTex(c,d)}`)}. Find ${kI(`f(g(${x}))`)}:`,
    type:'numeric', answer:fgx,
    solutionHtml: kD(`g(${x}) = ${c}(${x}) + ${d} = ${gx}`) + kD(`f(g(${x})) = f(${gx}) = ${a}(${gx}) + ${b} = ${fgx}`) };
};

/* ── Card builders ───────────────────────────────────────── */
function buildNumericCard(num, label, prob, idx) {
  const id = `p${idx}`;
  return `<div class="prob-card" id="card-${idx}">
    <div class="prob-num">Problem ${num}</div>
    <div class="prob-tag">${label}</div>
    <div class="prob-statement">${prob.html}</div>
    <div class="answer-area">
      <div class="input-row"><label class="input-label" for="${id}">Answer:</label>
        <input class="ans-input" id="${id}" type="text" autocomplete="off" placeholder="e.g. 5 or -3/2"></div>
      <button class="check-btn" onclick="checkNumeric(${idx}, ${prob.answer})">Check Answer</button>
      <div class="feedback" id="fb-${idx}"></div>
      <div class="solution-body" id="sol-${idx}" style="display:none"></div>
    </div></div>`;
}
function buildNumeric2Card(num, label, prob, idx) {
  const id1=`p${idx}a`, id2=`p${idx}b`;
  const [ans1,ans2] = prob.answers;
  const [lbl1,lbl2] = prob.labels || ['first','second'];
  return `<div class="prob-card" id="card-${idx}">
    <div class="prob-num">Problem ${num}</div>
    <div class="prob-tag">${label}</div>
    <div class="prob-statement">${prob.html}</div>
    <div class="answer-area">
      <div class="input-row"><label class="input-label" for="${id1}">${lbl1}:</label>
        <input class="ans-input" id="${id1}" type="text" autocomplete="off" placeholder="e.g. -3"></div>
      <div class="input-row"><label class="input-label" for="${id2}">${lbl2}:</label>
        <input class="ans-input" id="${id2}" type="text" autocomplete="off" placeholder="e.g. 5"></div>
      <button class="check-btn" onclick="checkNumeric2(${idx}, ${ans1}, ${ans2})">Check Answer</button>
      <div class="feedback" id="fb-${idx}"></div>
      <div class="solution-body" id="sol-${idx}" style="display:none"></div>
    </div></div>`;
}
function buildMCQCard(num, label, prob, idx) {
  const btnHtml = prob.choices.map((c,i) => `<button class="mcq-btn" id="mc-${idx}-${i}" onclick="checkMCQ(${idx}, ${i}, ${prob.correctIdx})">${c}</button>`).join('');
  return `<div class="prob-card" id="card-${idx}">
    <div class="prob-num">Problem ${num}</div>
    <div class="prob-tag">${label}</div>
    <div class="prob-statement">${prob.html}</div>
    <div class="answer-area">
      <div class="mcq-opts">${btnHtml}</div>
      <div class="feedback" id="fb-${idx}"></div>
      <div class="solution-body" id="sol-${idx}" style="display:none"></div>
    </div></div>`;
}

/* ── Grading ─────────────────────────────────────────────── */
function lockCard(idx) {
  document.querySelectorAll(`#card-${idx} .ans-input`).forEach(el=>el.disabled=true);
  document.querySelectorAll(`#card-${idx} .check-btn`).forEach(el=>el.disabled=true);
  document.querySelectorAll(`#card-${idx} .mcq-btn`).forEach(el=>el.disabled=true);
}
function showSolution(idx, solHtml) {
  const sol = document.getElementById(`sol-${idx}`);
  if (sol) { sol.innerHTML = `<span class="solution-label">Solution</span>${solHtml}`; sol.style.display='block'; }
}
function showFeedback(idx, correct, solutionHtml) {
  const fb = document.getElementById(`fb-${idx}`);
  if (!fb) return;
  fb.className = `feedback show ${correct?'correct-fb':'wrong-fb'}`;
  fb.innerHTML = `<span class="fb-icon">${correct?'✓':'✗'}</span> ${correct?'Correct!':'Not quite.'}`;
  lockCard(idx);
  showSolution(idx, solutionHtml);
}
const _solutions = {};
function checkNumeric(idx, answer) {
  const val = parseNum(document.getElementById(`p${idx}`)?.value || '');
  if (isNaN(val)) return;
  showFeedback(idx, approxEq(val, answer), _solutions[idx]);
}
function checkNumeric2(idx, ans1, ans2) {
  const v1 = parseNum(document.getElementById(`p${idx}a`)?.value || '');
  const v2 = parseNum(document.getElementById(`p${idx}b`)?.value || '');
  if (isNaN(v1) || isNaN(v2)) return;
  const correct = (approxEq(v1,ans1) && approxEq(v2,ans2)) || (approxEq(v1,ans2) && approxEq(v2,ans1));
  showFeedback(idx, correct, _solutions[idx]);
}
function checkMCQ(idx, chosen, correct) {
  const btns = document.querySelectorAll(`#card-${idx} .mcq-btn`);
  btns.forEach((b,i) => {
    if (i===correct) b.className = 'mcq-btn ' + (i===chosen?'correct':'reveal');
    else if (i===chosen) b.className = 'mcq-btn wrong';
    else b.disabled = true;
  });
  const fb = document.getElementById(`fb-${idx}`);
  if (fb) {
    fb.className = `feedback show ${chosen===correct?'correct-fb':'wrong-fb'}`;
    fb.innerHTML = `<span class="fb-icon">${chosen===correct?'✓':'✗'}</span> ${chosen===correct?'Correct!':'Not quite — the correct answer is highlighted.'}`;
  }
  lockCard(idx);
  showSolution(idx, _solutions[idx]);
}

/* ── Render ──────────────────────────────────────────────── */
function render() {
  let html = '';
  TOPICS.forEach((t, idx) => {
    const prob = GEN[t.key]();
    _solutions[idx] = prob.solutionHtml;
    if (prob.type === 'numeric2') html += buildNumeric2Card(idx+1, t.label, prob, idx);
    else if (prob.type === 'mcq') html += buildMCQCard(idx+1, t.label, prob, idx);
    else html += buildNumericCard(idx+1, t.label, prob, idx);
  });
  document.getElementById('problemsWrap').innerHTML = html;
}
render();
</script>
</body>
</html>
