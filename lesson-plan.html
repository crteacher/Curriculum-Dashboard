<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Weekly Lesson Plan — Cardinal Ritter Prep Math</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f9f7f3;color:#1a1614;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}
header{background:#6b1a26;border-bottom:1px solid rgba(255,255,255,.15);padding:1.1rem 1.5rem;display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.back{color:rgba(255,255,255,.85);text-decoration:none;font-size:.85rem}.back:hover{color:#fff}
header h1{font-size:1.15rem;font-weight:700;flex:1;color:#fff}
.hbadge{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:.25rem .65rem;border-radius:10px}
.hbadge.ca{background:rgba(255,255,255,.15);color:#c8f0d4;border:1px solid rgba(255,255,255,.3)}
.hbadge.c2{background:rgba(255,255,255,.15);color:#c8d8f0;border:1px solid rgba(255,255,255,.3)}
.et-tile{display:grid;grid-template-columns:1fr 1fr;gap:1rem;max-width:1100px;margin:1.25rem auto 0;padding:0 1.25rem}
@media(max-width:700px){.et-tile{grid-template-columns:1fr}}
.et-card{background:#fff;border:1px solid #e4e0d8;border-radius:10px;padding:1rem 1.2rem}
.et-card.ca{border-color:#1a5c2e44}.et-card.c2{border-color:#185fa544}
.et-label{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-bottom:.4rem}
.et-card.ca .et-label{color:#1a5c2e}.et-card.c2 .et-label{color:#185fa5}
.et-day{font-size:.75rem;color:#7a7570;margin-bottom:.35rem}
.et-q{font-size:.92rem;line-height:1.7}
.et-none{color:#7a7570;font-style:italic;font-size:.85rem}
.main-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;max-width:1100px;margin:1.25rem auto 0;padding:0 1.25rem 3rem}
@media(max-width:800px){.main-grid{grid-template-columns:1fr}}
.col-header{font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.75rem}
.col-header.ca{color:#1a5c2e}.col-header.c2{color:#185fa5}
.lesson-card{background:#fff;border:1px solid #e4e0d8;border-radius:10px;margin-bottom:.7rem;overflow:hidden}
.lesson-card.ca{border-color:#1a5c2e33}.lesson-card.c2{border-color:#185fa533}
.lesson-card.review-day{border-style:dashed}.lesson-card.exam-day{border-style:dashed;opacity:.85}
.lesson-summary{display:flex;align-items:center;gap:.7rem;padding:.85rem 1rem;cursor:pointer;list-style:none;flex-wrap:wrap}
.lesson-summary::-webkit-details-marker{display:none}
.lesson-summary:hover{background:rgba(0,0,0,.025)}
.day-badge{font-size:.65rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em;padding:.22rem .6rem;border-radius:8px;white-space:nowrap}
.day-badge.ca{background:#e8f5ed;color:#1a5c2e}.day-badge.c2{background:#e8f0fa;color:#185fa5}
.day-badge.review{background:#fef9e7;color:#8b6914}.day-badge.exam{background:#fde8e8;color:#b91c1c}
.lesson-title{font-size:.88rem;font-weight:600;flex:1}
.lesson-date{font-size:.72rem;color:#7a7570;white-space:nowrap}
.chevron{color:#7a7570;font-size:1rem;transition:transform .2s;margin-left:auto}
details[open] .chevron{transform:rotate(90deg)}
.lesson-body{border-top:1px solid #e4e0d8;padding:.85rem 1rem}
.grm-row{display:grid;grid-template-columns:9rem 1fr;gap:.5rem 1rem;padding:.5rem 0;border-bottom:1px solid #e4e0d8}
.grm-row:last-child{border-bottom:none}
.grm-label{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#7a7570;padding-top:.15rem;white-space:nowrap}
.grm-value{font-size:.875rem;line-height:1.7}
.grm-value .katex-display{margin:.35rem 0}
.ex-block{margin:.2rem 0 .45rem;padding:.4rem .65rem;background:#f5f3ef;border-radius:6px;border:1px solid #e4e0d8}
.ex-prob{display:block;font-size:.87rem}
.ex-ans{display:block;font-size:.8rem;color:#7a7570;margin-top:.2rem}
.do-now-link{display:inline-block;padding:.3rem .85rem;border-radius:16px;font-size:.78rem;font-weight:600;text-decoration:none;border:1px solid;transition:all .15s}
.do-now-link.ca{color:#1a5c2e;border-color:#1a5c2e}.do-now-link.ca:hover{background:#e8f5ed}
.do-now-link.c2{color:#185fa5;border-color:#185fa5}.do-now-link.c2:hover{background:#e8f0fa}
.prac-link{color:#7a7570;font-size:.8rem;text-decoration:none;border-bottom:1px solid #7a757044}
.prac-link:hover{color:#1a1614}
.review-intro{font-size:.82rem;color:#7a7570;margin-bottom:.75rem;line-height:1.5}
.chips-wrap{display:flex;flex-wrap:wrap;gap:.5rem;margin-top:.25rem}
.chip{display:inline-block;padding:.3rem .75rem;border-radius:14px;font-size:.75rem;font-weight:600;text-decoration:none;border:1px solid;transition:all .15s}
.chip.ca{color:#1a5c2e;border-color:#1a5c2e33;background:#e8f5ed}.chip.ca:hover{background:#d4f0dd}
.chip.c2{color:#185fa5;border-color:#185fa533;background:#e8f0fa}.chip.c2:hover{background:#d4e5f7}
.state-msg{text-align:center;padding:3rem 1rem;color:#7a7570;font-size:.9rem;font-style:italic}
.footer{text-align:center;font-size:.72rem;color:#7a757055;padding:1rem;font-family:monospace}
</style>
</head>
<body>
<header>
  <a href="./index.html" class="back">← Portal</a>
  <h1>📋 Lesson Plan</h1>
  <span class="hbadge ca" id="hbCA">CA</span>
  <span class="hbadge c2" id="hbC2">C2</span>
</header>

<div class="et-tile">
  <div class="et-card ca">
    <div class="et-label">Today's Exit Ticket — College Algebra</div>
    <div class="et-day" id="etCaDay">&nbsp;</div>
    <div class="et-q" id="etCaQ"><span class="et-none">Loading…</span></div>
  </div>
  <div class="et-card c2">
    <div class="et-label">Today's Exit Ticket — Calculus 2</div>
    <div class="et-day" id="etC2Day">&nbsp;</div>
    <div class="et-q" id="etC2Q"><span class="et-none">Loading…</span></div>
  </div>
</div>

<div class="main-grid">
  <div id="caCol"><div class="state-msg">Loading…</div></div>
  <div id="c2Col"><div class="state-msg">Loading…</div></div>
</div>

<div class="footer" id="footer">Loading…</div>

<script>
function renderMath(text){
  if(!text)return'';
  text=text.replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>')
           .replace(/&ldquo;/g,'"').replace(/&rdquo;/g,'"').replace(/&mdash;/g,'—')
           .replace(/&nbsp;/g,' ').replace(/&rarr;/g,'→').replace(/&middot;/g,'·');
  const parts=text.split(/(\$\$[\s\S]*?\$\$|\$[^$\n]*?\$|\\\[[\s\S]*?\\\]|\\\([\s\S]*?\\\))/g);
  return parts.map(p=>{
    let display=false,tex=null;
    if(p.startsWith('$$')&&p.endsWith('$$')){display=true;tex=p.slice(2,-2);}
    else if(p.startsWith('$')&&p.endsWith('$')){display=false;tex=p.slice(1,-1);}
    else if(p.startsWith('\\[')&&p.endsWith('\\]')){display=true;tex=p.slice(2,-2);}
    else if(p.startsWith('\\(')&&p.endsWith('\\)')){display=false;tex=p.slice(2,-2);}
    if(tex!==null){tex=tex.replace(/\\displaystyle\b/g,'').trim();
      try{return katex.renderToString(tex,{displayMode:display,throwOnError:false});}catch(e){return p;}}
    return p;
  }).join('');
}
function mEl(t){const s=document.createElement('span');s.innerHTML=renderMath(t||'—');return s.outerHTML;}
function grm(label,val){return`<div class="grm-row"><div class="grm-label">${label}</div><div class="grm-value">${val}</div></div>`;}
function exBlock(p,a){return`<div class="ex-block"><span class="ex-prob">${mEl(p)}</span><span class="ex-ans">→ ${mEl(a)}</span></div>`;}
function exBlocks(arr){return(arr||[]).map(e=>exBlock(e.problem,e.answer)).join('');}
function pracLink(course,sec){
  if(!sec.hasPractice||!sec.practiceFile)return'';
  const folder=course==='ca'?'./PreCalc':'./C2';
  return`<br><a href="${folder}/${sec.practiceFile}.html" class="prac-link" target="_blank">📄 Practice Worksheet</a>`;
}

function buildLessonCard(course,sec,dayNum,isOpen){
  const doNow=course==='ca'?'./donow-ca.html':'./warmup.html';
  const we=sec.workedExamples||[],pp=sec.practiceProblems||[];
  let body='';
  body+=grm('SWBAT',mEl(sec.swbat||'—'));
  body+=grm('DO NOW',`<a href="${doNow}" class="do-now-link ${course}" target="_blank">Open Do Now →</a>`);
  const iDo=we.slice(0,2); if(iDo.length)body+=grm('I Do',exBlocks(iDo));
  const weDo=we.slice(2,4); if(weDo.length)body+=grm('We Do',exBlocks(weDo));
  const ydt=pp.slice(0,2); if(ydt.length)body+=grm('You Do (Together)',exBlocks(ydt));
  const yda=pp.slice(2,4),pl=pracLink(course,sec);
  if(yda.length||pl)body+=grm('You Do (Alone)',exBlocks(yda)+pl);
  if(sec.exitTicket)body+=grm('Exit Ticket',mEl(sec.exitTicket));
  return`<details class="lesson-card ${course}"${isOpen?' open':''}><summary class="lesson-summary"><span class="day-badge ${course}">Day ${dayNum}</span><span class="lesson-title">§${sec.section} ${sec.title}</span><span class="lesson-date">Fall 2026</span><span class="chevron">›</span></summary><div class="lesson-body">${body}</div></details>`;
}

function buildReviewCard(course,dayNum,unit,secMap){
  const doNow=course==='ca'?'./donow-ca.html':'./warmup.html';
  const chips=unit.sections.map(id=>{const s=secMap[id];if(!s||!s.reviewProblems?.length)return'';
    return`<a href="./review.html?section=${id}" class="chip ${course}" target="_blank">§${s.section} ${s.title}</a>`;}).filter(Boolean).join('');
  let body='<div class="review-intro">Students review exam-style problems by section. Click a chip to open that section\'s review set.</div>';
  body+=grm('DO NOW',`<a href="${doNow}" class="do-now-link ${course}" target="_blank">Open Do Now →</a>`);
  if(chips)body+=grm('Sections',`<div class="chips-wrap">${chips}</div>`);
  body+=grm('Structure','<span style="color:#8b949e;font-size:.83rem">Students work through 5-problem sets from each section. Shuffle for a new set. Whole-class debrief on common errors.</span>');
  const unitShort=unit.name.replace(/^Unit \S+ — /,'');
  return`<details class="lesson-card ${course} review-day"><summary class="lesson-summary"><span class="day-badge review">Day ${dayNum}</span><span class="lesson-title">📚 Review Day — ${unitShort}</span><span class="lesson-date">Fall 2026</span><span class="chevron">›</span></summary><div class="lesson-body">${body}</div></details>`;
}

function buildExamCard(course,dayNum){
  const body=grm('Structure','<span style="color:#8b949e;font-size:.83rem">Silent individual assessment. Full period. Equation cards and calculators only — no notes. Collect before bell.</span>');
  return`<details class="lesson-card ${course} exam-day"><summary class="lesson-summary"><span class="day-badge exam">Day ${dayNum}</span><span class="lesson-title">✏️ Exam Day</span><span class="lesson-date">Fall 2026</span><span class="chevron">›</span></summary><div class="lesson-body">${body}</div></details>`;
}

function renderColumn(colEl,course,currentId,unit,secMap){
  if(!unit){colEl.innerHTML='<div class="state-msg">No active unit found.</div>';return;}
  const label=course==='ca'?'College Algebra':'Calculus 2';
  const n=unit.sections.length;
  const extra=unit.hasExam?' + Review + Exam':' + Review';
  let html=`<div class="col-header ${course}">${label} &middot; ${n} lesson${n!==1?'s':''}${extra}</div>`;
  unit.sections.forEach((id,idx)=>{
    const sec=secMap[id]; if(!sec)return;
    html+=buildLessonCard(course,sec,idx+1,id===currentId);
  });
  html+=buildReviewCard(course,n+1,unit,secMap);
  if(unit.hasExam)html+=buildExamCard(course,n+2);
  colEl.innerHTML=html;
}

function renderExitTile(caId,caMap,c2Id,c2Map){
  function fill(secId,secMap,dayId,qId){
    const sec=secMap[secId],dayEl=document.getElementById(dayId),qEl=document.getElementById(qId);
    if(sec&&sec.exitTicket){if(dayEl)dayEl.textContent='§'+sec.section+' — '+sec.title;if(qEl)qEl.innerHTML=renderMath(sec.exitTicket);}
    else if(qEl)qEl.innerHTML='<span class="et-none">No exit ticket for current section.</span>';
  }
  fill(caId,caMap,'etCaDay','etCaQ');
  fill(c2Id,c2Map,'etC2Day','etC2Q');
}

Promise.all([
  fetch('./state.json').then(r=>r.json()),
  fetch('./sections.json').then(r=>r.json())
]).then(([state,sections])=>{
  const caId=state?.courses?.collegeAlgebra?.currentSection;
  const c2Id=state?.courses?.calc2?.currentSection;
  const caMap={},c2Map={};
  (sections.collegeAlgebra||[]).forEach(s=>caMap[s.id]=s);
  (sections.calc2||[]).forEach(s=>c2Map[s.id]=s);
  const caUnits=sections.units?.collegeAlgebra||[];
  const c2Units=sections.units?.calc2||[];
  const caUnit=caUnits.find(u=>u.sections.includes(caId))||caUnits[caUnits.length-1]||null;
  const c2Unit=c2Units.find(u=>u.sections.includes(c2Id))||c2Units[c2Units.length-1]||null;
  renderExitTile(caId,caMap,c2Id,c2Map);
  renderColumn(document.getElementById('caCol'),'ca',caId,caUnit,caMap);
  renderColumn(document.getElementById('c2Col'),'c2',c2Id,c2Unit,c2Map);
  const hbCA=document.getElementById('hbCA'),hbC2=document.getElementById('hbC2');
  if(caUnit&&hbCA)hbCA.title=caUnit.name;
  if(c2Unit&&hbC2)hbC2.title=c2Unit.name;
  document.getElementById('footer').textContent=
    'Data-driven from sections.json · '+[caUnit?.name,c2Unit?.name].filter(Boolean).join(' · ')+' · Fall 2026';
}).catch(err=>{
  document.getElementById('caCol').innerHTML='<div class="state-msg">Could not load data.</div>';
  document.getElementById('c2Col').innerHTML='<div class="state-msg">Could not load data.</div>';
  console.error(err);
});
</script>
</body>
</h
