<script>
/* ─────────────────────────────────────────────
   UTILITIES
───────────────────────────────────────────── */
const BASE = 'https://crteacher.github.io/Curriculum-Dashboard/';

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function fmtDate(s) {
  return new Date(s + 'T12:00:00').toLocaleDateString('en-US',
    { weekday:'long', month:'long', day:'numeric', year:'numeric' });
}

function hashStr(s) {
  let h = 2166136261;
  for (let i = 0; i < s.length; i++) {
    h ^= s.charCodeAt(i);
    h = Math.imul(h, 16777619) >>> 0;
  }
  return h;
}

function ri(a, b) { return Math.floor(Math.random() * (b - a + 1)) + a; }
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function gcd(a, b) { a = Math.abs(a); b = Math.abs(b); while (b) { [a, b] = [b, a % b]; } return a; }
function reduceFrac(n, d) {
  if (d === 0) return [n, d];
  const g = gcd(Math.abs(n), Math.abs(d));
  n /= g; d /= g;
  if (d < 0) { n = -n; d = -d; }
  return [n, d];
}
function fracTex(n, d) {
  [n, d] = reduceFrac(n, d);
  if (d === 1) return `${n}`;
  return `\\dfrac{${n}}{${d}}`;
}

// sign-aware term: coeff·var^power for LaTeX
function termTex(coeff, varStr, power) {
  if (coeff === 0) return '';
  let base = power === 0 ? '' : power === 1 ? varStr : `${varStr}^{${power}}`;
  const absC = Math.abs(coeff);
  if (base === '') return `${coeff}`;
  if (absC === 1) return coeff > 0 ? base : `-${base}`;
  return `${coeff}${base}`;
}

// "ax + b" for LaTeX
function linearTex(a, b, v = 'x') {
  if (a === 0 && b === 0) return '0';
  const aStr = termTex(a, v, 1);
  if (b === 0) return aStr || '0';
  if (a === 0) return `${b}`;
  return b > 0 ? `${aStr} + ${b}` : `${aStr} - ${Math.abs(b)}`;
}

// build polynomial string for LaTeX from terms array [{c,v,p}]
function polyTex(terms) {
  const parts = [];
  terms.forEach(({c, v, p}, i) => {
    if (c === 0) return;
    const t = termTex(Math.abs(c), v || 'x', p);
    if (i === 0) parts.push(c < 0 ? `-${t}` : t);
    else parts.push(c < 0 ? `- ${t}` : `+ ${t}`);
  });
  return parts.join(' ') || '0';
}

function kD(tex) {
  try { return katex.renderToString(tex, { displayMode: true, throwOnError: false }); }
  catch(e) { return tex; }
}
function kI(tex) {
  try { return katex.renderToString(tex, { displayMode: false, throwOnError: false }); }
  catch(e) { return tex; }
}

function parseNum(s) {
  if (!s || !s.trim()) return NaN;
  s = s.trim().replace(/\s+/g, '');
  const m = s.match(/^(-?\d+)\/(-?\d+)$/);
  if (m) return parseInt(m[1]) / parseInt(m[2]);
  return parseFloat(s);
}
function approxEq(a, b, tol = 1e-4) { return Math.abs(a - b) < tol; }


/* ─────────────────────────────────────────────
   PROBLEM GENERATORS
───────────────────────────────────────────── */
const GEN = {};

// ── §1.1  Evaluate a limit by factoring ──────────────────────────────────────
// lim_{x→r} (x² − (r+s)x + r·s) / (x − r) = r − s
GEN['Calc_1_1'] = function() {
  let r, s;
  do { r = ri(-5, 5); s = ri(-5, 5); } while (r === s || r === 0);
  const sumRS  = r + s;
  const prodRS = r * s;
  // numerator factors as (x−r)(x−s)
  const bCoeff = -sumRS;    // coefficient of x in expanded numerator
  const cCoeff = prodRS;
  const denom  = r > 0 ? `x - ${r}` : `x + ${Math.abs(r)}`;
  const numTex = polyTex([{c:1,v:'x',p:2},{c:bCoeff,v:'x',p:1},{c:cCoeff,v:'x',p:0}]);
  const ans = r - s;
  const factored2 = s > 0 ? `x - ${s}` : `x + ${Math.abs(s)}`;
  return {
    html: `Evaluate: ${kD(`\\lim_{x \\to ${r}} \\frac{${numTex}}{${denom}}`)}
           <span class="ans-hint">Factor the numerator first.</span>`,
    type: 'numeric',
    answer: ans,
    solutionHtml:
      kD(`\\frac{${numTex}}{${denom}} = \\frac{(${denom})(${factored2})}{${denom}} = ${factored2}`) +
      kD(`\\lim_{x \\to ${r}} (${factored2}) = ${r} ${s >= 0 ? '- ' + s : '+ ' + Math.abs(s)} = ${ans}`)
  };
};

// ── §1.2  Limit of a polynomial (direct substitution) ────────────────────────
GEN['Calc_1_2'] = function() {
  const a = ri(-4, 4) || 1;
  const b = ri(-6, 6);
  const c = ri(-8, 8);
  const x0 = ri(-4, 4);
  const ans = a * x0 * x0 + b * x0 + c;
  const fTex = polyTex([{c:a,v:'x',p:2},{c:b,v:'x',p:1},{c:c,v:'x',p:0}]);
  return {
    html: `Evaluate: ${kD(`\\lim_{x \\to ${x0}} \\left(${fTex}\\right)`)}`,
    type: 'numeric',
    answer: ans,
    solutionHtml:
      `Since this is a polynomial, substitute directly:` +
      kD(`${a}(${x0})^2 + ${b}(${x0}) + (${c}) = ${a*x0*x0} ${b*x0 >= 0 ? '+' : ''} ${b*x0} ${c >= 0 ? '+' : ''} ${c} = ${ans}`)
  };
};

// ── §1.4  Limit at infinity (rational function, equal degrees) ────────────────
GEN['Calc_1_4'] = function() {
  const a = ri(1, 5) * pick([-1,1]);
  const b = ri(-8, 8);
  let c;
  do { c = ri(1, 5) * pick([-1,1]); } while (c === 0);
  const d = ri(-8, 8);
  const [pN, pD] = reduceFrac(a, c);
  const ansVal = pN / pD;
  return {
    html: `Evaluate: ${kD(`\\lim_{x \\to \\infty} \\frac{${a}x^2 ${b >= 0 ? '+' : '-'} ${Math.abs(b)}}{${c}x^2 ${d >= 0 ? '+' : '-'} ${Math.abs(d)}}`)}
           <span class="ans-hint">Enter as a fraction if needed (e.g. <code>2/3</code>).</span>`,
    type: 'numeric',
    answer: ansVal,
    solutionHtml:
      kD(`\\lim_{x \\to \\infty} \\frac{${a}x^2 + ${b}}{${c}x^2 + ${d}}
         = \\lim_{x \\to \\infty} \\frac{${a} + ${b}/x^2}{${c} + ${d}/x^2}
         = \\frac{${a}}{${c}} = ${fracTex(pN, pD)}`)
  };
};

// ── §2.2  Limit definition of the derivative ─────────────────────────────────
// f(x) = ax² + bx,  find f′(x₀) using the limit definition
GEN['Calc_2_2'] = function() {
  const a = ri(1, 4) * pick([-1,1]);
  const b = ri(-5, 5);
  const x0 = ri(-3, 3);
  // f′(x₀) = 2a·x₀ + b
  const ans = 2 * a * x0 + b;
  const fTex = polyTex([{c:a,v:'x',p:2},{c:b,v:'x',p:1}]);
  return {
    html: `Let ${kI(`f(x) = ${fTex}`)}. Using the <strong>limit definition</strong>,
           find ${kI(`f'(${x0})`)}:
           ${kD(`f'(${x0}) = \\lim_{h \\to 0} \\frac{f(${x0}+h) - f(${x0})}{h}`)}`,
    type: 'numeric',
    answer: ans,
    solutionHtml:
      kD(`f(${x0}+h) = ${a}(${x0}+h)^2 + ${b}(${x0}+h)
         = ${a}(${x0*x0}+${2*x0}h+h^2) ${b >= 0 ? '+' : ''}${b*x0} ${b >= 0 ? '+' : ''}${b}h`) +
      kD(`\\frac{f(${x0}+h)-f(${x0})}{h}
         = \\frac{${2*a*x0 + b}h + ${a}h^2}{h}
         = ${2*a*x0 + b} + ${a}h`) +
      kD(`\\lim_{h \\to 0}\\left(${2*a*x0 + b} + ${a}h\\right) = ${ans}`)
  };
};

// ── §2.3  Power Rule: evaluate f′(x₀) ────────────────────────────────────────
GEN['Calc_2_3'] = function() {
  const n = ri(2, 5);
  const m = ri(1, n - 1); // ensure m ≠ n
  const a = ri(-4, 4) || 1;
  const b = ri(-4, 4) || 1;
  const x0 = pick([1, -1, 2]);
  // f(x) = ax^n + bx^m
  // f′(x) = a·n·x^(n-1) + b·m·x^(m-1)
  const ans = a * n * Math.pow(x0, n - 1) + b * m * Math.pow(x0, m - 1);
  const fTex = polyTex([{c:a,v:'x',p:n},{c:b,v:'x',p:m}]);
  const fpTex = polyTex([{c:a*n,v:'x',p:n-1},{c:b*m,v:'x',p:m-1}]);
  return {
    html: `Let ${kI(`f(x) = ${fTex}`)}. Find ${kI(`f'(${x0})`)}:`,
    type: 'numeric',
    answer: ans,
    solutionHtml:
      kD(`f'(x) = ${fpTex}`) +
      kD(`f'(${x0}) = ${a*n}(${x0})^{${n-1}} + ${b*m}(${x0})^{${m-1}} = ${ans}`)
  };
};

// ── §2.4  Trig / Exp / Log derivatives ───────────────────────────────────────
GEN['Calc_2_4'] = function() {
  const type = pick(['sin_cos', 'log_poly']);

  if (type === 'sin_cos') {
    const a = ri(-5, 5) || 1;
    const b = ri(-5, 5) || 1;
    const evalPt = pick(['0', '\\pi/2', '\\pi']);
    const xVal   = evalPt === '0' ? 0 : evalPt === '\\pi/2' ? Math.PI / 2 : Math.PI;
    // f(x) = a·sin(x) + b·cos(x)
    // f′(x) = a·cos(x) − b·sin(x)
    const ans = Math.round(a * Math.cos(xVal) - b * Math.sin(xVal));
    const fTex = `${a}\\sin(x) ${b >= 0 ? '+' : '-'} ${Math.abs(b)}\\cos(x)`;
    const fpTex = `${a}\\cos(x) ${b >= 0 ? '-' : '+'} ${Math.abs(b)}\\sin(x)`;
    return {
      html: `Let ${kI(`f(x) = ${fTex}`)}. Find ${kI(`f'(${evalPt})`)}:`,
      type: 'numeric',
      answer: ans,
      solutionHtml:
        kD(`f'(x) = ${fpTex}`) +
        kD(`f'(${evalPt}) = ${a}\\cdot${a > 0 ? '' : ''}\\cos(${evalPt}) - ${b}\\cdot\\sin(${evalPt}) = ${ans}`)
    };
  } else {
    // f(x) = a·ln(x) + b·x^n, find f′(1) = a + b·n
    const a = ri(-5, 5) || 1;
    const n = ri(2, 4);
    const b = ri(-4, 4) || 1;
    const ans = a + b * n;
    return {
      html: `Let ${kI(`f(x) = ${a}\\ln(x) ${b >= 0 ? '+' : '-'} ${Math.abs(b)}x^{${n}}`)}. Find ${kI(`f'(1)`)}:`,
      type: 'numeric',
      answer: ans,
      solutionHtml:
        kD(`f'(x) = \\frac{${a}}{x} ${b >= 0 ? '+' : '-'} ${Math.abs(b*n)}x^{${n-1}}`) +
        kD(`f'(1) = \\frac{${a}}{1} ${b*n >= 0 ? '+' : '-'} ${Math.abs(b*n)}(1)^{${n-1}} = ${a} ${b*n >= 0 ? '+' : '-'} ${Math.abs(b*n)} = ${ans}`)
    };
  }
};

// ── §2.4.5  Rates of Change: instantaneous velocity ──────────────────────────
GEN['Calc_2_4_5'] = function() {
  const a = ri(1, 5) * pick([-1,1]);
  const b = ri(-6, 6);
  const c = ri(-10, 10);
  const t0 = ri(1, 5);
  // s(t) = at² + bt + c,  v(t) = 2at + b,  v(t₀) = 2a·t₀ + b
  const ans = 2 * a * t0 + b;
  const sTex = polyTex([{c:a,v:'t',p:2},{c:b,v:'t',p:1},{c:c,v:'t',p:0}]);
  return {
    html: `A particle's position is ${kI(`s(t) = ${sTex}`)} (in meters, ${kI('t')} in seconds).
           Find the <strong>instantaneous velocity</strong> at ${kI(`t = ${t0}`)}:`,
    type: 'numeric',
    answer: ans,
    solutionHtml:
      kD(`v(t) = s'(t) = ${polyTex([{c:2*a,v:'t',p:1},{c:b,v:'t',p:0}])}`) +
      kD(`v(${t0}) = ${2*a}(${t0}) + ${b} = ${2*a*t0} ${b >= 0 ? '+' : ''} ${b} = ${ans} \\text{ m/s}`)
  };
};

// ── §2.5  Product Rule ────────────────────────────────────────────────────────
// f(x) = x^n · (ax + b),  find f′(1) = n·(a+b) + a
GEN['Calc_2_5'] = function() {
  const type = pick(['product', 'quotient']);

  if (type === 'product') {
    const n = ri(2, 4);
    const a = ri(-4, 4) || 1;
    const b = ri(-4, 4) || 1;
    // f(x) = x^n·(ax+b)
    // f′(x) = n·x^(n-1)·(ax+b) + x^n·a
    // f′(1) = n·(a+b) + a
    const ans = n * (a + b) + a;
    const lTex = linearTex(a, b);
    return {
      html: `Let ${kI(`f(x) = x^{${n}}(${lTex})`)}. Use the <strong>product rule</strong> to find ${kI(`f'(1)`)}:`,
      type: 'numeric',
      answer: ans,
      solutionHtml:
        kD(`f'(x) = ${n}x^{${n-1}}(${lTex}) + x^{${n}} \\cdot ${a}`) +
        kD(`f'(1) = ${n}(${a}+${b}) + ${a} = ${n*(a+b)} + ${a} = ${ans}`)
    };
  } else {
    // Quotient: f(x) = (ax² + b) / (cx + d),  find f′(0) = −bc / d²
    let a2, b2, c2, d2;
    do {
      a2 = ri(1, 4);
      b2 = ri(1, 5) * pick([-1,1]);
      c2 = ri(1, 4) * pick([-1,1]);
      d2 = ri(1, 4) * pick([-1,1]);
    } while (d2 === 0);
    // f′(x) = [2a2·x·(c2·x+d2) − (a2·x²+b2)·c2] / (c2·x+d2)²
    // f′(0) = [0 − b2·c2] / d2² = −b2·c2 / d2²
    const [pN, pD] = reduceFrac(-b2 * c2, d2 * d2);
    const ansVal = pN / pD;
    const numTex = polyTex([{c:a2,v:'x',p:2},{c:b2,v:'x',p:0}]);
    const denTex = linearTex(c2, d2);
    return {
      html: `Let ${kI(`f(x) = \\dfrac{${numTex}}{${denTex}}`)}. Use the <strong>quotient rule</strong> to find ${kI(`f'(0)`)}:
             <span class="ans-hint">Enter as a fraction if needed (e.g. <code>3/4</code>).</span>`,
      type: 'numeric',
      answer: ansVal,
      solutionHtml:
        kD(`f'(x) = \\frac{${2*a2}x \\cdot (${denTex}) - (${numTex}) \\cdot ${c2}}{(${denTex})^2}`) +
        kD(`f'(0) = \\frac{0 - ${b2}\\cdot${c2}}{(${d2})^2} = \\frac{${-b2*c2}}{${d2*d2}} = ${fracTex(pN, pD)}`)
    };
  }
};

// ── §2.7  Chain Rule ──────────────────────────────────────────────────────────
GEN['Calc_2_7'] = function() {
  const type = pick(['power', 'poly_squared']);

  if (type === 'power') {
    // f(x) = (ax + b)^n,  f′(c) = n·a·(a·c + b)^(n-1)
    const n = pick([2, 3]);
    const a = ri(1, 3) * pick([-1,1]);
    const b = ri(-4, 4);
    const x0 = pick([0, 1, -1, 2]);
    const inner = a * x0 + b;
    const ans = n * a * Math.pow(inner, n - 1);
    const innerTex = linearTex(a, b);
    return {
      html: `Let ${kI(`f(x) = (${innerTex})^{${n}}`)}. Use the <strong>chain rule</strong> to find ${kI(`f'(${x0})`)}:`,
      type: 'numeric',
      answer: ans,
      solutionHtml:
        kD(`f'(x) = ${n}(${innerTex})^{${n-1}} \\cdot ${a}`) +
        kD(`f'(${x0}) = ${n}(${a}\\cdot${x0}+${b})^{${n-1}} \\cdot ${a} = ${n} \\cdot ${inner}^{${n-1}} \\cdot ${a} = ${ans}`)
    };
  } else {
    // f(x) = (x² + a)^n,  f′(1) = n·(1+a)^(n-1)·2
    const n = pick([2, 3]);
    const a = ri(1, 4);
    const ans = n * 2 * Math.pow(1 + a, n - 1);
    return {
      html: `Let ${kI(`f(x) = (x^2 + ${a})^{${n}}`)}. Use the <strong>chain rule</strong> to find ${kI(`f'(1)`)}:`,
      type: 'numeric',
      answer: ans,
      solutionHtml:
        kD(`f'(x) = ${n}(x^2+${a})^{${n-1}} \\cdot 2x`) +
        kD(`f'(1) = ${n}(1+${a})^{${n-1}} \\cdot 2 = ${n} \\cdot ${Math.pow(1+a,n-1)} \\cdot 2 = ${ans}`)
    };
  }
};

// ── §2.8  General Derivative Strategies (mixed) ───────────────────────────────
// Product of (ax+b)² and (cx+d), find f′(0) = b·(2ad − bc) ... actually:
// f(x) = (ax+b)²·(cx+d)
// f′(x) = 2a(ax+b)(cx+d) + (ax+b)²·c
// f′(0) = 2a·b·d + b²·c
GEN['Calc_2_8'] = function() {
  const type = pick(['product_chain', 'log_chain']);

  if (type === 'product_chain') {
    const a = ri(1, 3);
    const b = ri(-4, 4) || 1;
    const c = ri(1, 3) * pick([-1,1]);
    const d = ri(-4, 4) || 1;
    // f(x) = (ax+b)²·(cx+d)
    const ans = 2 * a * b * d + b * b * c;
    const u = linearTex(a, b);
    const v = linearTex(c, d);
    return {
      html: `Let ${kI(`f(x) = (${u})^2(${v})`)}. Find ${kI(`f'(0)`)} using product and chain rules:`,
      type: 'numeric',
      answer: ans,
      solutionHtml:
        kD(`f'(x) = 2${a}(${u})(${v}) + (${u})^2 \\cdot ${c}`) +
        kD(`f'(0) = 2(${a})(${b})(${d}) + (${b})^2(${c}) = ${2*a*b*d} + ${b*b*c} = ${ans}`)
    };
  } else {
    // f(x) = ln(ax + 1),  f′(x) = a/(ax+1),  f′(0) = a
    const a = ri(2, 6);
    return {
      html: `Let ${kI(`f(x) = \\ln(${a}x + 1)`)}. Find ${kI(`f'(0)`)} using the chain rule:`,
      type: 'numeric',
      answer: a,
      solutionHtml:
        kD(`f'(x) = \\frac{1}{${a}x+1} \\cdot ${a} = \\frac{${a}}{${a}x+1}`) +
        kD(`f'(0) = \\frac{${a}}{${a}(0)+1} = \\frac{${a}}{1} = ${a}`)
    };
  }
};


/* ─────────────────────────────────────────────
   RENDERING
───────────────────────────────────────────── */
function buildNumericCard(num, section, prob, idx) {
  const id = `p${idx}`;
  return `
    <div class="prob-card" id="card-${idx}">
      <div class="prob-num">Problem ${num}</div>
      <div class="prob-tag">§${section.section} — ${section.title}</div>
      <div class="prob-statement">${prob.html}</div>
      <div class="answer-area">
        <div class="input-row">
          <label class="input-label" for="${id}">Answer:</label>
          <input class="ans-input" id="${id}" type="text" autocomplete="off" placeholder="e.g. 5 or -3/2">
        </div>
        <button class="check-btn" onclick="checkNumeric(${idx}, ${prob.answer})">Check Answer</button>
        <div class="feedback" id="fb-${idx}"></div>
        <div class="solution-body" id="sol-${idx}" style="display:none"></div>
      </div>
    </div>`;
}

function buildNumeric2Card(num, section, prob, idx) {
  const id1 = `p${idx}a`, id2 = `p${idx}b`;
  const [ans1, ans2] = prob.answers;
  const [lbl1, lbl2] = prob.labels || ['first', 'second'];
  return `
    <div class="prob-card" id="card-${idx}">
      <div class="prob-num">Problem ${num}</div>
      <div class="prob-tag">§${section.section} — ${section.title}</div>
      <div class="prob-statement">${prob.html}</div>
      <div class="answer-area">
        <div class="input-row">
          <label class="input-label" for="${id1}">${lbl1}:</label>
          <input class="ans-input" id="${id1}" type="text" autocomplete="off" placeholder="e.g. -3">
        </div>
        <div class="input-row">
          <label class="input-label" for="${id2}">${lbl2}:</label>
          <input class="ans-input" id="${id2}" type="text" autocomplete="off" placeholder="e.g. 5">
        </div>
        <button class="check-btn" onclick="checkNumeric2(${idx}, ${ans1}, ${ans2})">Check Answer</button>
        <div class="feedback" id="fb-${idx}"></div>
        <div class="solution-body" id="sol-${idx}" style="display:none"></div>
      </div>
    </div>`;
}

function buildMCQCard(num, section, prob, idx) {
  const btnHtml = prob.choices.map((c, i) =>
    `<button class="mcq-btn" id="mc-${idx}-${i}" onclick="checkMCQ(${idx}, ${i}, ${prob.correctIdx})">${c}</button>`
  ).join('');
  return `
    <div class="prob-card" id="card-${idx}">
      <div class="prob-num">Problem ${num}</div>
      <div class="prob-tag">§${section.section} — ${section.title}</div>
      <div class="prob-statement">${prob.html}</div>
      <div class="answer-area">
        <div class="mcq-opts">${btnHtml}</div>
        <div class="feedback" id="fb-${idx}"></div>
        <div class="solution-body" id="sol-${idx}" style="display:none"></div>
      </div>
    </div>`;
}

function buildFallbackCard(num, section, idx) {
  const folder = encodeURIComponent('Calc 1');
  const base = (section.practiceFile || '').replace(/\.(html|docx|pdf)$/i, '');
  const url = BASE + folder + '/' + encodeURIComponent(base) + '.html';
  return `
    <div class="prob-card" id="card-${idx}">
      <div class="prob-num">Problem ${num}</div>
      <div class="prob-tag">§${section.section} — ${section.title}</div>
      <div class="prob-statement">
        <strong>${section.title}</strong><br>
        <span style="color:var(--muted);font-size:.9rem">${section.swbat || ''}.</span>
      </div>
      <div class="practice-fallback">
        <p>Auto-graded problems for this topic are coming soon. Open the practice page to work on problems:</p>
        ${base ? `<a class="prac-btn" href="${url}" target="_blank">Open Practice Problems ↗</a>` : ''}
      </div>
    </div>`;
}


/* ─────────────────────────────────────────────
   GRADING
───────────────────────────────────────────── */
function lockCard(idx) {
  document.querySelectorAll(`#card-${idx} .ans-input`).forEach(el => el.disabled = true);
  document.querySelectorAll(`#card-${idx} .check-btn`).forEach(el => el.disabled = true);
  document.querySelectorAll(`#card-${idx} .mcq-btn`).forEach(el => el.disabled = true);
}
function showSolution(idx, solHtml) {
  const sol = document.getElementById(`sol-${idx}`);
  if (sol) { sol.innerHTML = `<span class="solution-label">Solution</span>${solHtml}`; sol.style.display = 'block'; }
}
function showFeedback(idx, correct, solutionHtml) {
  const fb = document.getElementById(`fb-${idx}`);
  if (!fb) return;
  fb.className = `feedback show ${correct ? 'correct-fb' : 'wrong-fb'}`;
  fb.innerHTML = `<span class="fb-icon">${correct ? '✓' : '✗'}</span> ${correct ? 'Correct!' : 'Not quite.'}`;
  lockCard(idx);
  showSolution(idx, solutionHtml);
}

const _solutions = {};

function checkNumeric(idx, answer) {
  const val = parseNum(document.getElementById(`p${idx}`)?.value || '');
  if (isNaN(val)) return;
  showFeedback(idx, approxEq(val, answer), _solutions[idx]);
}
function checkNumeric2(idx, ans1, ans2) {
  const v1 = parseNum(document.getElementById(`p${idx}a`)?.value || '');
  const v2 = parseNum(document.getElementById(`p${idx}b`)?.value || '');
  if (isNaN(v1) || isNaN(v2)) return;
  const correct = (approxEq(v1, ans1) && approxEq(v2, ans2)) ||
                  (approxEq(v1, ans2) && approxEq(v2, ans1));
  showFeedback(idx, correct, _solutions[idx]);
}
function checkMCQ(idx, chosen, correct) {
  const btns = document.querySelectorAll(`#card-${idx} .mcq-btn`);
  btns.forEach((b, i) => {
    if (i === correct) b.className = 'mcq-btn ' + (i === chosen ? 'correct' : 'reveal');
    else if (i === chosen) b.className = 'mcq-btn wrong';
    else b.disabled = true;
  });
  const fb = document.getElementById(`fb-${idx}`);
  if (fb) {
    fb.className = `feedback show ${chosen === correct ? 'correct-fb' : 'wrong-fb'}`;
    fb.innerHTML = `<span class="fb-icon">${chosen === correct ? '✓' : '✗'}</span> ${chosen === correct ? 'Correct!' : 'Not quite — the correct answer is highlighted.'}`;
  }
  lockCard(idx);
  showSolution(idx, _solutions[idx]);
}


/* ─────────────────────────────────────────────
   MAIN
───────────────────────────────────────────── */
async function init() {
  const today = todayStr();
  document.getElementById('dateLabel').textContent = fmtDate(today);

  let state, sections, calendar;
  try {
    [state, sections, calendar] = await Promise.all([
      fetch(BASE + 'state.json?_=' + Date.now()).then(r => r.json()),
      fetch(BASE + 'sections.json?_=' + Date.now()).then(r => r.json()),
      fetch(BASE + 'calendar.json?_=' + Date.now()).then(r => r.json()),
    ]);
  } catch(e) {
    document.getElementById('mainArea').innerHTML =
      `<div class="empty-state"><div class="icon">⚠️</div><h2>Couldn't load data</h2><p>Check your connection and refresh.</p></div>`;
    return;
  }

  const isSchoolDay = calendar.aDays.includes(today) || calendar.bDays.includes(today);
  const label = isSchoolDay ? 'Do Now' : 'Review';
  document.getElementById('doNowLabel').textContent = label;
  if (!isSchoolDay) {
    document.getElementById('subtitle').textContent = 'No class today — here\'s some review practice.';
  }

  const calc1State = state.courses?.calc1;
  const allSections = sections.calc1 || [];
  const completed = calc1State?.completedSections || [];
  // Only pick sections that have a generator
  const doneSections = allSections.filter(s => completed.includes(s.id) && GEN[s.id]);

  if (doneSections.length === 0) {
    document.getElementById('mainArea').innerHTML = `
      <div class="empty-state">
        <div class="icon">📚</div>
        <h2>Nothing here yet</h2>
        <p>Do Now problems appear once the first Calc 1 section is completed.<br>Check back after class!</p>
      </div>`;
    return;
  }

  // Stable per (date × sectionID), recency-biased
  const scored = doneSections.map((s, i) => {
    const baseScore = hashStr(today + s.id) / 0xffffffff;
    const recencyBoost = Math.pow(1.12, i);
    return { sec: s, score: baseScore * recencyBoost };
  });
  scored.sort((a, b) => b.score - a.score);

  const secs = scored.length === 1
    ? [scored[0].sec, scored[0].sec]
    : [scored[0].sec, scored[1].sec];

  let html = '<div class="problems-grid">';
  secs.forEach((sec, idx) => {
    const gen = GEN[sec.id];
    if (gen) {
      const prob = gen();
      _solutions[idx] = prob.solutionHtml;
      if (prob.type === 'numeric')  html += buildNumericCard(idx + 1, sec, prob, idx);
      else if (prob.type === 'numeric2') html += buildNumeric2Card(idx + 1, sec, prob, idx);
      else if (prob.type === 'mcq')      html += buildMCQCard(idx + 1, sec, prob, idx);
      else html += buildFallbackCard(idx + 1, sec, idx);
    } else {
      html += buildFallbackCard(idx + 1, sec, idx);
    }
  });
  html += '</div>';
  html += `<p style="text-align:center;color:var(--muted);font-size:.78rem;margin-top:1.2rem">
    Refresh for new numbers (same topics today). Answers lock after first submission.
  </p>`;
  document.getElementById('mainArea').innerHTML = html;
}

init();
</script>
</body>
</html>
