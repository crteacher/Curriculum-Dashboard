<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mathmap — The logical structure of your curriculum</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0f0f1a; color: #e0e0f0; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }

#header { display: flex; align-items: center; gap: 16px; padding: 10px 18px; background: #6b1a26; border-bottom: none; flex-shrink: 0; z-index: 10; }
#header h1 { font-size: 20px; font-weight: 300; letter-spacing: 3px; color: #fff; font-family: Georgia, serif; }
#header h1 span { font-weight: 700; color: rgba(255,255,255,.85); }
#subtitle { font-size: 11px; color: rgba(255,255,255,.55); margin-top: 2px; letter-spacing: 1px; }

#toolbar { display: flex; align-items: center; gap: 10px; flex: 1; }
#search { background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.3); color: #fff; padding: 5px 12px; border-radius: 20px; font-size: 12px; width: 200px; outline: none; }
#search:focus { border-color: rgba(255,255,255,.7); }
#search::placeholder { color: rgba(255,255,255,.45); }

.filter-btn { padding: 4px 12px; border-radius: 12px; border: 1.5px solid; font-size: 11px; font-weight: 600; cursor: pointer; transition: all .15s; background: transparent; letter-spacing: .5px; }
.filter-btn.active { color: #0f0f1a !important; }
.filter-btn[data-course="calc1"]  { border-color: #4a9edd; color: #4a9edd; }
.filter-btn[data-course="calc1"].active  { background: #4a9edd; }
.filter-btn[data-course="calc2"]  { border-color: #e06060; color: #e06060; }
.filter-btn[data-course="calc2"].active  { background: #e06060; }
.filter-btn[data-course="ca"]     { border-color: #5cb85c; color: #5cb85c; }
.filter-btn[data-course="ca"].active     { background: #5cb85c; }
.filter-btn[data-course="pc"]     { border-color: #e8a838; color: #e8a838; }
.filter-btn[data-course="pc"].active     { background: #e8a838; }
.filter-btn[data-course="all"]    { border-color: rgba(255,255,255,.5); color: #aab; }
.filter-btn[data-course="all"].active    { background: #445; color: #fff; }

#btn-reset { background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.3); color: #889; padding: 4px 10px; border-radius: 8px; font-size: 11px; cursor: pointer; }
#btn-reset:hover { border-color: #8899ff; color: #aab; }

#main { display: flex; flex: 1; overflow: hidden; }
#graph-area { flex: 1; position: relative; }
svg { width: 100%; height: 100%; }

#sidebar { width: 280px; background: #13131f; border-left: 1px solid #2a2a3e; display: flex; flex-direction: column; overflow: hidden; transition: width .2s; }
#sidebar.empty #sidebar-content { display: none; }
#sidebar.empty #sidebar-hint { display: flex; }
#sidebar-hint { align-items: center; justify-content: center; flex: 1; color: #334; font-size: 12px; text-align: center; padding: 20px; display: none; }
#sidebar-content { flex: 1; overflow-y: auto; padding: 16px; }
#sidebar-content::-webkit-scrollbar { width: 4px; }
#sidebar-content::-webkit-scrollbar-thumb { background: #2a2a3e; border-radius: 2px; }

.sb-badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 700; margin-bottom: 8px; color: #0f0f1a; }
.sb-title { font-size: 16px; font-weight: 600; color: #dde; margin-bottom: 4px; line-height: 1.3; }
.sb-section { font-size: 11px; color: #556; margin-bottom: 14px; letter-spacing: .5px; }
.sb-section-header { font-size: 10px; font-weight: 700; letter-spacing: 1px; color: #445; text-transform: uppercase; margin: 12px 0 6px; }
.sb-node-link { display: block; padding: 5px 8px; margin: 2px 0; border-radius: 6px; font-size: 12px; color: #99aacc; cursor: pointer; border: 1px solid transparent; }
.sb-node-link:hover { background: #1e1e30; border-color: #334; color: #ccddff; }
.sb-notes-link { display: block; margin-top: 14px; padding: 7px 12px; background: #1a1a2e; border: 1px solid #334; border-radius: 8px; font-size: 12px; color: #8899ff; text-decoration: none; text-align: center; }
.sb-notes-link:hover { background: #20203a; border-color: #8899ff; }
.sb-empty { color: #445; font-size: 11px; font-style: italic; }

#footer { display: flex; align-items: center; justify-content: space-between; padding: 5px 14px; background: #13131f; border-top: 1px solid #2a2a3e; font-size: 10px; color: #445; flex-shrink: 0; }
#node-count { }
.legend { display: flex; gap: 12px; }
.legend-item { display: flex; align-items: center; gap: 5px; }
.legend-dot { width: 8px; height: 8px; border-radius: 50%; }

.node circle { cursor: pointer; stroke-width: 1.5px; }
.node text { pointer-events: none; font-size: 10px; fill: #dde; font-family: inherit; display: none; }
.node.hovered text, .node.selected text { display: block; }
.labels-visible .node text { display: block; }
.link { stroke: #2a2a3e; stroke-opacity: 0.7; }

/* tooltip */
#tooltip { position: absolute; background: #1e1e30; border: 1px solid #334; border-radius: 8px; padding: 8px 12px; font-size: 12px; pointer-events: none; opacity: 0; transition: opacity .1s; max-width: 200px; z-index: 100; }
#tooltip .tt-title { font-weight: 600; color: #dde; margin-bottom: 2px; }
#tooltip .tt-course { font-size: 10px; color: #667; }
#tooltip .tt-section { font-size: 10px; color: #778; }

    #header .filter-btn[data-course="all"] { border-color: rgba(255,255,255,.45); color: rgba(255,255,255,.8); }
    #header .filter-btn[data-course="all"].active { background: rgba(255,255,255,.25); color: #fff; }
</style>
</head>

const COURSE_LABELS = { ca: "College Algebra", pc: "PreCalc", calc1: "Calculus I", calc2: "Calculus II" };

// ── Build graph ──────────────────────────────────────────────────────────────
const svg = d3.select("#svg");
const width  = () => document.getElementById("graph-area").clientWidth;
const height = () => document.getElementById("graph-area").clientHeight;

const g = svg.append("g");

// Zoom
const zoom = d3.zoom().scaleExtent([0.1, 4])
  .on("zoom", e => {
  g.attr("transform", e.transform);
  // Show all labels when zoomed in past 1.1×
  document.getElementById("graph-area").classList.toggle("labels-visible", e.transform.k > 1.1);
});
svg.call(zoom).on("dblclick.zoom", null);

// Arrowhead marker
svg.append("defs").append("marker")
  .attr("id","arrow").attr("viewBox","0 -4 8 8")
  .attr("refX",14).attr("refY",0)
  .attr("markerWidth",5).attr("markerHeight",5)
  .attr("orient","auto")
  .append("path").attr("d","M0,-4L8,0L0,4").attr("fill","#3a3a5e");

// Compute in-degree for node sizing
const inDegree = {};
GRAPH_DATA.nodes.forEach(n => inDegree[n.id] = 0);
GRAPH_DATA.edges.forEach(e => { if (inDegree[e.target] !== undefined) inDegree[e.target]++; });

function nodeRadius(d) { return 5 + (inDegree[d.id] || 0) * 2.2; }

// Build adjacency
const adjOut = {}, adjIn = {};
GRAPH_DATA.nodes.forEach(n => { adjOut[n.id] = []; adjIn[n.id] = []; });
GRAPH_DATA.edges.forEach(e => {
  if (adjOut[e.source]) adjOut[e.source].push(e.target);
  if (adjIn[e.target])  adjIn[e.target].push(e.source);
});

function ancestors(id) {
  const visited = new Set(); const queue = [id];
  while (queue.length) { const n = queue.shift(); (adjIn[n]||[]).forEach(p => { if (!visited.has(p)) { visited.add(p); queue.push(p); } }); }
  return visited;
}
function descendants(id) {
  const visited = new Set(); const queue = [id];
  while (queue.length) { const n = queue.shift(); (adjOut[n]||[]).forEach(c => { if (!visited.has(c)) { visited.add(c); queue.push(c); } }); }
  return visited;
}
function bfsPath(srcId, tgtId) {
  const prev = {}; const queue = [srcId]; const visited = new Set([srcId]);
  while (queue.length) {
    const n = queue.shift();
    if (n === tgtId) { const path = []; let cur = tgtId; while (cur !== undefined) { path.unshift(cur); cur = prev[cur]; } return path; }
    (adjOut[n]||[]).forEach(nb => { if (!visited.has(nb)) { visited.add(nb); prev[nb] = n; queue.push(nb); } });
  }
  return null;
}

// Simulation
// Use pre-computed positions from layout_mathmap.py (px/py fields).
// This means instant layout with no simulation needed on load.
let nodes = GRAPH_DATA.nodes.map(d => ({...d, x: d.px||0, y: d.py||0, vx:0, vy:0}));
let edges = GRAPH_DATA.edges.map(d => ({...d}));

// Minimal simulation — alpha starts at 0 so it doesn't animate.
// Only becomes active during drag (alphaTarget set by drag handlers).
const sim = d3.forceSimulation(nodes)
  .alpha(0).alphaTarget(0)
  .force("link",      d3.forceLink(edges).id(d=>d.id).distance(70).strength(0.3))
  .force("charge",    d3.forceManyBody().strength(-180))
  .force("collision", d3.forceCollide().radius(d => nodeRadius(d)+4));
sim.stop();

const linkSel = g.append("g").selectAll("line").data(edges).join("line")
  .attr("class","link").attr("marker-end","url(#arrow)");

const nodeSel = g.append("g").selectAll("g.node").data(nodes).join("g")
  .attr("class","node")
  .call(d3.drag()
    .on("start", (e,d) => { if (!e.active) sim.alphaTarget(.2).restart(); d.fx=d.x; d.fy=d.y; })
    .on("drag",  (e,d) => { d.fx=e.x; d.fy=e.y; })
    .on("end",   (e,d) => { if (!e.active) sim.alphaTarget(0); d.fx=null; d.fy=null; }));

nodeSel.append("circle")
  .attr("r", nodeRadius)
  .attr("fill", d => d.color)
  .attr("stroke","#0f0f1a");

nodeSel.append("text")
  .attr("dy","2.2em").attr("text-anchor","middle")
  .text(d => d.label.length > 24 ? d.label.slice(0,22)+"…" : d.label);

// Static render — called once on load and on each drag tick.
function renderPositions() {
  linkSel.attr("x1",d=>d.source.x).attr("y1",d=>d.source.y)
         .attr("x2",d=>d.target.x).attr("y2",d=>d.target.y);
  nodeSel.attr("transform",d=>`translate(${d.x},${d.y})`);
}
sim.on("tick", renderPositions);

function fitAll(durationMs) {
  const pad = 40;
  const b = g.node().getBBox();
  if (!b.width || !b.height) return;
  const w = width(), h = height();
  const scale = Math.min((w - pad*2) / b.width, (h - pad*2) / b.height, 1.2);
  const tx = w/2 - scale * (b.x + b.width/2);
  const ty = h/2 - scale * (b.y + b.height/2);
  const t = d3.zoomIdentity.translate(tx, ty).scale(scale);
  if (durationMs) svg.transition().duration(durationMs).call(zoom.transform, t);
  else svg.call(zoom.transform, t);
}

// Render positions immediately from pre-computed px/py, then fit to viewport.
renderPositions();
// Apply fit using getBoundingClientRect (available before clientWidth/Height settle).
(function applyFit() {
  const r = document.getElementById('graph-area').getBoundingClientRect();
  if (r.width < 100 || r.height < 100) { setTimeout(applyFit, 50); return; }
  const pad = 40, b = g.node().getBBox();
  if (!b.width || !b.height) { setTimeout(applyFit, 50); return; }
  const scale = Math.min((r.width - pad*2) / b.width, (r.height - pad*2) / b.height, 1.2);
  const tx = r.width/2  - scale * (b.x + b.width/2);
  const ty = r.height/2 - scale * (b.y + b.height/2);
  svg.call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
})();

// ── Interactions ─────────────────────────────────────────────────────────────
const tooltip = document.getElementById("tooltip");

nodeSel.on("mouseover", (e,d) => {
  d3.select(e.currentTarget).classed("hovered", true);
  tooltip.querySelector(".tt-title").textContent = d.label;
  tooltip.querySelector(".tt-course").textContent = COURSE_LABELS[d.course];
  tooltip.querySelector(".tt-section").textContent = "§" + d.section;
  tooltip.style.opacity = 1;
}).on("mousemove", e => {
  const r = document.getElementById("graph-area").getBoundingClientRect();
  tooltip.style.left = (e.clientX - r.left + 14) + "px";
  tooltip.style.top  = (e.clientY - r.top  - 10) + "px";
}).on("mouseout", () => { tooltip.style.opacity = 0;
  d3.select(e.currentTarget).classed("hovered", false);
});

nodeSel.on("click", (e, d) => {
  e.stopPropagation();
  if (pathStart && pathStart !== d.id) {
    const path = bfsPath(pathStart, d.id);
    highlightPath(path);
    pathStart = null;
    return;
  }
  selectNode(d);
});

nodeSel.on("dblclick", (e, d) => {
  e.stopPropagation();
  pathStart = d.id;
  nodeSel.selectAll("circle")
    .attr("stroke", n => n.id === d.id ? "#ffd700" : "#0f0f1a")
    .attr("stroke-width", n => n.id === d.id ? 3 : 1.5);
  showSidebar(`<div class="sb-section-header">Path Mode</div>
    <div style="font-size:12px;color:#aab;">Starting from: <strong>${d.label}</strong><br><br>Now click any other node to find the shortest dependency path.</div>`);
});

svg.on("click", () => {
  clearSelection();
  pathStart = null;
});

function selectNode(d) {
  selectedNode = d.id;
  nodeSel.classed("selected", n => n.id === d.id);
  const anc = ancestors(d.id);
  const desc = descendants(d.id);
  const all = new Set([...anc, ...desc, d.id]);

  nodeSel.selectAll("circle")
    .attr("opacity", n => all.has(n.id) ? 1 : 0.08)
    .attr("stroke",  n => n.id === d.id ? "#ffd700" : "#0f0f1a")
    .attr("stroke-width", n => n.id === d.id ? 3 : 1.5);
  nodeSel.selectAll("text").attr("opacity", n => all.has(n.id) ? 1 : 0.05);
  linkSel
    .attr("stroke",  l => {
      const s = l.source.id, t = l.target.id;
      if (t === d.id || anc.has(t) && anc.has(s)) return l.source.color;
      if (s === d.id || desc.has(s) && desc.has(t)) return l.target.color;
      return "#1a1a2e";
    })
    .attr("stroke-opacity", l => {
      const s = l.source.id, t = l.target.id;
      return (all.has(s) && all.has(t)) ? 0.9 : 0.03;
    })
    .attr("stroke-width", l => {
      const s = l.source.id, t = l.target.id;
      return (l.source.id === d.id || l.target.id === d.id) ? 2.5 : 1;
    });

  // Sidebar
  const directPre  = (adjIn[d.id]||[]).map(id=>nodes.find(n=>n.id===id)).filter(Boolean);
  const directPost = (adjOut[d.id]||[]).map(id=>nodes.find(n=>n.id===id)).filter(Boolean);
  const notesPath  = d.file ? `../Formatted Lecture Notes/${d.file}` : null;

  let html = `
    <div class="sb-badge" style="background:${d.color}">${COURSE_LABELS[d.course]}</div>
    <div class="sb-title">${d.label}</div>
    <div class="sb-section">§${d.section} &nbsp;·&nbsp; ${anc.size} prerequisite${anc.size!==1?'s':''} &nbsp;·&nbsp; ${desc.size} dependent${desc.size!==1?'s':''}</div>`;

  if (directPre.length) {
    html += `<div class="sb-section-header">Depends on (${directPre.length})</div>`;
    directPre.forEach(n => { html += `<div class="sb-node-link" onclick="selectNodeById('${n.id}')" style="border-left:2px solid ${n.color}; padding-left:8px">${n.label} <span style="color:#445;font-size:10px">§${n.section}</span></div>`; });
  } else {
    html += `<div class="sb-section-header">Dependencies</div><div class="sb-empty">No prerequisites — this is a root concept.</div>`;
  }

  if (directPost.length) {
    html += `<div class="sb-section-header">Required by (${directPost.length})</div>`;
    directPost.forEach(n => { html += `<div class="sb-node-link" onclick="selectNodeById('${n.id}')" style="border-left:2px solid ${n.color}; padding-left:8px">${n.label} <span style="color:#445;font-size:10px">§${n.section}</span></div>`; });
  }

  if (notesPath) html += `<a class="sb-notes-link" href="${notesPath}" target="_blank">Open notes →</a>`;
  html += `<div style="margin-top:16px;font-size:10px;color:#334">Double-click to set as path start</div>`;

  showSidebar(html);
}

function highlightPath(path) {
  if (!path) { showSidebar('<div style="color:#e06060;font-size:12px;padding:8px">No dependency path found between these concepts.</div>'); clearHighlight(); return; }
  const pathSet = new Set(path);
  const edgeSet = new Set();
  for (let i=0;i<path.length-1;i++) edgeSet.add(path[i]+"→"+path[i+1]);

  nodeSel.selectAll("circle")
    .attr("opacity", n => pathSet.has(n.id) ? 1 : 0.06)
    .attr("stroke", n => pathSet.has(n.id) ? "#ffd700" : "#0f0f1a")
    .attr("stroke-width", n => pathSet.has(n.id) ? 3 : 1.5);
  nodeSel.selectAll("text").attr("opacity", n => pathSet.has(n.id) ? 1 : 0.04);
  linkSel
    .attr("stroke", l => edgeSet.has(l.source.id+"→"+l.target.id) ? "#ffd700" : "#1a1a2e")
    .attr("stroke-opacity", l => edgeSet.has(l.source.id+"→"+l.target.id) ? 1 : 0.03)
    .attr("stroke-width", l => edgeSet.has(l.source.id+"→"+l.target.id) ? 3 : 1);

  const pathNodes = path.map(id=>nodes.find(n=>n.id===id));
  let html = `<div class="sb-section-header">Shortest path (${path.length} steps)</div>`;
  pathNodes.forEach((n,i) => {
    if (!n) return;
    html += `<div style="display:flex;align-items:center;gap:6px;margin:4px 0">
      <span style="color:#ffd700;font-size:10px;width:16px;text-align:right">${i+1}</span>
      <div class="sb-node-link" style="flex:1;border-left:2px solid ${n.color};padding-left:8px;margin:0" onclick="selectNodeById('${n.id}')">${n.label} <span style="color:#445;font-size:10px">§${n.section}</span></div>
    </div>`;
    if (i<path.length-1) html += `<div style="margin-left:22px;color:#334;font-size:14px">↓</div>`;
  });
  showSidebar(html);
}

function clearHighlight() {
  nodeSel.selectAll("circle").attr("opacity",1).attr("stroke","#0f0f1a").attr("stroke-width",1.5);
  nodeSel.selectAll("text").attr("opacity",1);
  linkSel.attr("stroke","#2a2a3e").attr("stroke-opacity",0.7).attr("stroke-width",1);
}
function clearSelection() {
  selectedNode = null;
  nodeSel.classed("selected", false);
  clearHighlight();
  document.getElementById("sidebar-content").innerHTML = "";
  document.getElementById("sidebar").classList.add("empty");
}
function showSidebar(html) {
  document.getElementById("sidebar").classList.remove("empty");
  document.getElementById("sidebar-content").innerHTML = html;
}
window.selectNodeById = id => {
  const d = nodes.find(n=>n.id===id);
  if (d) selectNode(d);
};

// ── Search ────────────────────────────────────────────────────────────────────
document.getElementById("search").addEventListener("input", function() {
  const q = this.value.toLowerCase().trim();
  if (!q) { clearHighlight(); return; }
  nodeSel.selectAll("circle").attr("opacity", n => (n.label.toLowerCase().includes(q) || n.id.includes(q)) ? 1 : 0.06);
  nodeSel.selectAll("text").attr("opacity", n => (n.label.toLowerCase().includes(q) || n.id.includes(q)) ? 1 : 0.05);
  linkSel.attr("stroke-opacity", 0.05);
});

// ── Course filters ────────────────────────────────────────────────────────────
document.querySelectorAll(".filter-btn").forEach(btn => {
  btn.addEventListener("click", function() {
    const c = this.dataset.course;
    if (c === "all") {
      const allOn = activeCourses.size === 4;
      if (allOn) activeCourses.clear();
      else activeCourses = new Set(["ca","pc","calc1","calc2"]);
    } else {
      if (activeCourses.has(c)) activeCourses.delete(c);
      else activeCourses.add(c);
    }
    applyFilters();
    updateFilterBtns();
  });
});

function applyFilters() {
  nodeSel.style("display", d => activeCourses.has(d.course) ? null : "none");
  linkSel.style("display", l => (activeCourses.has(l.source.course) && activeCourses.has(l.target.course)) ? null : "none");
  const visible = nodes.filter(n=>activeCourses.has(n.course)).length;
  document.getElementById("node-count").textContent = `${visible} concepts · ${GRAPH_DATA.edges.length} dependencies`;
}
function updateFilterBtns() {
  document.querySelectorAll(".filter-btn").forEach(btn => {
    const c = btn.dataset.course;
    if (c === "all") btn.classList.toggle("active", activeCourses.size===4);
    else btn.classList.toggle("active", activeCourses.has(c));
  });
}

document.getElementById("btn-reset").addEventListener("click", () => {
  sim.alpha(0.5).restart();
  svg.call(zoom.transform, d3.zoomIdentity);
  clearSelection();
});

// URL hash navigation
function checkHash() {
  const id = location.hash.slice(1);
  if (id) {
    const d = nodes.find(n=>n.id===id);
    if (d) { setTimeout(()=>selectNode(d), 800); }
  }
}

// Initial state
document.getElementById("node-count").textContent = `${nodes.length} concepts · ${GRAPH_DATA.edges.length} dependencies`;
document.getElementById("sidebar").classList.add("empty");
checkHash();

// Resize
window.addEventListener("resize", () => {
  sim.force("center", d3.forceCenter(0,0));
});
</script>
</body>
</html>
