<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Exit Ticket — Cardinal Ritter Prep Math</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f9f7f3;color:#1a1614;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}
header{background:#6b1a26;border-bottom:1px solid rgba(255,255,255,.15);padding:1.1rem 1.5rem;display:flex;align-items:center;gap:1rem;flex-wrap:wrap}
.back{color:rgba(255,255,255,.85);text-decoration:none;font-size:.85rem}.back:hover{color:#fff}
header h1{font-size:1.2rem;font-weight:700;flex:1;color:#fff}
.date-badge{font-size:.78rem;color:rgba(255,255,255,.75);margin-left:auto}

.section-label{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7a7570;padding:.75rem 1.5rem .25rem;max-width:980px;margin:0 auto}
.section-label.first{margin-top:1.25rem}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;max-width:980px;margin:.25rem auto 0;padding:0 1.5rem}
@media(max-width:680px){.grid{grid-template-columns:1fr}}

.card{background:#fff;border:1px solid #e4e0d8;border-radius:12px;padding:1.25rem 1.4rem;display:flex;flex-direction:column;gap:.75rem}
.card.ca{border-color:#1a5c2e44}
.card.c2{border-color:#185fa544}
.card.pc{border-color:#7a3b8a44}
.card-label{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em}
.card.ca .card-label{color:#1a5c2e}
.card.c2 .card-label{color:#185fa5}
.card.pc .card-label{color:#7a3b8a}
.section-info{font-size:.8rem;color:#7a7570}

.q-box{background:#f9f7f3;border:1px solid #e4e0d8;border-radius:8px;padding:1rem 1.1rem;font-size:.975rem;line-height:1.75;min-height:3.5rem}
.q-box .katex-display{margin:.4rem 0}

.ans-box{background:#f5f3ef;border:1px solid #e4e0d8;border-radius:8px;padding:.85rem 1.1rem;font-size:.9rem;line-height:1.75;display:none}
.ans-box.visible{display:block}
.ans-box .katex-display{margin:.35rem 0}
.ans-label{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#7a7570;margin-bottom:.35rem}

.reveal-btn{align-self:flex-start;padding:.35rem .95rem;border-radius:20px;font-size:.78rem;font-weight:600;cursor:pointer;border:1px solid;transition:all .15s;background:transparent;margin-top:-.1rem}
.card.ca .reveal-btn{color:#1a5c2e;border-color:#1a5c2e}
.card.ca .reveal-btn:hover{background:#e8f5ed}
.card.c2 .reveal-btn{color:#185fa5;border-color:#185fa5}
.card.c2 .reveal-btn:hover{background:#e8f0fa}
.card.pc .reveal-btn{color:#7a3b8a;border-color:#7a3b8a}
.card.pc .reveal-btn:hover{background:#f5eafa}
.reveal-btn:disabled{opacity:.4;cursor:default}

.divider{max-width:980px;margin:1.25rem auto 0;padding:0 1.5rem}
.divider hr{border:none;border-top:1px solid #e4e0d8}

.none-msg{font-size:.85rem;color:#7a7570;font-style:italic}
.loading{font-size:.85rem;color:#7a7570;font-style:italic}
.page-bottom{padding-bottom:3rem}
</style>
</head>
<body>
<header>
  <a href="./index.html" class="back">← Portal</a>
  <h1>📝 Exit Ticket</h1>
  <span class="date-badge" id="dateBadge"></span>
</header>

<!-- TODAY'S EXIT TICKET -->
<div class="section-label first">📝 Today's Exit Ticket</div>
<div class="grid">
  <div class="card ca">
    <div class="card-label">College Algebra</div>
    <div class="section-info loading" id="caTodaySection">Loading…</div>
    <div class="q-box" id="caTodayQ"><span class="loading">Loading…</span></div>
    <button class="reveal-btn" id="caTodayReveal" onclick="reveal('caToday')" style="display:none">Show Answer</button>
    <div class="ans-box" id="caTodayAns"></div>
  </div>
  <div class="card c2">
    <div class="card-label">Calculus 2</div>
    <div class="section-info loading" id="c2TodaySection">Loading…</div>
    <div class="q-box" id="c2TodayQ"><span class="loading">Loading…</span></div>
    <button class="reveal-btn" id="c2TodayReveal" onclick="reveal('c2Today')" style="display:none">Show Answer</button>
    <div class="ans-box" id="c2TodayAns"></div>
  </div>
  <div class="card pc">
    <div class="card-label">PreCalc</div>
    <div class="section-info loading" id="pcTodaySection">Loading…</div>
    <div class="q-box" id="pcTodayQ"><span class="loading">Loading…</span></div>
    <button class="reveal-btn" id="pcTodayReveal" onclick="reveal('pcToday')" style="display:none">Show Answer</button>
    <div class="ans-box" id="pcTodayAns"></div>
  </div>
</div>

<div class="divider"><hr></div>

<!-- LAST CLASS ANSWER -->
<div class="section-label">↩ Last Class — Answer</div>
<div class="grid page-bottom">
  <div class="card ca">
    <div class="card-label">College Algebra</div>
    <div class="section-info loading" id="caLastSection">Loading…</div>
    <div class="q-box" id="caLastQ"><span class="loading">Loading…</span></div>
    <div class="ans-box visible" id="caLastAns"></div>
  </div>
  <div class="card c2">
    <div class="card-label">Calculus 2</div>
    <div class="section-info loading" id="c2LastSection">Loading…</div>
    <div class="q-box" id="c2LastQ"><span class="loading">Loading…</span></div>
    <div class="ans-box visible" id="c2LastAns"></div>
  </div>
  <div class="card pc">
    <div class="card-label">PreCalc</div>
    <div class="section-info loading" id="pcLastSection">Loading…</div>
    <div class="q-box" id="pcLastQ"><span class="loading">Loading…</span></div>
    <div class="ans-box visible" id="pcLastAns"></div>
  </div>
</div>

<script>
function renderMath(text) {
  if (!text) return '';
  text = text.replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>')
             .replace(/&ldquo;/g,'"').replace(/&rdquo;/g,'"').replace(/&mdash;/g,'—');
  const parts = text.split(/(\$\$[\s\S]*?\$\$|\$[^$\n]*?\$|\\\[[\s\S]*?\\\]|\\\([\s\S]*?\\\))/g);
  return parts.map(p => {
    let display=false, tex=null;
    if (p.startsWith('$$')&&p.endsWith('$$'))        {display=true; tex=p.slice(2,-2);}
    else if(p.startsWith('$')&&p.endsWith('$'))      {display=false;tex=p.slice(1,-1);}
    else if(p.startsWith('\\[')&&p.endsWith('\\]'))  {display=true; tex=p.slice(2,-2);}
    else if(p.startsWith('\\(')&&p.endsWith('\\)'))  {display=false;tex=p.slice(2,-2);}
    if(tex!==null){
      tex=tex.replace(/\\displaystyle\b/g,'').trim();
      try{return katex.renderToString(tex,{displayMode:display,throwOnError:false});}
      catch(e){return p;}
    }
    return p;
  }).join('');
}

function reveal(id) {
  document.getElementById(id+'Ans').classList.add('visible');
  const btn=document.getElementById(id+'Reveal');
  btn.textContent='Answer shown'; btn.disabled=true;
}

document.getElementById('dateBadge').textContent =
  new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});

Promise.all([
  fetch('./state.json').then(r=>r.json()),
  fetch('./sections.json').then(r=>r.json())
]).then(([state, sections]) => {
  const secMap = {};
  for (const arr of Object.values(sections)) { if (!Array.isArray(arr)) continue; for (const s of arr) secMap[s.id]=s; }

  function fill(secId, prefix, showAnswerNow) {
    const secEl  = document.getElementById(prefix+'Section');
    const qEl    = document.getElementById(prefix+'Q');
    const ansEl  = document.getElementById(prefix+'Ans');
    const revBtn = document.getElementById(prefix+'Reveal');

    if (!secId) {
      secEl.textContent='—';
      qEl.innerHTML='<span class="none-msg">No section data.</span>';
      return;
    }
    const sec = secMap[secId];
    if (!sec) {
      secEl.textContent=secId;
      qEl.innerHTML='<span class="none-msg">Section not found.</span>';
      return;
    }
    secEl.textContent='§'+sec.section+' — '+sec.title;
    secEl.classList.remove('loading');

    if (sec.exitTicket) {
      qEl.innerHTML = renderMath(sec.exitTicket);
      const ansHtml = '<div class="ans-label">Answer</div>' +
        (sec.exitTicketAnswer ? renderMath(sec.exitTicketAnswer)
                              : '<span class="none-msg">No answer key.</span>');
      ansEl.innerHTML = ansHtml;
      if (showAnswerNow) {
        ansEl.classList.add('visible');
      } else if (revBtn) {
        revBtn.s
