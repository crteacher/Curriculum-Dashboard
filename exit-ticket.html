<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Exit Ticket — Cardinal Ritter Prep Math</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d1117;color:#e6edf3;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}
header{background:#161b22;border-bottom:1px solid #30363d;padding:1.1rem 1.5rem;display:flex;align-items:center;gap:1rem;flex-wrap:wrap}
.back{color:#8b949e;text-decoration:none;font-size:.85rem}.back:hover{color:#e6edf3}
header h1{font-size:1.2rem;font-weight:700;flex:1}
.date-badge{font-size:.78rem;color:#8b949e;margin-left:auto}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;max-width:960px;margin:2rem auto;padding:0 1.5rem 4rem}
@media(max-width:680px){.grid{grid-template-columns:1fr}}
.card{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:1.5rem;display:flex;flex-direction:column;gap:1rem}
.card.ca{border-color:#5bc8d466}
.card.c2{border-color:#a78bfa66}
.card-label{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em}
.card.ca .card-label{color:#5bc8d4}
.card.c2 .card-label{color:#a78bfa}
.section-info{font-size:.82rem;color:#8b949e}
.question-box{background:#0d1117;border:1px solid #30363d;border-radius:8px;padding:1.1rem 1.2rem;font-size:1rem;line-height:1.75;min-height:4rem}
.question-box .katex-display{margin:.5rem 0}
.answer-box{background:#0d1117;border:1px solid #30363d;border-radius:8px;padding:1rem 1.2rem;font-size:.9rem;line-height:1.75;display:none}
.answer-box.visible{display:block}
.answer-box .katex-display{margin:.4rem 0}
.answer-label{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#8b949e;margin-bottom:.4rem}
.reveal-btn{align-self:flex-start;padding:.45rem 1.1rem;border-radius:20px;font-size:.82rem;font-weight:600;cursor:pointer;border:1px solid;transition:all .15s;background:transparent}
.card.ca .reveal-btn{color:#5bc8d4;border-color:#5bc8d4}
.card.ca .reveal-btn:hover{background:#5bc8d41a}
.card.c2 .reveal-btn{color:#a78bfa;border-color:#a78bfa}
.card.c2 .reveal-btn:hover{background:#a78bfa1a}
.reveal-btn.shown{opacity:.5;cursor:default}
.none-msg{font-size:.88rem;color:#8b949e;font-style:italic}
.loading{font-size:.88rem;color:#8b949e;font-style:italic}
</style>
</head>
<body>
<header>
  <a href="./index.html" class="back">← Portal</a>
  <h1>📝 Exit Ticket</h1>
  <span class="date-badge" id="dateBadge"></span>
</header>
<div class="grid">
  <div class="card ca" id="caCard">
    <div class="card-label">College Algebra</div>
    <div class="section-info loading" id="caSection">Loading…</div>
    <div class="question-box" id="caQ"><span class="loading">Loading…</span></div>
    <button class="reveal-btn" id="caReveal" onclick="reveal('ca')" style="display:none">Show Answer</button>
    <div class="answer-box" id="caAns"></div>
  </div>
  <div class="card c2" id="c2Card">
    <div class="card-label">Calculus 2</div>
    <div class="section-info loading" id="c2Section">Loading…</div>
    <div class="question-box" id="c2Q"><span class="loading">Loading…</span></div>
    <button class="reveal-btn" id="c2Reveal" onclick="reveal('c2')" style="display:none">Show Answer</button>
    <div class="answer-box" id="c2Ans"></div>
  </div>
</div>

<script>
// ── KaTeX helpers ──────────────────────────────────────────────────────────
function renderMath(text) {
  if (!text) return '';
  // Replace HTML entities first
  text = text.replace(/&ldquo;/g,'"').replace(/&rdquo;/g,'"')
             .replace(/&mdash;/g,'—').replace(/&amp;/g,'&');
  // Split on $...$ (inline) — handle both $...$ and $$...$$
  const parts = text.split(/(\$\$[\s\S]*?\$\$|\$[^$]*?\$)/g);
  return parts.map((p, i) => {
    if (p.startsWith('$$') && p.endsWith('$$')) {
      const tex = p.slice(2, -2);
      try { return katex.renderToString(tex, {displayMode:true, throwOnError:false}); }
      catch(e) { return p; }
    } else if (p.startsWith('$') && p.endsWith('$')) {
      const tex = p.slice(1, -1);
      try { return katex.renderToString(tex, {displayMode:false, throwOnError:false}); }
      catch(e) { return p; }
    }
    return p;
  }).join('');
}

function reveal(course) {
  const btn = document.getElementById(course + 'Reveal');
  const box = document.getElementById(course + 'Ans');
  box.classList.add('visible');
  btn.textContent = 'Answer shown';
  btn.classList.add('shown');
  btn.disabled = true;
}

// ── Date display ───────────────────────────────────────────────────────────
const now = new Date();
document.getElementById('dateBadge').textContent = now.toLocaleDateString('en-US', {weekday:'long',month:'long',day:'numeric'});

// ── Load state + sections ──────────────────────────────────────────────────
Promise.all([
  fetch('./state.json').then(r=>r.json()),
  fetch('./sections.json').then(r=>r.json())
]).then(([state, sections]) => {
  // Flatten sections into a lookup map
  const secMap = {};
  for (const course of Object.values(sections)) {
    for (const s of course) secMap[s.id] = s;
  }

  function fillCard(courseKey, cssClass, currentSecId) {
    const secEl = document.getElementById(cssClass + 'Section');
    const qEl = document.getElementById(cssClass + 'Q');
    const ansEl = document.getElementById(cssClass + 'Ans');
    const revBtn = document.getElementById(cssClass + 'Reveal');

    if (!currentSecId) {
      secEl.textContent = 'No active section';
      qEl.innerHTML = '<span class="none-msg">Check back when a section is active.</span>';
      return;
    }

    const sec = secMap[currentSecId];
    if (!sec) {
      secEl.textContent = currentSecId;
      qEl.innerHTML = '<span class="none-msg">Section data not found.</span>';
      return;
    }

    secEl.textContent = '§' + sec.section + ' — ' + sec.title;
    secEl.classList.remove('loading');

    if (sec.exitTicket) {
      qEl.innerHTML = renderMath(sec.exitTicket);
      revBtn.style.display = 'inline-block';
      if (sec.exitTicketAnswer) {
        ansEl.innerHTML = '<div class="answer-label">Answer</div>' + renderMath(sec.exitTicketAnswer);
      } else {
        ansEl.innerHTML = '<div class="answer-label">Answer</div><span class="none-msg">No answer key available.</span>';
      }
    } else {
      qEl.innerHTML = '<span class="none-msg">No exit ticket for this section yet.</span>';
    }
  }

  fillCard('collegeAlgebra', 'ca', state.courses?.collegeAlgebra?.currentSection);
  fillCard('calc2', 'c2', state.courses?.calc2?.currentSection);

}).catch(err => {
  console.error(err);
  ['caQ','c2Q'].forEach(id => {
    document.getElementById(id).innerHTML = '<span class="none-msg">Could not load data.</span>';
  });
  ['caSection','c2Section'].forEach(id => {
    document.getElementById(id).textContent = 'Error';
  });
});
</script>
</body>
</html>
