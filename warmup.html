<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Warm-Up — Mr. Halverson</title>
  <style>
    :root {
      --bg: #0f1117;
      --card: #1a1d27;
      --accent: #4f8ef7;
      --accent2: #7c5cbf;
      --text: #e8eaf0;
      --muted: #7a7f96;
      --border: #2a2d3d;
      --green: #4caf81;
      --red: #e06c75;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .header {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    .header .date {
      font-size: 1rem;
      color: var(--muted);
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-bottom: .4rem;
    }
    .header h1 {
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: -.02em;
    }
    .header h1 span { color: var(--accent); }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 2rem 2.5rem;
      max-width: 680px;
      width: 100%;
      box-shadow: 0 8px 40px rgba(0,0,0,.4);
    }
    .pill {
      display: inline-block;
      font-size: .72rem;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      padding: .3rem .8rem;
      border-radius: 999px;
      margin-bottom: 1.2rem;
    }
    .pill.a-day { background: #1e3a5f; color: #6ab3f5; }
    .pill.b-day { background: #2d1e4f; color: #b08cf5; }
    .pill.special { background: #2a2d1e; color: #c5b96a; }

    .do-now-label {
      font-size: .8rem;
      font-weight: 700;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: .5rem;
    }
    .section-title {
      font-size: 1.7rem;
      font-weight: 700;
      line-height: 1.25;
      margin-bottom: .4rem;
    }
    .section-num {
      font-size: 1rem;
      color: var(--muted);
      margin-bottom: 1.4rem;
    }
    .swbat {
      font-size: .95rem;
      color: var(--muted);
      line-height: 1.55;
      margin-bottom: 1.6rem;
      padding: .9rem 1.1rem;
      background: rgba(255,255,255,.04);
      border-left: 3px solid var(--accent);
      border-radius: 0 8px 8px 0;
    }
    .swbat strong { color: var(--text); font-weight: 600; }

    .practice-btn {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      font-size: 1rem;
      padding: .75rem 1.5rem;
      border-radius: 8px;
      transition: background .2s, transform .1s;
    }
    .practice-btn:hover { background: #3a7ae0; transform: translateY(-1px); }
    .practice-btn svg { flex-shrink: 0; }

    .no-class-card {
      text-align: center;
      padding: 3rem 2rem;
    }
    .no-class-card .icon { font-size: 3rem; margin-bottom: 1rem; }
    .no-class-card h2 { font-size: 1.5rem; margin-bottom: .5rem; }
    .no-class-card p { color: var(--muted); }

    .multi-courses {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }
    .course-block {
      border-top: 1px solid var(--border);
      padding-top: 1.5rem;
    }
    .course-block:first-child { border-top: none; padding-top: 0; }
    .course-label {
      font-size: .78rem;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: .8rem;
    }

    .shuffle-btn {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: .82rem;
      padding: .4rem .85rem;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 1rem;
      transition: border-color .2s, color .2s;
    }
    .shuffle-btn:hover { border-color: var(--accent); color: var(--accent); }

    .footer {
      margin-top: 2rem;
      color: var(--muted);
      font-size: .78rem;
      text-align: center;
    }
    .footer a { color: var(--muted); text-decoration: underline; }

    .loading {
      text-align: center;
      color: var(--muted);
      font-size: 1.1rem;
    }
    .dot-spin::after {
      content: '';
      animation: dots 1.2s steps(4, end) infinite;
    }
    @keyframes dots {
      0%   { content: '.'; }
      25%  { content: '..'; }
      50%  { content: '...'; }
      75%  { content: '....'; }
    }
  </style>
</head>
<body>

<div class="header">
  <div class="date" id="dateDisplay"></div>
  <h1>Daily <span>Warm-Up</span></h1>
</div>

<div class="card" id="mainCard">
  <div class="loading">Loading<span class="dot-spin"></span></div>
</div>

<div class="footer">
  <a href="index.html">← Back to Dashboard</a>
</div>

<script>
const BASE = 'https://crteacher.github.io/Curriculum-Dashboard/';

// Semester boundaries
const S1_START = '2025-08-20';
const S1_END   = '2025-12-15';
const S2_START = '2026-01-06';
const S2_END   = '2026-05-22';

function todayStr() {
  const d = new Date();
  return d.toISOString().slice(0,10);
}

function formatDateDisplay(str) {
  const d = new Date(str + 'T12:00:00');
  return d.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric', year:'numeric' });
}

function inSemester(dateStr, start, end) {
  return dateStr >= start && dateStr <= end;
}

// Weighted random: pick mostly from recent sections for spiral review
// but with a small tail toward older ones
function weightedPick(sections) {
  if (!sections.length) return null;
  // weight: newest = highest chance, oldest = 1/10th chance
  const n = sections.length;
  const weights = sections.map((_, i) => Math.pow(1.04, i)); // slight exponential toward end
  const total = weights.reduce((a, b) => a + b, 0);
  let r = Math.random() * total;
  for (let i = 0; i < n; i++) {
    r -= weights[i];
    if (r <= 0) return sections[i];
  }
  return sections[n - 1];
}

function buildCourseBlock(courseKey, state, sections, calendar, today) {
  const courseState = state.courses[courseKey];
  if (!courseState) return null;

  const period = courseState.period;
  if (!period) return null;

  // Is this course in season?
  const isCA = courseKey === 'collegeAlgebra';
  const isC1 = courseKey === 'calc1';
  const isC2 = courseKey === 'calc2';
  if (isC1 && !inSemester(today, S1_START, S1_END)) return null;
  if (isC2 && !inSemester(today, S2_START, S2_END)) return null;

  // Is this course's day type today?
  const isADay = calendar.aDays.includes(today);
  const isBDay = calendar.bDays.includes(today);
  if (period === 'A' && !isADay) return null;
  if (period === 'B' && !isBDay) return null;
  if (period === 'AB' && !isADay && !isBDay) return null;

  const completed = courseState.completedSections || [];
  if (!completed.length) {
    return { courseKey, noCompleted: true };
  }

  // Filter sections for this course
  const coursePrefix = isCA ? 'CA_' : isC1 ? 'Calc_1_' : 'Calc_2_';
  const courseSections = (sections[isCA ? 'collegeAlgebra' : isC1 ? 'calc1' : 'calc2'] || []);

  // Only completed sections
  const doneSections = courseSections.filter(s => completed.includes(s.id));
  if (!doneSections.length) return { courseKey, noCompleted: true };

  const picked = weightedPick(doneSections);
  const courseName = isCA ? 'College Algebra' : isC1 ? 'Calculus 1' : 'Calculus 2';

  return { courseKey, courseName, section: picked, allDone: doneSections };
}

function renderSection(block, container) {
  const s = block.section;
  const folder = block.courseKey === 'collegeAlgebra' ? 'College Algebra' :
                 block.courseKey === 'calc1' ? 'Calc 1' : 'Calc 2';
  // Strip any existing extension from practiceFile before adding .html
  const baseName = s.practiceFile.replace(/\.(html|docx|pdf)$/i, '');
  const practiceUrl = BASE + encodeURIComponent(folder) + '/' + encodeURIComponent(baseName) + '.html';

  container.innerHTML = `
    <div class="do-now-label">Do Now</div>
    <div class="section-title">${s.title}</div>
    <div class="section-num">Section ${s.section}</div>
    <div class="swbat"><strong>Today you'll review:</strong> ${s.swbat}.</div>
    ${s.hasPractice ? `
      <a class="practice-btn" href="${practiceUrl}" target="_blank">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M9 18l6-6-6-6"/>
        </svg>
        Open Practice Problems
      </a>
    ` : `<p style="color:var(--muted);font-size:.9rem">Practice problems coming soon.</p>`}
    <br>
    <button class="shuffle-btn" onclick="shuffleSection(this, '${block.courseKey}')">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/>
        <polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/>
      </svg>
      Different section
    </button>
  `;
}

// Store blocks globally for shuffle
let _allBlocks = {};
let _sections = {};
let _state = {};

function shuffleSection(btn, courseKey) {
  const block = _allBlocks[courseKey];
  if (!block || !block.allDone || block.allDone.length < 2) return;
  const current = block.section.id;
  const pool = block.allDone.filter(s => s.id !== current);
  block.section = weightedPick(pool);
  _allBlocks[courseKey] = block;
  const container = btn.closest('.course-block') || btn.closest('.card');
  renderSection(block, container);
}

async function init() {
  const today = todayStr();
  document.getElementById('dateDisplay').textContent = formatDateDisplay(today);

  let calendar, state, sections;
  try {
    [calendar, state, sections] = await Promise.all([
      fetch(BASE + 'calendar.json').then(r => r.json()),
      fetch(BASE + 'state.json').then(r => r.json()),
      fetch(BASE + 'sections.json').then(r => r.json()),
    ]);
  } catch(e) {
    document.getElementById('mainCard').innerHTML = `
      <div class="no-class-card">
        <div class="icon">⚠️</div>
        <h2>Couldn't load data</h2>
        <p>Check your internet connection or try refreshing.</p>
      </div>`;
    return;
  }

  // Determine day type
  const isADay = calendar.aDays.includes(today);
  const isBDay = calendar.bDays.includes(today);
  const isCanceled = (calendar.canceledDays || []).includes(today);

  // Weekend check
  const dow = new Date(today + 'T12:00:00').getDay();
  const isWeekend = (dow === 0 || dow === 6);

  const card = document.getElementById('mainCard');

  if (isWeekend || isCanceled || (!isADay && !isBDay)) {
    const msg = isCanceled ? 'School was canceled today.' :
                isWeekend ? 'No school on weekends.' :
                'No regular A/B class today.';
    card.innerHTML = `
      <div class="no-class-card">
        <div class="icon">📅</div>
        <h2>No Class Today</h2>
        <p>${msg}</p>
      </div>`;
    return;
  }

  // Add day pill
  const dayType = isADay ? 'A' : 'B';
  const pillClass = isADay ? 'a-day' : 'b-day';
  const pillHTML = `<div class="pill ${pillClass}">${dayType}-Day</div>`;

  // Build blocks for each course
  const courseKeys = ['collegeAlgebra', 'calc1', 'calc2'];
  const blocks = courseKeys
    .map(k => buildCourseBlock(k, state, sections, calendar, today))
    .filter(Boolean);

  if (!blocks.length) {
    card.innerHTML = pillHTML + `
      <div class="no-class-card" style="padding:1.5rem 0 0">
        <div class="icon">🚀</div>
        <h2>Getting Started</h2>
        <p>No sections marked complete yet. Check back after your first check-in!</p>
      </div>`;
    return;
  }

  // Store for shuffle
  blocks.forEach(b => { if (b.section) _allBlocks[b.courseKey] = b; });

  if (blocks.length === 1) {
    const b = blocks[0];
    card.innerHTML = pillHTML;
    if (b.noCompleted) {
      card.innerHTML += `
        <div class="no-class-card" style="padding:1.5rem 0 0">
          <div class="icon">📚</div>
          <h2>${b.courseKey === 'collegeAlgebra' ? 'College Algebra' : b.courseKey === 'calc1' ? 'Calculus 1' : 'Calculus 2'}</h2>
          <p>No completed sections yet — warm-ups will appear after your first check-in!</p>
        </div>`;
    } else {
      const innerDiv = document.createElement('div');
      card.appendChild(innerDiv);
      renderSection(b, innerDiv);
    }
  } else {
    // Multiple active courses
    let html = pillHTML + '<div class="multi-courses">';
    blocks.forEach(b => {
      html += `<div class="course-block" id="block-${b.courseKey}">
        <div class="course-label">${b.courseName || b.courseKey}</div>
        ${b.noCompleted ? '<p style="color:var(--muted);font-size:.9rem">No completed sections yet.</p>' : '<div class="course-inner"></div>'}
      </div>`;
    });
    html += '</div>';
    card.innerHTML = html;

    blocks.forEach(b => {
      if (!b.noCompleted && b.section) {
        const inner = card.querySelector(`#block-${b.courseKey} .course-inner`);
        if (inner) renderSection(b, inner);
      }
    });
  }
}

init();
</script>
</body>
</html>
