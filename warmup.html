<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Warm-Up — Cardinal Ritter Prep</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Georgia,serif;background:#f9f7f3;color:#1a1614;min-height:100vh}

/* ── Header ─────────────────────────────────────────────────────────── */
.page-header{background:#6b1a26;color:#fff;padding:1.1rem 2rem;
  display:flex;align-items:center;gap:1rem;flex-wrap:wrap}
.page-header h1{font-family:Georgia,serif;font-size:18px;font-weight:700;flex:1}
.page-header p{font-family:sans-serif;font-size:11px;color:rgba(255,255,255,.6);
  letter-spacing:.05em;text-transform:uppercase}
.back-link{font-family:sans-serif;font-size:11px;font-weight:600;
  color:rgba(255,255,255,.7);text-decoration:none;
  border:1px solid rgba(255,255,255,.3);border-radius:14px;padding:3px 11px;
  transition:all .15s;white-space:nowrap}
.back-link:hover{color:#fff;border-color:rgba(255,255,255,.7)}

/* ── Container ──────────────────────────────────────────────────────── */
.container{max-width:780px;margin:0 auto;padding:2rem 1.5rem 4rem}

/* ── Course picker ──────────────────────────────────────────────────── */
.picker-wrap{text-align:center;padding:3rem 1rem}
.picker-label{font-family:sans-serif;font-size:12px;font-weight:700;
  text-transform:uppercase;letter-spacing:.08em;color:#7a7570;margin-bottom:1.25rem}
.course-btns{display:flex;gap:.75rem;justify-content:center;flex-wrap:wrap}
.course-btn{font-family:Georgia,serif;font-size:16px;font-weight:700;
  padding:.75rem 2rem;border-radius:8px;border:1.5px solid #e4e0d8;
  background:#fff;color:#1a1614;cursor:pointer;transition:all .18s}
.course-btn:hover{border-color:#6b1a26;color:#6b1a26}
.course-btn.ca:hover{border-color:#1a5c2e;color:#1a5c2e}
.course-btn.calc:hover{border-color:#185fa5;color:#185fa5}

/* ── Section grid ───────────────────────────────────────────────────── */
.grid-header{display:flex;align-items:center;gap:.75rem;margin-bottom:1.5rem;flex-wrap:wrap}
.grid-title{font-size:1.1rem;font-weight:700;flex:1}
.ghost-btn{font-family:sans-serif;font-size:12px;font-weight:600;
  padding:5px 13px;border-radius:7px;border:1px solid #e4e0d8;
  background:#fff;color:#7a7570;cursor:pointer;transition:all .15s}
.ghost-btn:hover{border-color:#6b1a26;color:#6b1a26}
.unit-block{margin-bottom:1.75rem}
.unit-label{font-family:sans-serif;font-size:11px;font-weight:700;
  text-transform:uppercase;letter-spacing:.08em;color:#888;
  margin-bottom:.6rem;padding-bottom:5px;border-bottom:1px solid #e8e4da}
.section-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:10px}
.sec-card{background:#fff;border:1.5px solid #e4e0d8;border-radius:8px;
  padding:.85rem 1rem;cursor:pointer;transition:border-color .18s,box-shadow .18s;
  font-family:sans-serif;text-align:left}
.sec-card.ca:hover{border-color:#1a5c2e;box-shadow:0 0 0 2px rgba(26,92,46,.1)}
.sec-card.calc:hover{border-color:#185fa5;box-shadow:0 0 0 2px rgba(24,95,165,.1)}
.sec-card.random{border-style:dashed;background:#faf9f6}
.sec-card.random:hover{border-color:#6b1a26;box-shadow:0 0 0 2px rgba(107,26,38,.1)}
.sec-num{font-size:10px;font-weight:700;text-transform:uppercase;
  letter-spacing:.06em;color:#bbb;margin-bottom:3px}
.sec-title{font-size:13px;font-weight:600;color:#1a1614;line-height:1.35;margin-bottom:3px}
.sec-count{font-size:11px;color:#aaa}

/* ── Warmup card ────────────────────────────────────────────────────── */
.warmup-nav{display:flex;align-items:center;gap:.75rem;margin-bottom:1.75rem;flex-wrap:wrap}
.warmup-card{background:#fff;border:1px solid #e4e0d8;border-radius:10px;
  padding:2rem 2.25rem;margin-bottom:1.25rem}
.warmup-tag{display:inline-block;font-family:sans-serif;font-size:.6rem;
  font-weight:700;text-transform:uppercase;letter-spacing:.1em;
  padding:.2rem .6rem;border-radius:999px;margin-bottom:1rem}
.warmup-tag.ca{background:#d8efe1;color:#1a5c2e}
.warmup-tag.calc{background:#dce8f5;color:#185fa5}
.warmup-tag.pc{background:#fdf0e0;color:#c9860a}
.warmup-tag.review{background:#f0ede7;color:#7a7570}
.warmup-section{font-size:.8rem;font-family:sans-serif;color:#7a7570;margin-bottom:.25rem}
.warmup-title{font-size:1.35rem;font-weight:700;margin-bottom:.2rem}
.warmup-num{font-family:sans-serif;font-size:.78rem;color:#aaa;margin-bottom:1.25rem}
.warmup-divider{border:none;border-top:1px solid #e8e4da;margin:1.1rem 0}
.warmup-swbat-label{font-family:sans-serif;font-size:.65rem;font-weight:700;
  text-transform:uppercase;letter-spacing:.08em;color:#aaa;margin-bottom:.3rem}
.warmup-swbat{font-size:.95rem;line-height:1.7;color:#3a3430}
.practice-btn{display:inline-flex;align-items:center;gap:.4rem;margin-top:1.25rem;
  font-family:sans-serif;font-size:13px;font-weight:600;
  padding:.55rem 1.25rem;border-radius:7px;border:1.5px solid #e4e0d8;
  background:#fff;color:#1a1614;text-decoration:none;transition:all .18s}
.practice-btn:hover{border-color:#1a1614;background:#f5f3ef}
.warmup-actions{display:flex;gap:.6rem;flex-wrap:wrap;margin-top:.75rem}
.action-btn{font-family:sans-serif;font-size:12px;font-weight:600;
  padding:6px 14px;border-radius:7px;border:1px solid #e4e0d8;
  background:#fff;color:#7a7570;cursor:pointer;transition:all .15s}
.action-btn:hover{border-color:#6b1a26;color:#6b1a26}

/* ── States ─────────────────────────────────────────────────────────── */
.state-msg{text-align:center;padding:3rem 1rem;font-family:sans-serif;
  font-size:.9rem;color:#aaa;font-style:italic}
.katex-display{overflow-x:auto;padding:2px 0}
</style>
</head>
<body>

<div class="page-header">
  <a href="./index.html" class="back-link">← Portal</a>
  <div>
    <h1>Daily Warm-Up</h1>
    <p>Cardinal Ritter College Prep &nbsp;&middot;&nbsp; Mathematics</p>
  </div>
</div>

<div class="container">
  <!-- View 1: Course picker -->
  <div id="viewPicker" class="picker-wrap">
    <div class="picker-label">Which class are you in?</div>
    <div class="course-btns">
      <button class="course-btn ca" onclick="showGrid('ca')">College Algebra</button>
      <button class="course-btn calc" onclick="showGrid('calc')">Calculus</button>
      <button class="course-btn" style="border-color:#c9860a;color:#c9860a" onclick="showGrid('pc')">PreCalc</button>
    </div>
  </div>

  <!-- View 2: Section grid -->
  <div id="viewGrid" style="display:none">
    <div class="grid-header">
      <div class="grid-title" id="gridTitle"></div>
      <button class="ghost-btn" onclick="showPicker()">← Change class</button>
    </div>
    <div id="unitBlocks"></div>
  </div>

  <!-- View 3: Warmup card -->
  <div id="viewWarmup" style="display:none">
    <div class="warmup-nav">
      <button class="ghost-btn" onclick="backToGrid()">← Pick a different section</button>
    </div>
    <div class="warmup-card" id="warmupCard"></div>
    <div class="warmup-actions">
      <button class="action-btn" id="newProbBtn" onclick="newProblem()">New problem</button>
    </div>
  </div>
</div>

<script>
// ── Config ───────────────────────────────────────────────────────────────────
const S1_START = '2025-08-01', S1_END = '2025-12-31';
const S2_START = '2026-01-01', S2_END = '2026-06-30';

let _state, _sections, _units, _calendar;
let _today;
let _courseChoice = 'ca';   // 'ca' or 'calc'
let _courseKey = 'collegeAlgebra';
let _secMap = {};
let _available = [];
let _currentSec = null;

// ── Math ─────────────────────────────────────────────────────────────────────
function renderMath(text) {
  if (!text) return '';
  const parts = text.split(/(\$\$[\s\S]*?\$\$|\$[^$\n]*?\$|\\\[[\s\S]*?\\\]|\\\([\s\S]*?\\\))/g);
  return parts.map(p => {
    let display = false, tex = null;
    if (p.startsWith('$$') && p.endsWith('$$'))         { display = true;  tex = p.slice(2,-2); }
    else if (p.startsWith('$') && p.endsWith('$'))      { display = false; tex = p.slice(1,-1); }
    else if (p.startsWith('\\[') && p.endsWith('\\]')) { display = true;  tex = p.slice(2,-2); }
    else if (p.startsWith('\\(') && p.endsWith('\\)')) { display = false; tex = p.slice(2,-2); }
    if (tex !== null) {
      try { return katex.renderToString(tex.trim(), {displayMode:display, throwOnError:false}); }
      catch(e) { return p; }
    }
    return p;
  }).join('');
}

// ── Helpers ──────────────────────────────────────────────────────────────────
function fmtDate(str) {
  return new Date(str + 'T12:00:00').toLocaleDateString('en-US',
    {weekday:'long', month:'long', day:'numeric', year:'numeric'});
}
function inSemester(d, s, e) { return d >= s && d <= e; }

function resolveCourseKey(choice) {
  if (choice === 'ca') return 'collegeAlgebra';
  if (choice === 'pc') return 'preCalc';
  if (inSemester(_today, S1_START, S1_END)) return 'calc1';
  if (inSemester(_today, S2_START, S2_END)) return 'calc2';
  const c1 = (_state.courses.calc1?.completedSections||[]).length;
  const c2 = (_state.courses.calc2?.completedSections||[]).length;
  return c2 >= c1 ? 'calc2' : 'calc1';
}

function isSchoolDay() {
  return _calendar?.aDays?.includes(_today) || _calendar?.bDays?.includes(_today);
}

// ── Views ────────────────────────────────────────────────────────────────────
function showPicker() {
  document.getElementById('viewPicker').style.display = 'block';
  document.getElementById('viewGrid').style.display = 'none';
  document.getElementById('viewWarmup').style.display = 'none';
}

function showGrid(choice) {
  _courseChoice = choice || _courseChoice;
  _courseKey = resolveCourseKey(_courseChoice);

  const completedIds = _state?.courses?.[_courseKey]?.completedSections || [];
  const currentId   = _state?.courses?.[_courseKey]?.currentSection;
  const allIds = currentId ? [...completedIds, currentId] : completedIds;

  const courseArr = _sections?.[_courseKey] || [];
  _secMap = {};
  courseArr.forEach(s => _secMap[s.id] = s);
  _available = courseArr.filter(s =>
    allIds.includes(s.id) && s.reviewProblems && s.reviewProblems.length > 0
  );

  const courseName = _courseKey === 'collegeAlgebra' ? 'College Algebra' :
                     _courseKey === 'preCalc' ? 'PreCalc' : 'Calculus';
  document.getElementById('gridTitle').textContent = courseName + ' — Choose a Section';

  const unitList = (_units?.[_courseKey === 'collegeAlgebra' ? 'collegeAlgebra' : _courseKey === 'preCalc' ? 'preCalc' : 'calc2']) || [];
  let html = '';

  if (!_available.length) {
    html = '<div class="state-msg">No review problems yet — check back after your first completed section.</div>';
  } else {
    // Random card
    html += `<div class="unit-block">
      <div class="unit-label">Quick Start</div>
      <div class="section-grid">
        <div class="sec-card random" onclick="loadSection(null)">
          <div class="sec-num">🎲 Random</div>
          <div class="sec-title">Surprise me</div>
          <div class="sec-count">${_available.length} sections available</div>
        </div>
      </div>
    </div>`;

    const cls = _courseChoice;
    // Group by unit if units exist, else flat list
    if (unitList.length) {
      unitList.forEach(unit => {
        const secs = _available.filter(s => unit.sections.includes(s.id));
        if (!secs.length) return;
        const short = unit.name.replace(/^Unit \S+ — /, '');
        html += `<div class="unit-block"><div class="unit-label">${short}</div><div class="section-grid">`;
        secs.forEach(s => {
          html += `<div class="sec-card ${cls}" onclick="loadSection('${s.id}')">
            <div class="sec-num">§${s.section}</div>
            <div class="sec-title">${s.title}</div>
            <div class="sec-count">${s.reviewProblems.length} problems</div>
          </div>`;
        });
        html += `</div></div>`;
      });
    } else {
      html += `<div class="unit-block"><div class="section-grid">`;
      _available.forEach(s => {
        html += `<div class="sec-card ${_courseChoice}" onclick="loadSection('${s.id}')">
          <div class="sec-num">§${s.section}</div>
          <div class="sec-title">${s.title}</div>
          <div class="sec-count">${s.reviewProblems.length} problems</div>
        </div>`;
      });
      html += `</div></div>`;
    }
  }

  document.getElementById('unitBlocks').innerHTML = html;
  document.getElementById('viewPicker').style.display = 'none';
  document.getElementById('viewGrid').style.display = 'block';
  document.getElementById('viewWarmup').style.display = 'none';
}

function backToGrid() {
  document.getElementById('viewGrid').style.display = 'block';
  document.getElementById('viewWarmup').style.display = 'none';
}

// ── Load section + render warmup ─────────────────────────────────────────────
function loadSection(id) {
  if (!id) {
    // random
    if (!_available.length) return;
    _currentSec = _available[Math.floor(Math.random() * _available.length)];
  } else {
    _currentSec = _secMap[id];
  }
  if (!_currentSec) return;
  renderWarmup();
  document.getElementById('viewGrid').style.display = 'none';
  document.getElementById('viewWarmup').style.display = 'block';
}

function newProblem() {
  if (_currentSec) renderWarmup();
}

function renderWarmup() {
  const sec = _currentSec;
  const schoolDay = isSchoolDay();
  const label = schoolDay ? 'Do Now' : 'Review';
  const tagClass = _courseChoice === 'ca' ? 'ca' : (_courseChoice === 'calc' ? 'calc' : _courseChoice === 'pc' ? 'pc' : 'review');

  const problems = sec.reviewProblems || [];
  const rawProb = problems.length
    ? problems[Math.floor(Math.random() * problems.length)]
    : null;
  const prob = rawProb && typeof rawProb === 'object' ? rawProb.problem : rawProb;
  const probAnswer = rawProb && typeof rawProb === 'object' ? rawProb.answer : null;

  const folder = _courseKey === 'collegeAlgebra' ? 'College%20Algebra' :
                 _courseKey === 'preCalc' ? 'PreCalc' :
                 _courseKey === 'calc1' ? 'Calc%201' : 'Calc%202';
  const BASE = './';
  const practiceUrl = sec.hasPractice && sec.practiceFile
    ? `${BASE}${folder}/${encodeURIComponent(sec.practiceFile.replace(/\.(html|docx|pdf)$/i,''))}.html`
    : null;

  const courseName = _courseKey === 'collegeAlgebra' ? 'College Algebra' :
                     _courseKey === 'preCalc' ? 'PreCalc' : 'Calculus';

  document.getElementById('warmupCard').innerHTML = `
    <span class="warmup-tag ${tagClass}">${courseName} &nbsp;&middot;&nbsp; ${label}</span>
    <div class="warmup-section">Section ${sec.section}</div>
    <div class="warmup-title">${sec.title}</div>
    <hr class="warmup-divider">
    <div class="warmup-swbat-label">Today you'll review</div>
    <div class="warmup-swbat">${renderMath(sec.swbat || '—')}</div>
    ${prob ? `<hr class="warmup-divider">
    <div class="warmup-swbat-label">Problem</div>
    <div class="warmup-swbat">${renderMath(prob)}</div>
    ${probAnswer ? `<div class="warmup-swbat-label" style="margin-top:.75rem">Answer</div><div class="warmup-swbat" style="font-size:.88rem;color:#7a7570">${renderMath(probAnswer)}</div>` : ''}` : ''}
    ${practiceUrl ? `<a class="practice-btn" href="${practiceUrl}" target="_blank">
      Open Practice Problems →
    </a>` : ''}
  `;
}

// ── Boot ──────────────────────────────────────────────────────────────────────
Promise.all([
  fetch('./calendar.json').then(r => r.json()).catch(() => ({})),
  fetch('./state.json').then(r => r.json()),
  fetch('./sections.json').then(r => r.json())
]).then(([calendar, state, sections]) => {
  _calendar  = calendar;
  _state     = state;
  _sections  = sections;
  _units     = sections.units || {};
  _today     = new Date().toISOString().slice(0,10);
  showPicker();
}).catch(() => {
  document.getElementById('viewPicker').innerHTML =
    '<div class="state-msg">Could not load data.</div>';
});
</script>
</body>
</html>
