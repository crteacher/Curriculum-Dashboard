<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Warm-Up — Mr. Halverson</title>
  <style>
    :root {
      --bg: #0f1117;
      --card: #1a1d27;
      --accent: #4f8ef7;
      --accent2: #7c5cbf;
      --text: #e8eaf0;
      --muted: #7a7f96;
      --border: #2a2d3d;
      --ca-color: #2a7a4a;
      --calc-color: #185fa5;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .header {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    .header .date {
      font-size: 1rem;
      color: var(--muted);
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-bottom: .4rem;
    }
    .header h1 { font-size: 2.2rem; font-weight: 700; letter-spacing: -.02em; }
    .header h1 span { color: var(--accent); }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 2rem 2.5rem;
      max-width: 680px;
      width: 100%;
      box-shadow: 0 8px 40px rgba(0,0,0,.4);
    }

    /* Course picker */
    .picker-prompt {
      text-align: center;
      font-size: 1.1rem;
      color: var(--muted);
      margin-bottom: 1.8rem;
    }
    .course-btns {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    .course-btn {
      flex: 1;
      min-width: 180px;
      padding: 1.4rem 1rem;
      border-radius: 12px;
      border: 2px solid var(--border);
      background: transparent;
      color: var(--text);
      font-size: 1.05rem;
      font-weight: 600;
      cursor: pointer;
      transition: border-color .2s, background .2s, transform .1s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .5rem;
    }
    .course-btn .course-icon { font-size: 1.8rem; }
    .course-btn.ca:hover  { border-color: var(--ca-color);   background: rgba(42,122,74,.12); }
    .course-btn.calc:hover { border-color: var(--calc-color); background: rgba(24,95,165,.12); }
    .course-btn:active { transform: scale(.97); }

    /* Warm-up content */
    .do-now-label {
      font-size: .8rem;
      font-weight: 700;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: .5rem;
    }
    .section-title { font-size: 1.7rem; font-weight: 700; line-height: 1.25; margin-bottom: .4rem; }
    .section-num   { font-size: 1rem; color: var(--muted); margin-bottom: 1.4rem; }
    .swbat {
      font-size: .95rem; color: var(--muted); line-height: 1.55;
      margin-bottom: 1.6rem; padding: .9rem 1.1rem;
      background: rgba(255,255,255,.04);
      border-left: 3px solid var(--accent);
      border-radius: 0 8px 8px 0;
    }
    .swbat strong { color: var(--text); font-weight: 600; }

    .practice-btn {
      display: inline-flex; align-items: center; gap: .5rem;
      background: var(--accent); color: #fff; text-decoration: none;
      font-weight: 600; font-size: 1rem;
      padding: .75rem 1.5rem; border-radius: 8px;
      transition: background .2s, transform .1s;
    }
    .practice-btn:hover { background: #3a7ae0; transform: translateY(-1px); }

    .course-tag {
      display: inline-block;
      font-size: .72rem; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase;
      padding: .3rem .8rem; border-radius: 999px;
      margin-bottom: 1.2rem;
    }
    .tag-ca   { background: rgba(42,122,74,.25);  color: #5ccb87; }
    .tag-calc { background: rgba(24,95,165,.25);  color: #6ab3f5; }
    .tag-review { background: rgba(124,92,191,.2); color: #b08cf5; }

    .shuffle-btn {
      display: inline-flex; align-items: center; gap: .4rem;
      background: transparent; border: 1px solid var(--border);
      color: var(--muted); font-size: .82rem;
      padding: .4rem .85rem; border-radius: 6px; cursor: pointer;
      margin-top: 1rem;
      transition: border-color .2s, color .2s;
    }
    .shuffle-btn:hover { border-color: var(--accent); color: var(--accent); }

    .back-btn {
      display: inline-flex; align-items: center; gap: .3rem;
      background: transparent; border: none;
      color: var(--muted); font-size: .82rem;
      padding: 0; cursor: pointer; margin-top: 1.2rem;
      transition: color .2s;
    }
    .back-btn:hover { color: var(--text); }

    .empty-state { text-align: center; padding: 1rem 0; }
    .empty-state .icon { font-size: 2.5rem; margin-bottom: .8rem; }
    .empty-state h2 { font-size: 1.3rem; margin-bottom: .5rem; }
    .empty-state p { color: var(--muted); font-size: .95rem; }

    .footer { margin-top: 2rem; color: var(--muted); font-size: .78rem; text-align: center; }
    .footer a { color: var(--muted); text-decoration: underline; }

    .loading { text-align: center; color: var(--muted); font-size: 1.1rem; }
    .dot-spin::after { content: '.'; animation: dots 1.2s steps(4, end) infinite; }
    @keyframes dots { 0%{content:'.'}25%{content:'..'}50%{content:'...'}75%{content:'....'}  }
  </style>
</head>
<body>

<div class="header">
  <div class="date" id="dateDisplay"></div>
  <h1>Daily <span>Warm-Up</span></h1>
</div>

<div class="card" id="mainCard">
  <div class="loading">Loading<span class="dot-spin"></span></div>
</div>

<div class="footer">
  <a href="index.html">← Back to Dashboard</a>
  &nbsp;·&nbsp;
  <a href="donow-ca.html">CA Do Now (graded) ↗</a>
</div>

<script>
const BASE = 'https://crteacher.github.io/Curriculum-Dashboard/';
const S1_START = '2025-08-20', S1_END = '2025-12-15';
const S2_START = '2026-01-06', S2_END = '2026-05-22';

function todayStr() { return new Date().toISOString().slice(0,10); }
function formatDateDisplay(str) {
  return new Date(str+'T12:00:00').toLocaleDateString('en-US',
    {weekday:'long',month:'long',day:'numeric',year:'numeric'});
}
function inSemester(d,s,e){ return d>=s && d<=e; }

function weightedPick(arr) {
  if (!arr.length) return null;
  const w = arr.map((_,i) => Math.pow(1.04,i));
  const t = w.reduce((a,b)=>a+b,0);
  let r = Math.random()*t;
  for(let i=0;i<arr.length;i++){ r-=w[i]; if(r<=0) return arr[i]; }
  return arr[arr.length-1];
}

// Globals
let _calendar, _state, _sections, _today;
let _allDone = {}; // courseKey -> doneSections array
let _picked  = {}; // courseKey -> currently shown section

function getCourseKey(courseChoice, today) {
  // courseChoice: 'ca' or 'calc'
  if (courseChoice === 'ca') return 'collegeAlgebra';
  // For calc: pick calc1 (S1) or calc2 (S2) based on date
  if (inSemester(today, S1_START, S1_END)) return 'calc1';
  if (inSemester(today, S2_START, S2_END)) return 'calc2';
  // Off-season: pick whichever has completed sections
  const c1done = (_state.courses.calc1?.completedSections||[]).length;
  const c2done = (_state.courses.calc2?.completedSections||[]).length;
  return c2done >= c1done ? 'calc2' : 'calc1';
}

function isSchoolDay(today) {
  return _calendar.aDays.includes(today) || _calendar.bDays.includes(today);
}

function renderWarmup(courseChoice) {
  const card = document.getElementById('mainCard');
  const today = _today;
  const courseKey = getCourseKey(courseChoice, today);
  const courseState = _state.courses[courseKey];
  const courseName = courseKey === 'collegeAlgebra' ? 'College Algebra' :
                     courseKey === 'calc1' ? 'Calculus 1' : 'Calculus 2';
  const tagClass = courseChoice === 'ca' ? 'tag-ca' : 'tag-calc';

  const completed = courseState?.completedSections || [];
  const allSections = _sections[courseKey === 'collegeAlgebra' ? 'collegeAlgebra' :
                                courseKey === 'calc1' ? 'calc1' : 'calc2'] || [];
  const doneSections = allSections.filter(s => completed.includes(s.id));

  if (!doneSections.length) {
    card.innerHTML = `
      <span class="course-tag ${tagClass}">${courseName}</span>
      <div class="empty-state">
        <div class="icon">📚</div>
        <h2>Nothing yet!</h2>
        <p>Warm-ups appear here after your first completed section.<br>Check back soon.</p>
      </div>
      <button class="back-btn" onclick="showPicker()">← Choose a different class</button>`;
    return;
  }

  _allDone[courseKey] = doneSections;
  if (!_picked[courseKey]) _picked[courseKey] = weightedPick(doneSections);
  const s = _picked[courseKey];

  const schoolDay = isSchoolDay(today);
  const label = schoolDay ? 'Do Now' : 'Review';
  const reviewNote = schoolDay ? '' :
    `<p style="color:var(--muted);font-size:.82rem;margin-bottom:1rem">No class today — here's a review problem.</p>`;

  const folder = courseKey === 'collegeAlgebra' ? 'College Algebra' :
                 courseKey === 'calc1' ? 'Calc 1' : 'Calc 2';
  const baseName = s.practiceFile.replace(/\.(html|docx|pdf)$/i, '');
  const practiceUrl = BASE + encodeURIComponent(folder) + '/' + encodeURIComponent(baseName) + '.html';

  card.innerHTML = `
    <span class="course-tag ${schoolDay ? tagClass : 'tag-review'}">${courseName}${schoolDay ? '' : ' · Review'}</span>
    ${reviewNote}
    <div class="do-now-label">${label}</div>
    <div class="section-title">${s.title}</div>
    <div class="section-num">Section ${s.section}</div>
    <div class="swbat"><strong>Today you'll review:</strong> ${s.swbat}.</div>
    ${s.hasPractice ? `
      <a class="practice-btn" href="${practiceUrl}" target="_blank">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M9 18l6-6-6-6"/>
        </svg>
        Open Practice Problems
      </a>` : `<p style="color:var(--muted);font-size:.9rem">Practice problems coming soon.</p>`}
    <br>
    <div style="display:flex;gap:.7rem;flex-wrap:wrap;margin-top:.2rem">
      <button class="shuffle-btn" onclick="shuffle('${courseKey}')">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/>
          <polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/>
        </svg>
        Different section
      </button>
      <button class="back-btn" onclick="showPicker()">← Different class</button>
    </div>`;
}

function shuffle(courseKey) {
  const pool = (_allDone[courseKey] || []).filter(s => s.id !== _picked[courseKey]?.id);
  if (!pool.length) return;
  _picked[courseKey] = weightedPick(pool);
  const choice = courseKey === 'collegeAlgebra' ? 'ca' : 'calc';
  renderWarmup(choice);
}

function showPicker() {
  const card = document.getElementById('mainCard');
  const today = _today;
  const schoolDay = isSchoolDay(today);
  const subtitle = schoolDay ? "Which class are you in?" : "Pick a class for review practice:";

  card.innerHTML = `
    <p class="picker-prompt">${subtitle}</p>
    <div class="course-btns">
      <button class="course-btn ca" onclick="renderWarmup('ca')">
        <span class="course-icon">📐</span>
        College Algebra
      </button>
      <button class="course-btn calc" onclick="renderWarmup('calc')">
        <span class="course-icon">∫</span>
        Calculus
      </button>
    </div>`;
}

async function init() {
  _today = todayStr();
  document.getElementById('dateDisplay').textContent = formatDateDisplay(_today);

  try {
    [_calendar, _state, _sections] = await Promise.all([
      fetch(BASE + 'calendar.json').then(r => r.json()),
      fetch(BASE + 'state.json').then(r => r.json()),
      fetch(BASE + 'sections.json').then(r => r.json()),
    ]);
  } catch(e) {
    document.getElementById('mainCard').innerHTML = `
      <div class="empty-state">
        <div class="icon">⚠️</div>
        <h2>Couldn't load data</h2>
        <p>Check your connection and try refreshing.</p>
      </div>`;
    return;
  }

  showPicker();
}

init();
</script>
</body>
</html>
