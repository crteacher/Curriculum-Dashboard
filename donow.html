<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Do Now — Dr. Halverson</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.17.0/katex.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.17.0/katex.min.js"></script>
  <style>
    :root {
      --bg: #f4f4f4;
      --card: #ffffff;
      --text: #111111;
      --muted: #555555;
      --border: #e0e0e0;
      --ca:    #2e5339;
      --calc:  #1e3a5c;
      --pc:    #7a3b8a;
      --green: #2e5339;
      --red:   #b91c1c;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem 3rem;
    }
    .site-nav { background: #6b1a26; padding: .65rem 1.5rem; margin: -2rem -1rem 2rem; }
    .site-nav a { color: rgba(255,255,255,.9); text-decoration: none; font-size: .85rem; font-family: Georgia, serif; }
    .site-nav a:hover { color: #fff; }

    .page-header { text-align: center; margin-bottom: 2rem; }
    .page-header .date-label {
      font-size: .82rem; color: var(--muted);
      letter-spacing: .1em; text-transform: uppercase; margin-bottom: .35rem;
    }
    .page-header h1 { font-size: 2rem; font-weight: 700; color: #6b1a26; }
    .page-header .subtitle { font-size: .9rem; color: var(--muted); margin-top: .4rem; }

    /* Course grid — matches exit-ticket layout */
    .courses-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.5rem;
      max-width: 1100px;
      margin: 0 auto;
    }

    .course-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .course-card.ca    { border-color: #2e533944; }
    .course-card.calc { border-color: #1e3a5c44; }
    .course-card.pc    { border-color: #7a3b8a44; }
    .course-card.inactive { opacity: .55; }

    .course-label {
      font-size: .7rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .1em;
    }
    .ca    .course-label { color: var(--ca); }
    .calc .course-label { color: var(--calc); }
    .pc    .course-label { color: var(--pc); }

    .sec-badge {
      display: inline-block;
      font-size: .67rem; font-weight: 700;
      letter-spacing: .07em; text-transform: uppercase;
      padding: .18rem .6rem; border-radius: 999px;
    }
    .ca    .sec-badge { background: #eaf0ec; color: var(--ca); }
    .calc .sec-badge { background: #e8edf4; color: var(--calc); }
    .pc    .sec-badge { background: #f3eafa; color: var(--pc); }

    .prob-statement { font-size: .97rem; line-height: 1.7; }
    .prob-statement .katex-display { margin: .5rem 0; }

    /* Inputs */
    .answer-area { display: flex; flex-direction: column; gap: .5rem; }
    .input-row { display: flex; align-items: center; gap: .5rem; }
    .input-label { font-size: .82rem; color: var(--muted); white-space: nowrap; }
    .ans-input {
      flex: 1; background: #f0ece6;
      border: 1px solid var(--border); border-radius: 7px;
      color: var(--text); font-size: 1rem;
      padding: .45rem .7rem; outline: none; transition: border-color .2s;
    }
    .ans-input:focus { border-color: #888; }
    .ans-input:disabled { opacity: .45; }
    .ans-hint { font-size: .73rem; color: var(--muted); }

    /* MCQ */
    .mcq-opts { display: flex; flex-direction: column; gap: .4rem; }
    .mcq-btn {
      background: #f0ece6; border: 1px solid var(--border);
      border-radius: 8px; color: var(--text);
      font-size: .9rem; padding: .5rem .9rem;
      cursor: pointer; text-align: left;
      transition: border-color .2s, background .2s;
    }
    .mcq-btn[disabled] { cursor: default; }
    .mcq-btn.correct { border-color: var(--green) !important; background: rgba(52,199,123,.12) !important; color: var(--green); }
    .mcq-btn.wrong   { border-color: var(--red)   !important; background: rgba(247,79,79,.1)  !important; color: var(--red); opacity: .65; }
    .mcq-btn.reveal  { border-color: var(--green) !important; background: rgba(52,199,123,.08) !important; color: var(--green); }

    /* Check button — accent matches course */
    .check-btn {
      border: none; border-radius: 8px;
      font-size: .9rem; font-weight: 600;
      padding: .55rem 1.1rem; cursor: pointer;
      align-self: flex-start; color: #fff;
      transition: opacity .2s;
    }
    .check-btn:hover:not([disabled]) { opacity: .85; }
    .check-btn[disabled] { opacity: .4; cursor: default; }
    .ca    .check-btn { background: var(--ca); }
    .calc .check-btn { background: var(--calc); }
    .pc    .check-btn { background: var(--pc); }

    /* Feedback */
    .feedback { border-radius: 8px; padding: .65rem .9rem; font-size: .86rem; line-height: 1.55; display: none; }
    .feedback.show { display: block; }
    .feedback.correct-fb { background: rgba(52,199,123,.1);  border: 1px solid rgba(52,199,123,.28); }
    .feedback.wrong-fb   { background: rgba(247,79,79,.08); border: 1px solid rgba(247,79,79,.22); }
    .solution-label {
      font-size: .68rem; font-weight: 700; letter-spacing: .1em;
      text-transform: uppercase; color: var(--muted);
      margin-top: .5rem; margin-bottom: .15rem; display: block;
    }
    .solution-body { line-height: 1.6; }
    .solution-body .katex-display { margin: .35rem 0; }

    /* Fallback / inactive */
    .prac-fallback { font-size: .88rem; color: var(--muted); line-height: 1.5; }
    .prac-btn {
      display: inline-flex; align-items: center; gap: .4rem;
      background: #f0ece6; border: 1px solid var(--border);
      border-radius: 8px; color: var(--text);
      font-size: .88rem; font-weight: 600;
      padding: .5rem .9rem; text-decoration: none; margin-top: .5rem;
      transition: background .2s; align-self: flex-start;
    }
    .prac-btn:hover { background: #e0e0e0; }

    .none-msg { color: var(--muted); font-size: .9rem; font-style: italic; }

    .page-footer { text-align: center; margin-top: 2rem; color: var(--muted); font-size: .78rem; }
    .page-footer a { color: var(--muted); text-decoration: underline; }
  </style>
</head>
<body>
<nav class="site-nav"><a href="./index.html">← Portal</a></nav>

<div class="page-header">
  <div class="date-label" id="dateLabel"></div>
  <h1>Do Now</h1>
  <div class="subtitle">Same topic for everyone — your own numbers.</div>
</div>

<div class="courses-grid" id="mainArea">
  <div style="grid-column:1/-1;text-align:center;padding:3rem;color:var(--muted)">Loading…</div>
</div>

<div class="page-footer">
  <a href="index.html">← Dashboard</a>
</div>

<script>
const BASE = 'https://crteacher.github.io/Curriculum-Dashboard/';

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function fmtDate(s) {
  return new Date(s + 'T12:00:00').toLocaleDateString('en-US',
    { weekday:'long', month:'long', day:'numeric', year:'numeric' });
}

function ri(a, b) { return Math.floor(Math.random() * (b - a + 1)) + a; }
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

// Math helpers
function gcd(a, b) { a = Math.abs(a); b = Math.abs(b); while (b) { [a, b] = [b, a % b]; } return a; }

function reduceFrac(n, d) {
  if (d === 0) return [n, d];
  const g = gcd(Math.abs(n), Math.abs(d));
  n /= g; d /= g;
  if (d < 0) { n = -n; d = -d; }
  return [n, d];
}

// Build LaTeX fraction string (returns integer if denominator is 1)
function fracTex(n, d) {
  [n, d] = reduceFrac(n, d);
  if (d === 1) return `${n}`;
  return `\\dfrac{${n}}{${d}}`;
}

// Build polynomial term string for LaTeX
function termTex(coeff, varStr, power) {
  // power 0 → constant, power 1 → varStr, power 2 → varStr^2
  if (coeff === 0) return '';
  let base = '';
  if (power === 0) base = '';
  else if (power === 1) base = varStr;
  else base = `${varStr}^${power}`;
  const absC = Math.abs(coeff);
  if (base === '') return `${coeff}`;
  if (absC === 1) return coeff > 0 ? base : `-${base}`;
  return `${coeff}${base}`;
}

// Build linear "ax + b" expression for LaTeX
function linearTex(a, b, v = 'x') {
  if (a === 0 && b === 0) return '0';
  const aStr = termTex(a, v, 1);
  if (b === 0) return aStr || '0';
  if (a === 0) return `${b}`;
  return b > 0 ? `${aStr} + ${b}` : `${aStr} - ${Math.abs(b)}`;
}

// Build quadratic "ax² + bx + c" for LaTeX
function quadTex(a, b, c, v = 'x') {
  let parts = [];
  if (a !== 0) parts.push(termTex(a, v, 2));
  if (b !== 0) {
    const bStr = termTex(Math.abs(b), v, 1);
    if (parts.length) parts.push(b > 0 ? `+ ${bStr}` : `- ${bStr}`);
    else parts.push(termTex(b, v, 1));
  }
  if (c !== 0) {
    if (parts.length) parts.push(c > 0 ? `+ ${c}` : `- ${Math.abs(c)}`);
    else parts.push(`${c}`);
  }
  return parts.join(' ') || '0';
}

// KaTeX render helpers
function kD(tex) { // display mode
  try { return katex.renderToString(tex, { displayMode: true, throwOnError: false }); }
  catch(e) { return tex; }
}
function kI(tex) { // inline mode
  try { return katex.renderToString(tex, { displayMode: false, throwOnError: false }); }
  catch(e) { return tex; }
}

// Parse student numeric input (handles fractions "3/4", decimals, integers)
function parseNum(s) {
  if (!s || !s.trim()) return NaN;
  s = s.trim().replace(/\s+/g, '');
  const m = s.match(/^(-?\d+)\/(-?\d+)$/);
  if (m) return parseInt(m[1]) / parseInt(m[2]);
  return parseFloat(s);
}
function approxEq(a, b, tol = 1e-6) { return Math.abs(a - b) < tol; }


/* ─────────────────────────────────────────────
   PROBLEM GENERATORS
   Each returns a problem descriptor object.
   Types: 'numeric' | 'numeric2' | 'mcq' | 'complex2'
───────────────────────────────────────────── */

/* ═══════════════════════════════════════════
   GEN FUNCTIONS — COLLEGE ALGEBRA
═══════════════════════════════════════════ */
const GEN = {};

// --- 1.1  Solving Linear Equations  ax + b = c ---
GEN['CA_1_1'] = function() {
  const a = ri(2, 8);
  const x = ri(-7, 7);
  const b = ri(-12, 12);
  const c = a * x + b;
  const bSign = b > 0 ? `+ ${b}` : b < 0 ? `- ${Math.abs(b)}` : '';
  const eq = b === 0 ? `${a}x = ${c}` : `${a}x ${bSign} = ${c}`;
  const step = c - b;
  return {
    html: `Solve for ${kI('x')}: ${kD(eq)}`,
    type: 'numeric',
    answer: x,
    solutionHtml:
      kD(`${a}x = ${c} ${b >= 0 ? '-' : '+'} ${Math.abs(b)} = ${step}`) +
      kD(`x = ${fracTex(step, a)} = ${x}`)
  };
};

// --- 1.2  Solutions of Linear Equations (one / none / infinite)  MCQ ---
GEN['CA_1_2'] = function() {
  const a = ri(2, 7);
  const b = ri(-8, 8);
  const caseType = ri(0, 2);
  let eq, answer, explanation;
  if (caseType === 0) {
    // Different coefficients → one solution
    const a2 = a === 2 ? 3 : 2;
    const d = ri(-8, 8);
    eq = `${linearTex(a, b)} = ${linearTex(a2, d)}`;
    answer = 0;
    explanation = `The coefficients of ${kI('x')} are different (${a} vs ${a2}), so there is exactly one solution.`;
  } else if (caseType === 1) {
    // Same coefficient, different constant → no solution
    const d = b + (b === 0 ? ri(1,5) : (Math.random() < .5 ? ri(1,5) : -ri(1,5)));
    eq = `${linearTex(a, b)} = ${linearTex(a, d)}`;
    answer = 1;
    explanation = `After subtracting ${kI(`${a}x`)} from both sides: ${kI(`${b} = ${d}`)}, which is false — no solution.`;
  } else {
    // Identical → infinitely many
    eq = `${linearTex(a, b)} = ${linearTex(a, b)}`;
    answer = 2;
    explanation = `Both sides are identical — every value of ${kI('x')} is a solution.`;
  }
  return {
    html: `How many solutions does this equation have?${kD(eq)}`,
    type: 'mcq',
    choices: ['One solution', 'No solution', 'Infinitely many solutions'],
    correctIdx: answer,
    solutionHtml: explanation
  };
};

// --- 1.3  Interval Notation / Inequalities  ax + b < c  (ask for boundary) ---
GEN['CA_1_3'] = function() {
  const a = ri(2, 6);
  const b = ri(-10, 10);
  const c = ri(-10, 10);
  // a*x + b < c  →  x < (c-b)/a
  const [num, den] = reduceFrac(c - b, a);
  const bound = num / den;
  const sym = pick(['<', '\\le', '>', '\\ge']);
  // Flip direction if a < 0 (but we keep a > 0 here for simplicity)
  const dirLabel = (sym === '<' || sym === '\\le') ? 'less than' : 'greater than';
  return {
    html: `Solve: ${kD(`${a}x ${b >= 0 ? '+ ' + b : '- ' + Math.abs(b)} ${sym} ${c}`)}
           Enter the boundary value (exact, as a fraction or integer):`,
    type: 'numeric',
    answer: bound,
    solutionHtml:
      kD(`${a}x ${sym} ${c} ${b >= 0 ? '-' : '+'} ${Math.abs(b)} = ${c - b}`) +
      kD(`x ${sym} ${fracTex(c - b, a)}`)
  };
};

// --- 1.6  Absolute Value Equations  |x + b| = c ---
GEN['CA_1_6'] = function() {
  // Keep it: a = 1 for clean algebra
  const b = ri(-6, 6);
  const c = ri(1, 9);
  const x1 = c - b;   // from  x + b = c
  const x2 = -c - b;  // from  x + b = -c
  const bSign = b > 0 ? `+ ${b}` : b < 0 ? `- ${Math.abs(b)}` : '';
  const inner = b === 0 ? 'x' : `x ${bSign}`;
  return {
    html: `Solve: ${kD(`|${inner}| = ${c}`)} Enter both solutions (smaller, then larger):`,
    type: 'numeric2',
    answers: [Math.min(x1, x2), Math.max(x1, x2)],
    labels: ['smaller', 'larger'],
    solutionHtml:
      `Set up two equations:` +
      kD(`${inner} = ${c}  \\implies  x = ${c - b}`) +
      kD(`${inner} = -${c} \\implies  x = ${-c - b}`)
  };
};

// --- 2.1  Slope from two points ---
GEN['CA_2_1'] = function() {
  // Pick rise and run, build two points
  const rise = ri(-7, 7);
  const run = ri(1, 6) * (Math.random() < .5 ? 1 : -1);
  const x1 = ri(-4, 4);
  const y1 = ri(-5, 5);
  const x2 = x1 + run;
  const y2 = y1 + rise;
  const [rN, rD] = reduceFrac(rise, run);
  const slopeVal = rN / rD;
  return {
    html: `Find the slope of the line through ${kI(`(${x1},\\ ${y1})`)} and ${kI(`(${x2},\\ ${y2})`)}.<br>
           <span class="ans-hint">Enter as a fraction (e.g. <code>-3/2</code>) or integer.</span>`,
    type: 'numeric',
    answer: slopeVal,
    solutionHtml:
      kD(`m = \\frac{y_2 - y_1}{x_2 - x_1} = \\frac{${y2} - (${y1})}{${x2} - (${x1})} = \\frac{${rise}}{${run}} = ${rD === 1 ? rN : fracTex(rN, rD)}`)
  };
};

// --- 2.2  Slope-intercept form: given m and a point, find y-intercept ---
GEN['CA_2_2'] = function() {
  const m = ri(-5, 5) || 1; // avoid 0
  const x0 = ri(-4, 4);
  const y0 = ri(-8, 8);
  const b = y0 - m * x0;
  const mStr = m === 1 ? '' : m === -1 ? '-' : `${m}`;
  return {
    html: `A line has slope ${kI(`m = ${m}`)} and passes through ${kI(`(${x0},\\ ${y0})`)}.
           What is the ${kI('y')}-intercept?`,
    type: 'numeric',
    answer: b,
    solutionHtml:
      `Use ${kI('y = mx + b')}: substitute the point and slope.` +
      kD(`${y0} = ${m}(${x0}) + b`) +
      kD(`b = ${y0} - ${m >=0 ? m+'(' : '('+m+'('}${x0}) = ${y0} - (${m * x0}) = ${b}`)
  };
};

// --- 3.1  Function evaluation ---
GEN['CA_3_1'] = function() {
  const type = pick([0, 1]); // 0 = linear, 1 = quadratic
  if (type === 0) {
    const a = ri(-5, 5) || 2;
    const b = ri(-8, 8);
    const x = ri(-4, 4);
    const ans = a * x + b;
    return {
      html: `Let ${kI(`f(x) = ${linearTex(a, b)}`)}.  Find ${kI(`f(${x})`)}:`,
      type: 'numeric',
      answer: ans,
      solutionHtml: kD(`f(${x}) = ${a}(${x}) + ${b} = ${a*x} + ${b} = ${ans}`)
    };
  } else {
    const a = ri(1, 3);
    const b = ri(-4, 4);
    const c = ri(-6, 6);
    const x = ri(-3, 3);
    const ans = a * x * x + b * x + c;
    return {
      html: `Let ${kI(`f(x) = ${quadTex(a, b, c)}`)}.  Find ${kI(`f(${x})`)}:`,
      type: 'numeric',
      answer: ans,
      solutionHtml: kD(`f(${x}) = ${a}(${x})^2 + ${b}(${x}) + ${c} = ${a*x*x} ${b*x >= 0 ? '+' : ''} ${b*x} + ${c} = ${ans}`)
    };
  }
};

// --- 3.3  Function composition f(g(x)) at a point ---
GEN['CA_3_3'] = function() {
  const a = ri(-4, 4) || 1;
  const b = ri(-5, 5);
  const c = ri(-4, 4) || 2;
  const d = ri(-5, 5);
  const x = ri(-3, 3);
  // f(x) = ax + b, g(x) = cx + d
  // f(g(x)) = a(cx+d)+b = acx + ad + b
  const gx = c * x + d;
  const fgx = a * gx + b;
  const opType = pick(['composition', 'sum']);
  if (opType === 'composition') {
    return {
      html: `Let ${kI(`f(x) = ${linearTex(a, b)}`)} and ${kI(`g(x) = ${linearTex(c, d)}`)}.
             Find ${kI(`f(g(${x}))`)}:`,
      type: 'numeric',
      answer: fgx,
      solutionHtml:
        kD(`g(${x}) = ${c}(${x}) + ${d} = ${gx}`) +
        kD(`f(g(${x})) = f(${gx}) = ${a}(${gx}) + ${b} = ${fgx}`)
    };
  } else {
    const sumAns = (a + c) * x + (b + d);
    return {
      html: `Let ${kI(`f(x) = ${linearTex(a, b)}`)} and ${kI(`g(x) = ${linearTex(c, d)}`)}.
             Find ${kI(`(f + g)(${x})`)}:`,
      type: 'numeric',
      answer: sumAns,
      solutionHtml:
        kD(`(f+g)(${x}) = f(${x}) + g(${x}) = (${a*x + b}) + (${c*x + d}) = ${sumAns}`)
    };
  }
};

// --- 3.5  Inverse functions: find f⁻¹(c) where f is linear ---
GEN['CA_3_5'] = function() {
  const a = ri(2, 7);
  const b = ri(-8, 8);
  const yVal = ri(-6, 6) * a + b; // ensures x = (yVal - b)/a is integer
  const xAns = (yVal - b) / a;
  return {
    html: `Let ${kI(`f(x) = ${linearTex(a, b)}`)}.  Find ${kI(`f^{-1}(${yVal})`)}:`,
    type: 'numeric',
    answer: xAns,
    solutionHtml:
      `Set ${kI(`y = ${linearTex(a, b)}`)} and solve for ${kI('x')}:` +
      kD(`${yVal} = ${a}x + ${b} \\implies x = ${fracTex(yVal - b, a)} = ${xAns}`)
  };
};

// --- 4.1  Solving by Factoring  x² + bx + c = 0 ---
GEN['CA_4_1'] = function() {
  // r1, r2 are the ROOTS: (x - r1)(x - r2) = x² - (r1+r2)x + r1*r2
  const r1 = ri(-7, 7);
  let r2 = ri(-7, 7);
  if (r2 === r1) r2 = r1 + pick([-2, -1, 1, 2]);
  const b = -(r1 + r2); // coefficient of x
  const c = r1 * r2;
  const f1 = r1 <= 0 ? `+ ${Math.abs(r1)}` : `- ${r1}`;
  const f2 = r2 <= 0 ? `+ ${Math.abs(r2)}` : `- ${r2}`;
  return {
    html: `Solve by factoring: ${kD(quadTex(1, b, c) + ' = 0')} Enter both solutions:`,
    type: 'numeric2',
    answers: [Math.min(r1, r2), Math.max(r1, r2)],
    labels: ['smaller x', 'larger x'],
    solutionHtml:
      kD(`(x ${f1})(x ${f2}) = 0`) +
      kD(`x = ${r1} \\text{ or } x = ${r2}`)
  };
};

// --- 4.3  Completing the Square — find vertex ---
GEN['CA_4_3'] = function() {
  const h = ri(-5, 5);
  const k = ri(-8, 8);
  // f(x) = (x-h)² + k = x² - 2hx + h² + k
  const b = -2 * h;
  const c = h * h + k;
  return {
    html: `Find the vertex of: ${kD(quadTex(1, b, c))} by completing the square.`,
    type: 'numeric2',
    answers: [h, k],
    labels: ['h  (x-coordinate)', 'k  (y-coordinate)'],
    solutionHtml:
      kD(`x^2 ${b >= 0 ? '+' : ''} ${b}x + ${c}`) +
      kD(`= \\left(x ${h <= 0 ? '+' + (-h) : '- ' + h}\\right)^2 + ${k}`) +
      `Vertex: ${kI(`(${h},\\ ${k})`)}`,
  };
};

// --- 4.4  Quadratic Formula (generate with integer roots so check is clean) ---
GEN['CA_4_4'] = function() {
  const r1 = ri(-6, 6);
  let r2 = ri(-6, 6);

      type: 'numeric', answer: m + n,

// --- S.8  Permutations and Combinations ---
GEN['CA_S_8'] = function() {
  const n = ri(5, 10);
  const r = ri(2, Math.min(n - 1, 4));
  const usePerm = Math.random() < .5;

  function fact(x) { let f = 1; for (let i = 2; i <= x; i++) f *= i; return f; }
  function P(nn, rr) { return fact(nn) / fact(nn - rr); }
  function C(nn, rr) { return fact(nn) / (fact(rr) * fact(nn - rr)); }

  if (usePerm) {
    const ans = P(n, r);
    return {
      html: `In how many ways can ${r} students be chosen <strong>and arranged</strong> from a group of ${n}?
             (Order matters.)`,
      type: 'numeric',
      answer: ans,
      solutionHtml:
        kD(`P(${n},${r}) = \\frac{${n}!}{(${n}-${r})!} = \\frac{${n}!}{${n-r}!} = ${ans}`)
    };
  } else {
    const ans = C(n, r);
    return {
      html: `In how many ways can ${r} students be chosen from a group of ${n}?
             (Order does not matter.)`,
      type: 'numeric',
      answer: ans,
      solutionHtml:
        kD(`C(${n},${r}) = \\binom{${n}}{${r}} = \\frac{${n}!}{${r}!\\cdot${n-r}!} = ${ans}`)
    };
  }
};

// ── §1.1  Evaluate a limit by factoring ──────────────────────────────────────
// lim_{x→r} (x² − (r+s)x + r·s) / (x − r) = r − s
GEN['Calc_1_1'] = function() {
  let r, s;
  do { r = ri(-5, 5); s = ri(-5, 5); } while (r === s || r === 0);
  const sumRS  = r + s;
  const prodRS = r * s;
  // numerator factors as (x−r)(x−s)
  const bCoeff = -sumRS;    // coefficient of x in expanded numerator
  const cCoeff = prodRS;
  const denom  = r > 0 ? `x - ${r}` : `x + ${Math.abs(r)}`;
  const numTex = polyTex([{c:1,v:'x',p:2},{c:bCoeff,v:'x',p:1},{c:cCoeff,v:'x',p:0}]);
  const ans = r - s;
  const factored2 = s > 0 ? `x - ${s}` : `x + ${Math.abs(s)}`;
  return {
    html: `Evaluate: ${kD(`\\lim_{x \\to ${r}} \\frac{${numTex}}{${denom}}`)}
           <span class="ans-hint">Factor the numerator first.</span>`,
    type: 'numeric',
    answer: ans,
    solutionHtml:
      kD(`\\frac{${numTex}}{${denom}} = \\frac{(${denom})(${factored2})}{${denom}} = ${factored2}`) +
      kD(`\\lim_{x \\to ${r}} (${factored2}) = ${r} ${s >= 0 ? '- ' + s : '+ ' + Math.abs(s)} = ${ans}`)
  };
};

// ── §1.2  Limit of a polynomial (direct substitution) ────────────────────────
GEN['Calc_1_2'] = function() {
  const a = ri(-4, 4) || 1;
  const b = ri(-6, 6);
  const c = ri(-8, 8);
  const x0 = ri(-4, 4);
  const ans = a * x0 * x0 + b * x0 + c;
  const fTex = polyTex([{c:a,v:'x',p:2},{c:b,v:'x',p:1},{c:c,v:'x',p:0}]);
  return {
    html: `Evaluate: ${kD(`\\lim_{x \\to ${x0}} \\left(${fTex}\\right)`)}`,
    type: 'numeric',
    answer: ans,
    solutionHtml:
      `Since this is a polynomial, substitute directly:` +
      kD(`${a}(${x0})^2 + ${b}(${x0}) + (${c}) = ${a*x0*x0} ${b*x0 >= 0 ? '+' : ''} ${b*x0} ${c >= 0 ? '+' : ''} ${c} = ${ans}`)
  };
};

           <span class="ans-hint">Enter as a fraction if needed (e.g. <code>2/3</code>).</span>`,

// ── §2.2  Limit definition of the derivative ─────────────────────────────────
// f(x) = ax² + bx,  find f′(x₀) using the limit definition

// ── §2.3  Power Rule: evaluate f′(x₀) ────────────────────────────────────────
GEN['Calc_2_3'] = function() {
  const n = ri(2, 5);
  const m = ri(1, n - 1); // ensure m ≠ n
  const a = ri(-4, 4) || 1;
  const b = ri(-4, 4) || 1;
  const x0 = pick([1, -1, 2]);
  // f(x) = ax^n + bx^m
  // f′(x) = a·n·x^(n-1) + b·m·x^(m-1)
  const ans = a * n * Math.pow(x0, n - 1) + b * m * Math.pow(x0, m - 1);
  const fTex = polyTex([{c:a,v:'x',p:n},{c:b,v:'x',p:m}]);
  const fpTex = polyTex([{c:a*n,v:'x',p:n-1},{c:b*m,v:'x',p:m-1}]);
  return {
    html: `Let ${kI(`f(x) = ${fTex}`)}. Find ${kI(`f'(${x0})`)}:`,
    type: 'numeric',
    answer: ans,
    solutionHtml:
      kD(`f'(x) = ${fpTex}`) +
      kD(`f'(${x0}) = ${a*n}(${x0})^{${n-1}} + ${b*m}(${x0})^{${m-1}} = ${ans}`)
  };
};

// ── §2.4  Trig / Exp / Log derivatives ───────────────────────────────────────
GEN['Calc_2_4'] = function() {

    // f(x) = a·sin(x) + b·cos(x)
    // f′(x) = a·cos(x) − b·sin(x)
    const ans = Math.round(a * Math.cos(xVal) - b * Math.sin(xVal));
    const fTex = `${a}\\sin(x) ${b >= 0 ? '+' : '-'} ${Math.abs(b)}\\cos(x)`;
    const fpTex = `${a}\\cos(x) ${b >= 0 ? '-' : '+'} ${Math.abs(b)}\\sin(x)`;
    return {
      html: `Let ${kI(`f(x) = ${fTex}`)}. Find ${kI(`f'(${evalPt})`)}:`,

    };
  } else {
    // f(x) = a·ln(x) + b·x^n, find f′(1) = a + b·n
    const a = ri(-5, 5) || 1;
    const n = ri(2, 4);
    const b = ri(-4, 4) || 1;
    const ans = a + b * n;
    return {
      html: `Let ${kI(`f(x) = ${a}\\ln(x) ${b >= 0 ? '+' : '-'} ${Math.abs(b)}x^{${n}}`)}. Find ${kI(`f'(1)`)}:`,

      solutionHtml:
        kD(`f'(x) = \\frac{${a}}{x} ${b >= 0 ? '+' : '-'} ${Math.abs(b*n)}x^{${n-1}}`) +
        kD(`f'(1) = \\frac{${a}}{1} ${b*n >= 0 ? '+' : '-'} ${Math.abs(b*n)}(1)^{${n-1}} = ${a} ${b*n >= 0 ? '+' : '-'} ${Math.abs(b*n)} = ${ans}`)
    };
  }
};

// ── §2.5  Product Rule ────────────────────────────────────────────────────────
// f(x) = x^n · (ax + b),  find f′(1) = n·(a+b) + a
GEN['Calc_2_5'] = function() {
  const type = pick(['product', 'quotient']);

  if (type === 'product') {
    const n = ri(2, 4);
    const a = ri(-4, 4) || 1;
    const b = ri(-4, 4) || 1;
    // f(x) = x^n·(ax+b)
    // f′(x) = n·x^(n-1)·(ax+b) + x^n·a
    // f′(1) = n·(a+b) + a
    const ans = n * (a + b) + a;
    const lTex = linearTex(a, b);
    return {
      html: `Let ${kI(`f(x) = x^{${n}}(${lTex})`)}. Use the <strong>product rule</strong> to find ${kI(`f'(1)`)}:`,
      type: 'numeric',
      answer: ans,
      solutionHtml:
        kD(`f'(x) = ${n}x^{${n-1}}(${lTex}) + x^{${n}} \\cdot ${a}`) +
        kD(`f'(1) = ${n}(${a}+${b}) + ${a} = ${n*(a+b)} + ${a} = ${ans}`)
    };
  } else {
    // Quotient: f(x) = (ax² + b) / (cx + d),  find f′(0) = −bc / d²
    let a2, b2, c2, d2;
    do {
      a2 = ri(1, 4);
      b2 = ri(1, 5) * pick([-1,1]);
      c2 = ri(1, 4) * pick([-1,1]);
      d2 = ri(1, 4) * pick([-1,1]);
    } while (d2 === 0);
    // f′(x) = [2a2·x·(c2·x+d2) − (a2·x²+b2)·c2] / (c2·x+d2)²
    // f′(0) = [0 − b2·c2] / d2² = −b2·c2 / d2²
    const [pN, pD] = reduceFrac(-b2 * c2, d2 * d2);
    const ansVal = pN / pD;
    const numTex = polyTex([{c:a2,v:'x',p:2},{c:b2,v:'x',p:0}]);
    const denTex = linearTex(c2, d2);
    return {
      html: `Let ${kI(`f(x) = \\dfrac{${numTex}}{${denTex}}`)}. Use the <strong>quotient rule</strong> to find ${kI(`f'(0)`)}:
             <span class="ans-hint">Enter as a fraction if needed (e.g. <code>3/4</code>).</span>`,
      type: 'numeric',
      answer: ansVal,
      solutionHtml:
        kD(`f'(x) = \\frac{${2*a2}x \\cdot (${denTex}) - (${numTex}) \\cdot ${c2}}{(${denTex})^2}`) +
        kD(`f'(0) = \\frac{0 - ${b2}\\cdot${c2}}{(${d2})^2} = \\frac{${-b2*c2}}{${d2*d2}} = ${fracTex(pN, pD)}`)
    };
  }
};

// ── §2.7  Chain Rule ──────────────────────────────────────────────────────────
GEN['Calc_2_7'] = function() {
  const type = pick(['power', 'poly_squared']);

  if (type === 'power') {
    // f(x) = (ax + b)^n,  f′(c) = n·a·(a·c + b)^(n-1)
    const n = pick([2, 3]);
    const a = ri(1, 3) * pick([-1,1]);
    const b = ri(-4, 4);
    const x0 = pick([0, 1, -1, 2]);
    const inner = a * x0 + b;
    const ans = n * a * Math.pow(inner, n - 1);
    const innerTex = linearTex(a, b);
    return {
      html: `Let ${kI(`f(x) = (${innerTex})^{${n}}`)}. Use the <strong>chain rule</strong> to find ${kI(`f'(${x0})`)}:`,
      type: 'numeric',
      answer: ans,
      solutionHtml:
        kD(`f'(x) = ${n}(${innerTex})^{${n-1}} \\cdot ${a}`) +
        kD(`f'(${x0}) = ${n}(${a}\\cdot${x0}+${b})^{${n-1}} \\cdot ${a} = ${n} \\cdot ${inner}^{${n-1}} \\cdot ${a} = ${ans}`)
    };
  } else {
    // f(x) = (x² + a)^n,  f′(1) = n·(1+a)^(n-1)·2
    const n = pick([2, 3]);
    const a = ri(1, 4);
    const ans = n * 2 * Math.pow(1 + a, n - 1);
    return {
      html: `Let ${kI(`f(x) = (x^2 + ${a})^{${n}}`)}. Use the <strong>chain rule</strong> to find ${kI(`f'(1)`)}:`,
      type: 'numeric',
      answer: ans,
      solutionHtml:
        kD(`f'(x) = ${n}(x^2+${a})^{${n-1}} \\cdot 2x`) +
        kD(`f'(1) = ${n}(1+${a})^{${n-1}} \\cdot 2 = ${n} \\cdot ${Math.pow(1+a,n-1)} \\cdot 2 = ${ans}`)
    };
  }
};

// ── §2.8  General Derivative Strategies (mixed) ───────────────────────────────
// Product of (ax+b)² and (cx+d), find f′(0) = b·(2ad − bc) ... actually:
// f(x) = (ax+b)²·(cx+d)
// f′(x) = 2a(ax+b)(cx+d) + (ax+b)²·c
// f′(0) = 2a·b·d + b²·c
GEN['Calc_2_8'] = function() {
  const type = pick(['product_chain', 'log_chain']);

  if (type === 'product_chain') {
    const a = ri(1, 3);
    const b = ri(-4, 4) || 1;
    const c = ri(1, 3) * pick([-1,1]);
    const d = ri(-4, 4) || 1;
    // f(x) = (ax+b)²·(cx+d)
    const ans = 2 * a * b * d + b * b * c;
    const u = linearTex(a, b);
    const v = linearTex(c, d);
    return {
      html: `Let ${kI(`f(x) = (${u})^2(${v})`)}. Find ${kI(`f'(0)`)} using product and chain rules:`,
      type: 'numeric',
      answer: ans,
      solutionHtml:
        kD(`f'(x) = 2(${a})(${u})(${v}) + (${u})^2 \\cdot ${c}`) +
        kD(`f'(0) = 2(${a})(${b})(${d}) + (${b})^2(${c}) = ${2*a*b*d} + ${b*b*c} = ${ans}`)
    };
  } else {
    // f(x) = ln(ax + 1),  f′(x) = a/(ax+1),  f′(0) = a
    const a = ri(2, 6);
    return {
      html: `Let ${kI(`f(x) = \\ln(${a}x + 1)`)}. Find ${kI(`f'(0)`)} using the chain rule:`,
      type: 'numeric',
      answer: a,
      solutionHtml:
        kD(`f'(x) = \\frac{1}{${a}x+1} \\cdot ${a} = \\frac{${a}}{${a}x+1}`) +
        kD(`f'(0) = \\frac{${a}}{${a}(0)+1} = \\frac{${a}}{1} = ${a}`)
    };
  }
};

    const wrong=[`\\log_{${n}} ${b} = ${val}`,`\\log_{${b}} ${n} = ${val}`,`${b}^{${val}}=${n}`];
    const choices=[correct,...wrong].sort(()=>Math.random()-.5);
    const idx=choices.indexOf(correct);
    return {
      html:`Convert ${kI(`${b}^{${n}}=${val}`)} to logarithmic form:`,
      type:'mcq', choices:choices.map(c=>kI(c)),
      correctIdx:idx<0?0:idx,
      solutionHtml: kD(`${b}^{${n}}=${val}\\iff \\log_{${b}} ${val}=${n}`)
    };
  }
};

// ── §4.5  Exponential & Logarithmic Equations ─────────────────────────
GEN['PC_4_5'] = function() {
  const type=ri(0,1);
  if(type===0){
    // Same-base: b^(x+c) = b^n → x+c = n
    const b=pick([2,3,5]);
    const n=ri(2,5);
    const c=ri(-3,3);
    const x=n-c;
    return {
      html:`Solve ${kI(`${b}^{x${c>=0?'+'+c:c}}=${b}^{${n}}`)} for ${kI('x')}:`,
      type:'numeric', answer:x,
      solutionHtml: kD(`x${c>=0?'+'+c:c}=${n}\\Rightarrow x=${x}`)
    };
  } else {
    // Solve log_b(x+a)=n → x=b^n - a
    const b=pick([2,3,5]);
    const n=ri(1,3);
    const a=ri(-5,5);
    const ans=Math.pow(b,n)-a;
    return {
      html:`Solve ${kI(`\\log_{${b}}(x${a>=0?'+'+a:a})=${n}`)} for ${kI('x')}:`,
      type:'numeric', answer:ans,
      solutionHtml: kD(`x${a>=0?'+'+a:a}=${b}^{${n}}=${Math.pow(b,n)}\\Rightarrow x=${ans}`)
    };
  }
};

/* ─────────────────────────────────────────────
   CARD BUILDERS
───────────────────────────────────────────── */
function buildNumericInput(cardId) {
  return `
    <div class="answer-area">
      <div class="input-row">
        <label class="input-label">Answer:</label>
        <input class="ans-input" type="text" id="inp_${cardId}" placeholder="e.g. 5 or 3/4"
               onkeydown="if(event.key==='Enter')checkNum('${cardId}')">
      </div>
      <div class="ans-hint">Exact value (fraction or integer). Decimals OK within 0.01.</div>
      <button class="check-btn" onclick="checkNum('${cardId}')">Check</button>
      <div class="feedback" id="fb_${cardId}"></div>
    </div>`;
}

function buildMCQInput(cardId, choices, correctIdx) {
  const opts = choices.map((c,i) =>
    `<button class="mcq-btn" id="mcq_${cardId}_${i}" onclick="checkMCQ('${cardId}',${i},${correctIdx})">${c}</button>`
  ).join('');
  return `
    <div class="answer-area">
      <div class="mcq-opts">${opts}</div>
      <div class="feedback" id="fb_${cardId}"></div>
    </div>`;
}

function parseNum(s) {
  if (!s || !s.trim()) return NaN;
  s = s.trim().replace(/\s+/g, '');
  const m = s.match(/^(-?\d+)\/(-?\d+)$/);
  if (m) return parseInt(m[1]) / parseInt(m[2]);
  return parseFloat(s);
}
function approxEq(a, b, tol=1e-6) { return Math.abs(a-b) < tol; }

/* ─────────────────────────────────────────────
   ANSWER CHECKING
───────────────────────────────────────────── */
const _probs = {}; // cardId -> prob descriptor

function showFeedback(cardId, correct, solutionHtml) {
  const fb = document.getElementById(`fb_${cardId}`);
  fb.className = `feedback show ${correct?'correct-fb':'wrong-fb'}`;
  fb.innerHTML = correct
    ? `<strong>✓ Correct!</strong><span class="solution-label">Solution</span><div class="solution-body">${solutionHtml}</div>`
    : `<strong>✗ Not quite.</strong><span class="solution-label">Solution</span><div class="solution-body">${solutionHtml}</div>`;
}

function checkNum(cardId) {
  const inp = document.getElementById(`inp_${cardId}`);
  if (!inp || inp.disabled) return;
  const val = parseNum(inp.value);
  const prob = _probs[cardId];
  if (isNaN(val)) { inp.style.borderColor='var(--red)'; return; }
  const correct = approxEq(val, prob.answer, 0.011);
  inp.disabled = true;
  inp.style.borderColor = correct ? 'var(--green)' : 'var(--red)';
  const btn = inp.closest('.course-card').querySelector('.check-btn');
  if (btn) btn.disabled = true;
  showFeedback(cardId, correct, prob.solutionHtml);
}

function checkMCQ(cardId, chosen, correctIdx) {
  const prefix = `mcq_${cardId}_`;
  document.querySelectorAll(`[id^="${prefix}"]`).forEach((btn, i) => {
    btn.disabled = true;
    if (i === correctIdx) btn.classList.add(i === chosen ? 'correct' : 'reveal');
    else if (i === chosen) btn.classList.add('wrong');
  });
  showFeedback(cardId, chosen === correctIdx, _probs[cardId].solutionHtml);
}

/* ─────────────────────────────────────────────
   RENDER
───────────────────────────────────────────── */
const COURSES = [
  { key: 'collegeAlgebra', cls: 'ca',    label: 'College Algebra', folder: './College%20Algebra' },
  { key: 'preCalc',        cls: 'pc',    label: 'PreCalc',         folder: './PreCalc' },
  { key: 'calc',           cls: 'calc',  label: 'Calculus',         folder: null },   // resolved below
];

function renderCourse(course, secObj, cardId) {
  const gen = GEN[secObj ? secObj.id : null];
  let interactiveHtml = '';

  if (secObj && gen) {
    const prob = gen();
    _probs[cardId] = prob;
    if (prob.type === 'numeric') {
      interactiveHtml = buildNumericInput(cardId);
    } else if (prob.type === 'mcq') {
      interactiveHtml = buildMCQInput(cardId, prob.choices, prob.correctIdx);
    } else {
      interactiveHtml = buildNumericInput(cardId); // fallback shape
    }
  } else if (secObj && secObj.hasPractice && secObj.practiceFile) {
    interactiveHtml = `
      <div class="prac-fallback">Practice problems for this section:</div>
      <a class="prac-btn" href="${course.folder}/${secObj.practiceFile}.html" target="_blank">📄 Open Practice Page</a>`;
  } else if (!secObj) {
    interactiveHtml = `<span class="none-msg">No active section.</span>`;
  } else {
    interactiveHtml = `<span class="none-msg">Problems coming soon for this section.</span>`;
  }

  const inactive = !secObj;
  return `
  <div class="course-card ${course.cls}${inactive?' inactive':''}">
    <div class="course-label">${course.label}</div>
    ${secObj ? `<span class="sec-badge">§${secObj.section} — ${secObj.title}</span>` : ''}
    ${secObj && gen ? `<div class="prob-statement">${_probs[cardId].html}</div>` : ''}
    ${interactiveHtml}
  </div>`;
}

async function init() {
  document.getElementById('dateLabel').textContent = fmtDate(todayStr());

  const [stateRes, sectRes] = await Promise.all([
    fetch(BASE + 'state.json?t=' + Date.now()),
    fetch(BASE + 'sections.json?t=' + Date.now()),
  ]);
  const state    = await stateRes.json();
  const sections = await sectRes.json();

  // Build a flat lookup: sectionId -> section object
  const secMap = {};
  for (const arr of Object.values(sections)) {
    if (!Array.isArray(arr)) continue;
    for (const s of arr) secMap[s.id] = s;
  }

  let html = '';
  COURSES.forEach((course, i) => {
    let courseState, folder;
    if (course.key === 'calc') {
      // Whichever calc semester is active
      const c2 = state.courses?.calc2;
      const c1 = state.courses?.calc1;
      courseState = (c2?.currentSection) ? c2 : (c1?.currentSection ? c1 : c2 || c1);
      folder = (c2?.currentSection) ? './Calc%202' : './Calc%201';
    } else {
      courseState = state.courses?.[course.key];
      folder = course.folder;
    }
    const currentId = courseState?.currentSection || null;
    const secObj    = currentId ? secMap[currentId] : null;
    const cardId    = `c${i}`;
    html += renderCourse({...course, folder}, secObj, cardId);
  });

  document.getElementById('mainArea').innerHTML = html;
}

init().catch(err => {
  document.getElementById('mainArea').innerHTML =
    `<div style="grid-column:1/-1;text-align:center;padding:3rem;color:var(--muted)">Could not load data.</div>`;
  console.error(err);
});
</script>
